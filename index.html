let _c=null;

/* ═══════════════════════════════════════════════════════════════
   MIGRAÇÕES — adicionam colunas/tabelas SEM apagar dados existentes
   Cada migração tem um número. _c._schema_version guarda qual já rodou.
   ═══════════════════════════════════════════════════════════════ */
const MIGRATIONS=[
  // M1: Garantir tabelas novas da v3 (compatibilidade retroativa)
  function migration_1(d){
    ['animals','animal_lot_history','costs','feces_records','inventory_adjustments','pasture_movements','revenues','deaths','health_managements','herbicide_applications','mineral_supplementations','weighings','reproductive_protocols','pregnancy_diagnoses','births','pastures','lots'].forEach(t=>{if(!Array.isArray(d[t]))d[t]=[];});
    if(!d.settings)d.settings={};
  },
  // M2: Adicionar campo area_ha em Pastos (hectares)
  function migration_2(d){
    (d.pastures||[]).forEach(p=>{if(p.area_ha===undefined)p.area_ha='';});
  },
  // M3: Status no animal + tabela animal_exits
  function migration_3(d){
    (d.animals||[]).forEach(a=>{
      if(!a.status)a.status='ativo'; // ativo | saiu
      if(a.exit_date===undefined)a.exit_date=null;
      if(a.exit_reason===undefined)a.exit_reason=null;
    });
    if(!Array.isArray(d.animal_exits))d.animal_exits=[];
    // Marcar como "saiu" animais que já têm registro em deaths (pelo identifier)
    (d.deaths||[]).forEach(death=>{
      const a=(d.animals||[]).find(x=>x.identifier===death.animal_id||x.farm_tag===death.animal_id);
      if(a&&a.status!=='saiu'){
        a.status='saiu';
        a.exit_date=death.death_date;
        a.exit_reason='morte';
        // Criar exit correspondente para manter histórico
        const exists=(d.animal_exits||[]).some(e=>e.animal_id===a.id&&e.reason==='morte');
        if(!exists){
          d.animal_exits.push({
            id:'ex_migr_'+a.id,
            animal_id:a.id,
            identifier:a.identifier,
            date:death.death_date,
            reason:'morte',
            notes:'Criado pela migração a partir do registro de mortalidade · '+(death.cause||''),
            death_id:death.id,
            collaborator_id:death.collaborator_id||'',
            sync_status:'local',
            created_at:new Date().toISOString(),
          });
        }
      }
    });
  },
];

function runMigrations(d){
  const current=d._schema_version||0;
  let applied=0;
  for(let i=current;i<MIGRATIONS.length;i++){
    try{MIGRATIONS[i](d);applied++;}
    catch(e){console.error('Migration '+(i+1)+' falhou:',e);}
  }
  d._schema_version=MIGRATIONS.length;
  if(applied>0)console.log('[migrações] '+applied+' aplicadas. Schema: v'+d._schema_version);
  return applied;
}

function load(){
  if(_c)return _c;
  // Limpar chaves antigas de versões anteriores do sistema
  ['pecuaria_local','pecuaria_local_v2','pecuaria_local_v3','pm_final_v1'].forEach(k=>{try{localStorage.removeItem(k);}catch{}});
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(raw){
      const p=JSON.parse(raw);
      if(p&&Array.isArray(p.users)&&Array.isArray(p.lots)){
        _c=p;
        // Executar migrações nos dados existentes (PRESERVANDO-OS)
        const applied=runMigrations(_c);
        if(applied>0)save();
        return _c;
      }
    }
  }catch(e){console.warn('Reset DB:',e);}
  _c=defaults();
  _c._schema_version=MIGRATIONS.length;
  // Aplicar migrações também nos defaults (ex: garantir area_ha nos pastos-exemplo)
  runMigrations(_c);
  save();
  return _c;
}
function save(){try{localStorage.setItem(DB_KEY,JSON.stringify(_c));}catch(e){console.error(e);}}
function genId(p){return p+'_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);}

window.DB={
  today:today(),
  get:(t)=>[...(load()[t]||[])],
  find:(t,id)=>(load()[t]||[]).find(r=>r.id===id)||null,
  where:(t,fn)=>(load()[t]||[]).filter(fn),
  settings:()=>({...(load().settings||{})}),
  insert(t,data){
    const db=load();if(!db[t])db[t]=[];
    const now=new Date().toISOString();
    const rec={...data,id:genId(t.slice(0,3)),sync_status:'local',created_at:now,updated_at:now};
    db[t].push(rec);save();return rec;
  },
  update(t,id,upd){
    const db=load();const i=(db[t]||[]).findIndex(r=>r.id===id);
    if(i<0)return null;
    db[t][i]={...db[t][i],...upd,updated_at:new Date().toISOString(),sync_status:'local'};
    save();return db[t][i];
  },
  delete(t,id){const db=load();if(db[t]){db[t]=db[t].filter(r=>r.id!==id);save();}},
  updateSettings(u){const db=load();db.settings={...db.settings,...u,_updated_at:new Date().toISOString()};save();},
  authenticate(email,pw){
    const e=(email||'').trim().toLowerCase();
    const p=(pw||'').trim();
    return(load().users||[]).find(u=>(u.email||'').toLowerCase()===e&&u.password===p&&u.active)||null;
  },
  countPending(){let n=0;Object.values(load()).forEach(v=>{if(Array.isArray(v))n+=v.filter(r=>r.sync_status==='local').length;});return n;},
  transferAnimal(aid,toLot,date,notes,uid){
    const db=load();const a=(db.animals||[]).find(x=>x.id===aid);if(!a)return null;
    const from=a.lot_id;a.lot_id=toLot;a.sync_status='local';
    if(!db.animal_lot_history)db.animal_lot_history=[];
    db.animal_lot_history.push({id:genId('alh'),animal_id:aid,from_lot_id:from,to_lot_id:toLot,date:date||today(),notes:notes||'',collaborator_id:uid||'',sync_status:'local',created_at:new Date().toISOString()});
    save();return a;
  },
  getConsolidated(identifier){
    const d=load();const q=(identifier||'').toLowerCase();
    const animal=(d.animals||[]).find(a=>(a.identifier||'').toLowerCase()===q||(a.farm_tag||'').toLowerCase()===q);
    return {
      animal,
      births:(d.births||[]).filter(b=>b.calf_id===identifier||b.mother_id===identifier||b.farm_tag===identifier),
      weighings:(d.weighings||[]).filter(w=>w.animal_id===identifier),
      pregnancies:(d.pregnancy_diagnoses||[]).filter(p=>p.cow_id===identifier),
      protocols:(d.reproductive_protocols||[]).filter(r=>r.cow_id===identifier),
      deaths:(d.deaths||[]).filter(x=>x.animal_id===identifier),
      lotHist:animal?(d.animal_lot_history||[]).filter(h=>h.animal_id===animal.id):[],
    };
  },
  resetAll(){localStorage.removeItem(DB_KEY);_c=null;},
};

/* ─── Helpers globais ─── */
window.HELPERS={
  today,
  fmtDate(d){if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR');}catch{return d;}},
  fmtMoney(v){if(v==null||isNaN(v))return'—';return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);},
  daysUntil(ds){if(!ds)return null;const n=new Date();n.setHours(12);return Math.ceil((new Date(ds+'T12:00:00')-n)/86400000);},
  daysBetween(a,b){if(!a||!b)return null;return Math.ceil((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);},
  addDays(ds,n){const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];},
  getSeason(ds){if(!ds)return null;const d=new Date(ds+'T12:00:00');const y=d.getFullYear();const m=d.getMonth();const sy=m>=6?y:y-1;return String(sy).slice(-2)+'/'+String(sy+1).slice(-2);},
  currentSeason(){return window.HELPERS.getSeason(today());},
  listSeasons(recs){
    const s=new Set();
    recs.forEach(r=>{const f=r.birth_date||r.date||r.death_date||r.diagnosis_date||r.entry_date;if(f)s.add(window.HELPERS.getSeason(f));});
    s.add(window.HELPERS.currentSeason());return[...s].filter(Boolean).sort().reverse();
  },
  calcPregnancy(diags,season){
    const f=season?diags.filter(d=>window.HELPERS.getSeason(d.diagnosis_date)===season):diags;
    if(!f.length)return{rate:0,positive:0,total:0};
    const pos=f.filter(d=>d.result==='Positivo').length;
    return{rate:(pos/f.length)*100,positive:pos,total:f.length};
  },
  exportCSV(data,filename,cols){
    const hdr=cols.map(c=>'"'+c.label+'"').join(';');
    const rows=data.map(r=>cols.map(c=>{let v=r[c.key];if(c.fn)v=c.fn(v,r);return'"'+String(v??'').replace(/"/g,'""').replace(/\r?\n/g,' ')+'"';}).join(';'));
    const content='\uFEFF'+[hdr,...rows].join('\r\n');
    const blob=new Blob([content],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename+'_'+today()+'.csv';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  },
  compressImg(file,maxW=800,q=0.72){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=e=>{const img=new Image();img.onload=()=>{let{width:w,height:h}=img;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q));};img.onerror=rej;img.src=e.target.result;};
      r.onerror=rej;r.readAsDataURL(file);
    });
  },

    if(error)throw error;
    return data||[];

  // Migração: empurrar dados do JSON local pro Supabase
  /* Apaga TODOS os dados de TODAS as tabelas operacionais (admin only).
     Útil pra resetar e refazer importação. NÃO toca em profiles/auth. */
  async wipeAll(onProgress){
    if(!window.SUPA||!window.SUPA.currentProfile||window.SUPA.currentProfile.role!=='admin'){
      throw new Error('Apenas admin pode limpar dados.');
    }
    // Ordem de delete respeitando dependências (filhos primeiro)
    const TABLES=[
      ['animal_exits','Saídas de animais'],
      ['animal_lot_history','Histórico de lotes'],
      ['births','Nascimentos'],
      ['deaths','Mortalidade'],
      ['weighings','Pesagens'],
      ['pregnancy_diagnoses','Gestação'],
      ['reproductive_protocols','Reprodução'],
      ['health_managements','Manejos sanitários'],
      ['herbicide_applications','Herbicida'],
      ['mineral_supplementations','Sal mineral'],
      ['feces_records','Fezes'],
      ['pasture_movements','Movimentações de pastos'],
      ['revenues','Receitas'],
      ['costs','Custos'],
      ['animals','Animais'],
      ['lots','Lotes'],
      ['pastures','Pastos'],
    ];
    const result={success:[],errors:[]};
    for(const[table,label]of TABLES){
      try{
        // Delete tudo da tabela. Usar filtro inofensivo pra evitar erro
        const{error}=await _sup().from(table).delete().not('id','is',null);
        if(error)throw error;
        result.success.push({table,label});
        if(onProgress)onProgress({table,label});
      }catch(e){
        result.errors.push({table,label,error:e.message||String(e)});
      }
    }
    return result;
  },

  async migrateFromLocal(localData,onProgress,opts={}){
    if(!window.SUPA||!window.SUPA.currentProfile||window.SUPA.currentProfile.role!=='admin'){
      throw new Error('Apenas admin pode migrar dados.');
    }
    // Se opts.replace = true, apaga tudo antes de importar (substitui)
    if(opts.replace){
      if(onProgress)onProgress({table:'__wipe__',label:'🗑 Limpando dados antigos...',count:0});
      await window.SupaDB.wipeAll(()=>{});
    }
    // Mapeamento de IDs antigos → novos UUIDs gerados pelo Supabase
    const idMap={
      pastures:{}, lots:{}, animals:{}, profiles:{},
      births:{}, deaths:{}, weighings:{}, reproductive_protocols:{}, pregnancy_diagnoses:{},
      health_managements:{}, herbicide_applications:{}, mineral_supplementations:{},
      feces_records:{}, pasture_movements:{}, animal_lot_history:{}, animal_exits:{},
      revenues:{}, costs:{},
    };

    // Tabelas em ordem de dependência (1º independentes, depois as que referenciam outras)
    const STAGES=[
      {table:'pastures',label:'Pastos',refs:{}},
      {table:'lots',label:'Lotes',refs:{pasture_id:'pastures'}},
      {table:'animals',label:'Animais',refs:{lot_id:'lots'},dedupe:'identifier'},
      {table:'animal_lot_history',label:'Histórico de lotes',refs:{animal_id:'animals',from_lot_id:'lots',to_lot_id:'lots'}},
      {table:'pasture_movements',label:'Movimentações de pastos',refs:{lot_id:'lots',pasture_id:'pastures'},required:['entry_date','lot_id','pasture_id']},
      {table:'births',label:'Nascimentos',refs:{lot_id:'lots',pasture_id:'pastures'}},
      {table:'deaths',label:'Mortalidade',refs:{lot_id:'lots',pasture_id:'pastures'}},
      {table:'health_managements',label:'Manejos sanitários',refs:{lot_id:'lots'}},
      {table:'herbicide_applications',label:'Herbicida',refs:{pasture_id:'pastures'}},
      {table:'mineral_supplementations',label:'Sal mineral',refs:{lot_id:'lots',pasture_id:'pastures'}},
      {table:'weighings',label:'Pesagens',refs:{lot_id:'lots'}},
      {table:'reproductive_protocols',label:'Reprodução',refs:{lot_id:'lots'}},
      {table:'pregnancy_diagnoses',label:'Gestação',refs:{lot_id:'lots'}},
      {table:'feces_records',label:'Fezes',refs:{lot_id:'lots',pasture_id:'pastures'}},
      {table:'animal_exits',label:'Saídas',refs:{animal_id:'animals'}},
      {table:'revenues',label:'Receitas',refs:{}},
      {table:'costs',label:'Custos',refs:{}},
    ];

    const REMOVE_FIELDS=['sync_status','collaborator_id','responsible_id','created_by','death_id','updated_at','created_at'];
    const NUMERIC_FIELDS=['area_ha','capacity','count','quantity','total_value','per_head_value','sale_value','value','weight','birth_weight'];
    const UUID_FIELDS_REFS=['pasture_id','lot_id','animal_id','from_lot_id','to_lot_id'];

    function cleanRow(r,refs){
      const c={...r};
      REMOVE_FIELDS.forEach(f=>{delete c[f];});
      delete c.id;
      Object.entries(refs).forEach(([field,refTable])=>{
        if(c[field]){
          const oldId=c[field];
          const newId=idMap[refTable]?.[oldId];
          if(newId)c[field]=newId;
          else delete c[field];
        }
      });
      UUID_FIELDS_REFS.forEach(f=>{
        if(c[f]&&typeof c[f]==='string'&&c[f].length<20&&!c[f].includes('-')){
          delete c[f];
        }
      });
      NUMERIC_FIELDS.forEach(f=>{
        if(c[f]===''||c[f]===null||c[f]===undefined)delete c[f];
        else if(typeof c[f]==='string'){
          const n=parseFloat(c[f]);
          if(!isNaN(n))c[f]=n;else delete c[f];
        }
      });
      ['date','birth_date','death_date','diagnosis_date','expected_birth_date','repasse_date','exit_date','entry_date'].forEach(f=>{
        if(c[f]==='')delete c[f];
      });
      return c;
    }

    const result={success:[],errors:[]};
    for(const stage of STAGES){
      const{table,label,refs,dedupe,required}=stage;
      try{
        let rows=Array.isArray(localData[table])?localData[table]:[];
        const originalCount=rows.length;
        let skippedCount=0;

        // Deduplicação: mantém só o primeiro registro com cada valor único
        if(dedupe){
          const seen=new Set();
          rows=rows.filter(r=>{
            const v=r[dedupe];
            if(!v)return true;
            if(seen.has(v)){skippedCount++;return false;}
            seen.add(v);return true;
          });
        }

        // Filtrar registros que não tem campos obrigatórios
        if(required){
          rows=rows.filter(r=>{
            const ok=required.every(f=>r[f]&&r[f]!=='');
            if(!ok)skippedCount++;
            return ok;
          });
        }

        if(rows.length===0){
          result.success.push({table,label,count:0,skipped:skippedCount,total:originalCount});
          if(onProgress)onProgress({table,label,count:0});
          continue;
        }

        // Insert 1 a 1 (mais lento, mas tolerante a falhas individuais)
        let inserted=0;
        let perRowErrors=0;
        for(const orig of rows){
          try{
            const cleaned=cleanRow(orig,refs);
            const{data,error}=await _sup().from(table).insert([cleaned]).select('id').single();
            if(error){perRowErrors++;continue;}
            if(orig.id&&data?.id){
              idMap[table][orig.id]=data.id;
            }
            inserted++;
          }catch{perRowErrors++;}
        }
        result.success.push({table,label,count:inserted,skipped:skippedCount,errors:perRowErrors,total:originalCount});
        if(onProgress)onProgress({table,label,count:inserted,skipped:skippedCount,errors:perRowErrors});
      }catch(e){
        result.errors.push({table,label,error:e.message||String(e)});
      }
    }
    return result;
  },
};

    }

},5000);

/* ═══ AnimalPicker — busca animal do Inventário com autocomplete ═══
   Props:
     value          string — identifier atual
     onChange       fn(identifier, animalObject) — chamado ao selecionar
     onClear        fn() — opcional, limpa
     sex            string opcional — filtrar por sexo (Fêmea/Macho)
     types          array opcional — ['Vaca','Novilha'] para filtrar tipos
     requireActive  bool — se true, só lista animais com status 'ativo' (default)
     label          string — label do campo
     required       bool
     hint           string
*/
function AnimalPicker({value,onChange,onClear,sex,types,requireActive=true,label='Animal (do Inventário)',required,hint,placeholder='Digite ou selecione o brinco...'}){
  const[q,setQ]=useState(value||'');
  const[focused,setFocused]=useState(false);
  useEffect(()=>{setQ(value||'');},[value]);
  const all=useMemo(()=>{
    let a=DB.get('animals');
    if(requireActive)a=a.filter(x=>(x.status||'ativo')==='ativo');
    if(sex)a=a.filter(x=>x.sex===sex);
    if(types&&types.length>0)a=a.filter(x=>types.includes(x.type));
    return a.sort((a,b)=>(a.identifier||'').localeCompare(b.identifier||''));
  },[sex,types,requireActive,value]);
  const filtered=useMemo(()=>{
    if(!q||!focused)return all.slice(0,20);
    const qq=q.toLowerCase();
    return all.filter(a=>(a.identifier||'').toLowerCase().includes(qq)||(a.farm_tag||'').toLowerCase().includes(qq)||(a.official_tag||'').toLowerCase().includes(qq)).slice(0,20);
  },[q,focused,all]);
  const selected=useMemo(()=>all.find(a=>a.identifier===value),[value,all]);
  const exists=value&&selected;
  const missing=value&&!selected;

  function pick(a){
    setQ(a.identifier);
    setFocused(false);
    onChange&&onChange(a.identifier,a);
  }
  function handleChange(v){
    setQ(v);
    const match=all.find(a=>a.identifier===v);
    if(match)onChange&&onChange(v,match);
    else onChange&&onChange(v,null);
  }

  return <div style={{marginBottom:14,position:'relative'}}>
    <label style={{display:'block',fontSize:13,fontWeight:500,color:'#374151',marginBottom:4}}>{label}{required&&<span style={{color:'#ef4444',marginLeft:2}}>*</span>}</label>
    <div style={{position:'relative'}}>
      <input type="text" value={q} onChange={e=>handleChange(e.target.value)}
        onFocus={()=>setFocused(true)}
        onBlur={()=>setTimeout(()=>setFocused(false),180)}
        placeholder={placeholder}
        style={{...INP,paddingRight:value?60:12,borderColor:missing?'#fca5a5':exists?'#86efac':'#d1d5db',background:missing?'#fef2f2':'#fff'}}/>
      {value&&<button type="button" onClick={()=>{setQ('');onChange&&onChange('',null);onClear&&onClear();}}
        style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'#f3f4f6',border:'none',borderRadius:6,padding:'3px 8px',fontSize:11,color:'#6b7280',cursor:'pointer'}}>✕ limpar</button>}
    </div>
    {hint&&<p style={{fontSize:11,color:'#6b7280',marginTop:3}}>{hint}</p>}
    {exists&&!focused&&<div style={{marginTop:6,padding:8,background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,display:'flex',gap:8,alignItems:'center',fontSize:12}}>
      <span style={{fontSize:18}}>✅</span>
      <div style={{flex:1}}>
        <strong>{selected.identifier}</strong> · {selected.type} · {selected.race} · {selected.sex}
        {selected.lot_id&&<span style={{color:'#6b7280'}}> · {DB.find('lots',selected.lot_id)?.name||''}</span>}
      </div>
    </div>}
    {missing&&!focused&&<div style={{marginTop:6,padding:8,background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:8,fontSize:12,color:'#991b1b'}}>
      ⚠️ Animal <strong>{value}</strong> não encontrado no Inventário. Cadastre-o em Inventário primeiro ou verifique o brinco.
    </div>}
    {focused&&filtered.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #d1d5db',borderRadius:8,marginTop:4,maxHeight:240,overflowY:'auto',zIndex:50,boxShadow:'0 8px 24px rgba(0,0,0,.1)'}}>
      {filtered.map(a=>{
        const lot=DB.find('lots',a.lot_id);
        return <div key={a.id} onMouseDown={()=>pick(a)}
          style={{padding:'8px 12px',borderBottom:'1px solid #f3f4f6',cursor:'pointer',fontSize:12}}
          onMouseEnter={e=>e.currentTarget.style.background='#f0fdf4'}
          onMouseLeave={e=>e.currentTarget.style.background=''}>
          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
            <strong style={{fontSize:12}}>{a.identifier}</strong>
            <Badge color={a.sex==='Macho'?'blue':'red'}>{a.sex}</Badge>
            <Badge color="gray">{a.type}</Badge>
            <Badge color="gray">{a.race}</Badge>
          </div>
          {lot&&<p style={{fontSize:10,color:'#6b7280',marginTop:2}}>{lot.name}</p>}
        </div>;
      })}
    </div>}
    {focused&&filtered.length===0&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #d1d5db',borderRadius:8,marginTop:4,padding:12,fontSize:12,color:'#6b7280',zIndex:50}}>
      {q?'Nenhum animal do Inventário bate com "'+q+'"':'Nenhum animal disponível'}
    </div>}
  </div>;
}

/* ═══ LOGIN ═══ */
function Login({onLogin}){
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[err,setErr]=useState('');
  const[showReset,setShowReset]=useState(false);
  function submit(e){
    e.preventDefault();
    if(!email||!pw){setErr('Preencha e-mail e senha');return;}
    try{
      const u=DB.authenticate(email,pw);
      if(u){const{password,...safe}=u;localStorage.setItem('pm_user',JSON.stringify(safe));onLogin(safe);}
      else{setErr('E-mail ou senha incorretos.');setShowReset(true);}
    }catch(ex){setErr('Erro: '+ex.message);setShowReset(true);}
  }
  function reset(){
    if(!confirm('Apagar dados e recomeçar?'))return;
    Object.keys(localStorage).forEach(k=>{if(k.startsWith('pm_')||k.startsWith('pecuaria'))localStorage.removeItem(k);});
    location.reload();
  }
  return <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#14532d,#166534,#15803d)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div style={{width:'100%',maxWidth:400}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontSize:60,marginBottom:4}}>🐂</div>
        <h1 style={{color:'#fff',fontSize:24,fontWeight:700}}>PecuáriaManager</h1>
        <p style={{color:'rgba(255,255,255,.7)',fontSize:13,marginTop:6}}>Gestão para fazenda de cria</p>
      </div>
      <div style={{background:'#fff',borderRadius:20,padding:28}}>
        <h2 style={{fontSize:16,fontWeight:600,marginBottom:20}}>Entrar</h2>
        {err&&<Alert type="error" style={{marginBottom:16}}>{err}</Alert>}
        <form onSubmit={submit}>
          <Field label="E-mail"><Input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@fazenda.com" autoComplete="email"/></Field>
          <Field label="Senha"><Input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" autoComplete="current-password"/></Field>
          <Btn type="submit" fullWidth style={{marginTop:8,padding:'12px',fontSize:14}}>Entrar</Btn>
        </form>
        <div style={{marginTop:20,padding:12,background:'#f0fdf4',borderRadius:8,border:'1px solid #bbf7d0'}}>
          <p style={{fontSize:11,fontWeight:600,color:'#166534',marginBottom:8}}>Contas demo (clique para preencher):</p>
          {[['admin@fazenda.com','admin123','👑 Administrador'],['carlos@fazenda.com','carlos123','👤 Colaborador']].map(([em,p,r])=>
            <button key={em} type="button" onClick={()=>{setEmail(em);setPw(p);setErr('');}}
              style={{display:'block',width:'100%',textAlign:'left',background:'none',border:'none',cursor:'pointer',padding:'3px 0',fontSize:11,color:'#374151'}}>
              <strong>{r}:</strong> {em} / {p}
            </button>
          )}
        </div>
        <div style={{marginTop:12,textAlign:'center'}}>
          {!showReset
            ? <button type="button" onClick={()=>setShowReset(true)} style={{fontSize:11,color:'#9ca3af',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Problemas ao entrar?</button>
            : <div style={{padding:12,background:'#fffbeb',borderRadius:8,border:'1px solid #fcd34d'}}>
                <p style={{fontSize:11,color:'#78350f',marginBottom:8}}>Clique para resetar tudo:</p>
                <button type="button" onClick={reset} style={{width:'100%',padding:8,background:'#dc2626',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600}}>🗑 Resetar dados locais</button>
              </div>
          }
        </div>
      </div>
    </div>
  </div>;
}

/* ═══ DASHBOARD ═══ */
function Dashboard({user,onNav}){
  const[season,setSeason]=useState(H.currentSeason());
  const allBirths=DB.get('births');
  const allDeaths=DB.get('deaths');
  const allPreg=DB.get('pregnancy_diagnoses');
  const allRevenues=DB.get('revenues');
  const allCosts=DB.get('costs');
  const lots=DB.get('lots');
  const pastures=DB.get('pastures');
  const settings=DB.settings();
  const alertDays=parseInt(settings.birth_alert_days||'30');
  const births=allBirths.filter(b=>H.getSeason(b.birth_date)===season);
  const deaths=allDeaths.filter(d=>H.getSeason(d.death_date)===season);
  const revenues=allRevenues.filter(r=>H.getSeason(r.date)===season);
  const costs=allCosts.filter(c=>H.getSeason(c.date)===season);
  const seasons=H.listSeasons([...allBirths,...allDeaths,...allPreg,...allRevenues,...allCosts]);
  const preg=H.calcPregnancy(allPreg,season);
  const mRate=births.length>0?((deaths.length/births.length)*100).toFixed(1):'0.0';
  const nearBirth=allPreg.filter(p=>{if(p.result!=='Positivo'||!p.expected_birth_date)return false;const d=H.daysUntil(p.expected_birth_date);return d!==null&&d<=alertDays&&d>=-3;});
  const recent=[...births].sort((a,b)=>b.birth_date.localeCompare(a.birth_date)).slice(0,5);
  // Financeiro
  const totalRev=revenues.reduce((s,r)=>s+(parseFloat(r.total_value)||0),0);
  const totalCostCusteio=costs.filter(c=>c.type==='Custeio').reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const totalCostInvest=costs.filter(c=>c.type==='Investimento').reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const totalCost=totalCostCusteio+totalCostInvest;
  const result=totalRev-totalCost;
  const resultPct=totalRev>0?((result/totalRev)*100).toFixed(0):null;

  return <div style={{padding:'0 0 100px'}}>
    <div style={{background:'linear-gradient(135deg,#14532d,#166534)',padding:'24px 20px 60px'}}>
      <p style={{color:'rgba(255,255,255,.7)',fontSize:12}}>🐂</p>
      <h1 style={{color:'#fff',fontSize:20,fontWeight:700}}>{settings.farm_name||'Fazenda'}</h1>
      <p style={{color:'rgba(255,255,255,.6)',fontSize:12,marginTop:4}}>Olá, {user.name.split(' ')[0]}</p>
    </div>
    <div style={{padding:'0 16px',marginTop:-40}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <span style={{fontSize:12,fontWeight:600,color:'#374151'}}>Safra:</span>
        <select value={season} onChange={e=>setSeason(e.target.value)} style={{padding:'6px 10px',border:'1px solid #d1d5db',borderRadius:8,fontSize:13,fontWeight:600,background:'#fff'}}>
          {seasons.map(s=><option key={s} value={s}>Safra {s}</option>)}
        </select>
      </div>
      {/* Centro de Alertas unificado */}
      {(()=>{
        const alerts=[];
        // Partos próximos (até alertDays)
        if(nearBirth.length>0){
          const urgent=nearBirth.filter(p=>{const d=H.daysUntil(p.expected_birth_date);return d!==null&&d<=7&&d>=-3;});
          alerts.push({type:'error',icon:'🚨',title:(urgent.length>0?urgent.length+' parto'+(urgent.length>1?'s':'')+' em ATÉ 7 DIAS':nearBirth.length+' parto'+(nearBirth.length>1?'s':'')+' previsto'+(nearBirth.length>1?'s':''))+' em '+alertDays+' dias',nav:'pregnancy'});
        }
        // Vacas prenhas com previsão já passada (sem nascimento registrado)
        const overdue=allPreg.filter(p=>{
          if(p.result!=='Positivo'||!p.expected_birth_date)return false;
          const d=H.daysUntil(p.expected_birth_date);
          if(d===null||d>=0)return false;
          const hasBirth=allBirths.some(b=>b.mother_id===p.cow_id&&b.birth_date>=p.expected_birth_date);
          return !hasBirth&&d>=-60;
        });
        if(overdue.length>0)alerts.push({type:'warning',icon:'⏰',title:overdue.length+' vaca'+(overdue.length>1?'s':'')+' com parto atrasado sem registro',nav:'pregnancy'});
        // Animais sem lote
        const noLot=DB.where('animals',a=>!a.lot_id).length;
        if(noLot>0)alerts.push({type:'warning',icon:'⚠️',title:noLot+' animal'+(noLot>1?'is':'')+' sem lote atribuído',nav:'inventory'});
        // Registros com sync pendente
        const pending=DB.countPending();
        if(pending>5)alerts.push({type:'info',icon:'📡',title:pending+' registros locais (backup recomendado)',nav:'settings'});
        // Pastos superlotados
        const overPast=pastures.filter(p=>{
          if(!p.capacity)return false;
          const currentMov=DB.where('pasture_movements',m=>m.pasture_id===p.id&&!m.exit_date);
          const totalAnimals=currentMov.reduce((s,m)=>{const l=lots.find(x=>x.id===m.lot_id);return s+(l?parseInt(l.count)||0:0);},0);
          return totalAnimals>parseInt(p.capacity);
        });
        if(overPast.length>0)alerts.push({type:'warning',icon:'🌿',title:overPast.length+' pasto'+(overPast.length>1?'s':'')+' acima da capacidade',nav:'pastures'});

        if(alerts.length===0)return null;
        return <Card style={{marginBottom:12,background:'#fffbeb',border:'1px solid #fcd34d'}}>
          <CardHeader title="Alertas e Lembretes" icon="🔔" action={<Badge color="amber">{alerts.length}</Badge>}/>
          {alerts.map((a,i)=>
            <div key={i} onClick={()=>onNav(a.nav)} style={{padding:'10px 16px',borderBottom:i<alerts.length-1?'1px solid #fef3c7':'none',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:20}}>{a.icon}</span>
              <span style={{flex:1,fontSize:13,color:'#78350f'}}>{a.title}</span>
              <span style={{fontSize:16,color:'#9ca3af'}}>›</span>
            </div>
          )}
        </Card>;
      })()}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        <StatCard label="Nascimentos" value={births.length} color="green" icon="🐮" onClick={()=>onNav('births')}/>
        <StatCard label="Mortes" value={deaths.length} color="red" icon="✝" onClick={()=>onNav('mortality')}/>
        <StatCard label="Mortalidade" value={mRate+'%'} color={parseFloat(mRate)>5?'red':'amber'}/>
        <StatCard label="Taxa Prenhez" value={preg.rate.toFixed(0)+'%'} sub={preg.positive+'/'+preg.total} color="amber" icon="🤰"/>
      </div>

      {user.role==='admin'&&(revenues.length>0||costs.length>0)&&<Card style={{marginBottom:12,background:result>=0?'#f0fdf4':'#fef2f2',border:'1px solid '+(result>=0?'#86efac':'#fca5a5')}}>
        <CardHeader title="Resumo Financeiro da Safra" icon="📊" action={<Badge color={result>=0?'green':'red'}>{result>=0?'Lucro':'Prejuízo'}</Badge>}/>
        <div style={{padding:'14px 16px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
            <div>
              <p style={{fontSize:10,color:'#6b7280',textTransform:'uppercase',fontWeight:600}}>Receitas</p>
              <strong style={{fontSize:15,color:'#166534'}}>{H.fmtMoney(totalRev)}</strong>
            </div>
            <div>
              <p style={{fontSize:10,color:'#6b7280',textTransform:'uppercase',fontWeight:600}}>Custos</p>
              <strong style={{fontSize:15,color:'#dc2626'}}>{H.fmtMoney(totalCost)}</strong>
              <p style={{fontSize:10,color:'#9ca3af'}}>Custeio: {H.fmtMoney(totalCostCusteio)}</p>
              <p style={{fontSize:10,color:'#9ca3af'}}>Invest: {H.fmtMoney(totalCostInvest)}</p>
            </div>
            <div>
              <p style={{fontSize:10,color:'#6b7280',textTransform:'uppercase',fontWeight:600}}>Resultado</p>

      <Card style={{marginBottom:16}}>
        <CardHeader title="Últimos Nascimentos" icon="🐮" action={<span onClick={()=>onNav('births')} style={{fontSize:12,color:'#166534',cursor:'pointer'}}>Ver todos →</span>}/>

                  <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <strong style={{fontSize:13}}>{b.calf_id}</strong>
                    <Badge color={b.calf_sex==='Macho'?'blue':'red'}>{b.calf_sex}</Badge>
                  </div>
                  <p style={{fontSize:11,color:'#6b7280'}}>Mãe: {b.mother_id} · {b.birth_weight}kg · {H.fmtDate(b.birth_date)}</p>

/* ═══ NASCIMENTOS ═══ */
function Births({user}){
  const[items,setItems]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);
  const[query,setQuery]=useState('');
  const lots=DB.get('lots');
  const pastures=DB.get('pastures');
  const users=DB.get('users');

  useEffect(()=>{setItems([...DB.get('births')].sort((a,b)=>(b.birth_date||'').localeCompare(a.birth_date||'')));},[rev]);

  function save(data){
    if(editing){
      DB.update('births',editing.id,data);
    } else {
      DB.insert('births',{...data,collaborator_id:data.collaborator_id||user.id});
      // Criar bezerro automaticamente no inventário (se ainda não existe)
      if(data.calf_id){
        const exists=DB.where('animals',a=>a.identifier===data.calf_id||a.farm_tag===data.calf_id).length>0;
        if(!exists){
          DB.insert('animals',{
            identifier:data.calf_id,
            type:'Bezerro',
            race:data.calf_race,
            sex:data.calf_sex,
            birth_date:data.birth_date,
            lot_id:data.lot_id||'',
            farm_tag:data.farm_tag||data.calf_id,
            official_tag:data.official_tag||'',
            notes:'Criado automaticamente no nascimento',
          });
        }
      }
    }
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }
  function del(id){if(!confirm('Excluir?'))return;DB.delete('births',id);setRev(r=>r+1);setDetail(null);}

  const filtered=query
    ? items.filter(b=>(b.calf_id+' '+b.mother_id+' '+(b.bull_name||'')).toLowerCase().includes(query.toLowerCase()))
    : items;

  if(detail){
    const lot=lots.find(l=>l.id===detail.lot_id);
    const past=pastures.find(p=>p.id===detail.pasture_id);
    const col=users.find(u=>u.id===detail.collaborator_id);
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={'Bezerro '+detail.calf_id} onBack={()=>setDetail(null)}
        action={user.role==='admin'&&<div style={{display:'flex',gap:8}}>
          <Btn size="sm" variant="secondary" onClick={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}>Editar</Btn>
          <Btn size="sm" variant="danger" onClick={()=>del(detail.id)}>Excluir</Btn>
        </div>}/>
      {detail.calf_photo&&<div style={{marginBottom:12,borderRadius:12,overflow:'hidden',border:'1px solid #e5e7eb'}}><img src={detail.calf_photo} style={{width:'100%',maxHeight:280,objectFit:'cover'}}/></div>}
      <Card>
        <CardHeader title="Informações" icon="🐮" action={<SyncBadge status={detail.sync_status}/>}/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="ID Bezerro" value={detail.calf_id}/>
          <Info label="Sexo" value={<Badge color={detail.calf_sex==='Macho'?'blue':'red'}>{detail.calf_sex}</Badge>}/>
          <Info label="Raça" value={detail.calf_race}/>
          <Info label="Peso ao nascer" value={detail.birth_weight+' kg'}/>
          <Info label="Data" value={H.fmtDate(detail.birth_date)}/>
          <Info label="Safra" value={H.getSeason(detail.birth_date)}/>
          <Info label="Mãe" value={detail.mother_id+' ('+detail.mother_race+')'}/>
          <Info label="Touro/Pai" value={(detail.bull_name||'—')+(detail.bull_race?' · '+detail.bull_race:'')}/>
          <Info label="Lote" value={lot?.name||'—'}/>
          <Info label="Pasto" value={past?.name||'—'}/>
          <Info label="Brinco" value={detail.farm_tag||'—'}/>
          <Info label="CIDASC" value={detail.official_tag||'—'}/>
          <Info label="Medicações" value={detail.medications||'—'}/>
          <Info label="Colaborador" value={col?.name||'—'}/>
          {detail.notes&&<div style={{gridColumn:'1/-1'}}><Info label="Observações" value={detail.notes}/></div>}
        </div>
      </Card>
    </div>;
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="🐮 Nascimentos" sub={filtered.length+' registros'} action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}/>
    <div style={{marginBottom:12}}><Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Buscar por ID, mãe, touro..."/></div>
    <Card>
      {filtered.length===0
        ? <EmptyState icon="🐮" text="Sem nascimentos" action={<Btn onClick={()=>setShowForm(true)}>Registrar primeiro</Btn>}/>
        : filtered.map(b=>{
            const lot=lots.find(l=>l.id===b.lot_id);
            return <ListItem key={b.id} onClick={()=>setDetail(b)}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                {b.calf_photo
                  ? <img src={b.calf_photo} style={{width:42,height:42,borderRadius:8,objectFit:'cover'}}/>
                  : <div style={{width:42,height:42,borderRadius:8,background:'#f0fdf4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🐮</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <strong style={{fontSize:13}}>{b.calf_id}</strong>
                    <Badge color={b.calf_sex==='Macho'?'blue':'red'}>{b.calf_sex}</Badge>
                    <Badge color="gray">{b.calf_race}</Badge>
                  </div>
                  <p style={{fontSize:11,color:'#6b7280'}}>Mãe: {b.mother_id} · {b.birth_weight}kg · {H.fmtDate(b.birth_date)}</p>
                  {lot&&<p style={{fontSize:11,color:'#9ca3af'}}>{lot.name}</p>}
                </div>
                <SyncBadge status={b.sync_status}/>
              </div>
            </ListItem>;
          })
      }
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar Nascimento':'Novo Nascimento'} size="lg">
      <BirthForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}} lots={lots} pastures={pastures} users={users} user={user}/>
    </Modal>
  </div>;
}

    <FormRow>
      <Field label="ID do Bezerro" required hint="Será cadastrado no Inventário"><Input value={f.calf_id} onChange={e=>s('calf_id',e.target.value)} placeholder="BEZ-001"/></Field>
      <Field label="Raça do Bezerro"><Select value={f.calf_race} onChange={e=>s('calf_race',e.target.value)}>{H.RACES.map(r=><option key={r}>{r}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Sexo"><Select value={f.calf_sex} onChange={e=>s('calf_sex',e.target.value)}><option>Macho</option><option>Fêmea</option></Select></Field>
      <Field label="Peso (kg)" required><Input type="number" step="0.1" value={f.birth_weight} onChange={e=>s('birth_weight',e.target.value)}/></Field>
    </FormRow>
    <Field label="Data do Nascimento" required><Input type="date" value={f.birth_date} onChange={e=>s('birth_date',e.target.value)}/></Field>
    <FormRow>
      <Field label="Pasto"><Select value={f.pasture_id} onChange={e=>s('pasture_id',e.target.value)}><option value="">—</option>{pastures.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</Select></Field>
      <Field label="Lote"><Select value={f.lot_id} onChange={e=>s('lot_id',e.target.value)}><option value="">—</option>{lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Touro / Pai"><Input value={f.bull_name} onChange={e=>s('bull_name',e.target.value)}/></Field>
      <Field label="Raça do Touro"><Select value={f.bull_race} onChange={e=>s('bull_race',e.target.value)}><option value="">—</option>{H.RACES.map(r=><option key={r}>{r}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Brinco Fazenda"><Input value={f.farm_tag} onChange={e=>s('farm_tag',e.target.value)}/></Field>
      <Field label="Brinco CIDASC"><Input value={f.official_tag} onChange={e=>s('official_tag',e.target.value)}/></Field>
    </FormRow>
    <Field label="Medicações"><Input value={f.medications} onChange={e=>s('medications',e.target.value)}/></Field>
    <PhotoField label="📷 Foto da Mãe" value={f.cow_photo} onChange={v=>s('cow_photo',v)}/>
    <PhotoField label="📷 Foto do Bezerro" value={f.calf_photo} onChange={v=>s('calf_photo',v)}/>
    <Field label="Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)}/></Field>
    <Field label="Colaborador"><Select value={f.collaborator_id} onChange={e=>s('collaborator_id',e.target.value)}>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</Select></Field>
    <FormActions onSave={()=>{
      if(!f.mother_id)return alert('Selecione a mãe no Inventário');
      const mother=DB.findAnimalByIdentifier(f.mother_id);
      if(!mother)return alert('A mãe "'+f.mother_id+'" não está no Inventário ativo.\nCadastre a vaca em Inventário antes de registrar o nascimento.');
      if(!f.calf_id)return alert('ID do bezerro é obrigatório');
      if(!f.birth_weight)return alert('Peso é obrigatório');
      onSave(f);

}

/* ═══ MORTALIDADE ═══ */
function Mortality({user}){
  const[items,setItems]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);
  const lots=DB.get('lots');
  const pastures=DB.get('pastures');
  const users=DB.get('users');

  useEffect(()=>{setItems([...DB.get('deaths')].sort((a,b)=>(b.death_date||'').localeCompare(a.death_date||'')));},[rev]);

  function save(data){
    if(editing){
      DB.update('deaths',editing.id,data);
    } else {
      const deathRec=DB.insert('deaths',{...data,collaborator_id:data.collaborator_id||user.id});
      // Marcar animal como "saiu" e criar exit
      const animal=DB.findAnimalByIdentifier(data.animal_id);
      if(animal&&animal.status!=='saiu'){
        DB.update('animals',animal.id,{status:'saiu',exit_date:data.death_date,exit_reason:'morte'});
        DB.insert('animal_exits',{
          animal_id:animal.id,
          identifier:animal.identifier,
          date:data.death_date,
          reason:'morte',
          notes:'Registro automático de Mortalidade. Causa: '+(data.cause||'—'),
          death_id:deathRec.id,
          collaborator_id:data.collaborator_id||user.id,
        });
      }
    }
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }
  function del(id){if(!confirm('Excluir?'))return;DB.delete('deaths',id);setRev(r=>r+1);setDetail(null);}

  if(detail){
    const lot=lots.find(l=>l.id===detail.lot_id);
    const past=pastures.find(p=>p.id===detail.pasture_id);
    const col=users.find(u=>u.id===detail.collaborator_id);
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title="Detalhe da Mortalidade" onBack={()=>setDetail(null)}
        action={user.role==='admin'&&<div style={{display:'flex',gap:8}}>
          <Btn size="sm" variant="secondary" onClick={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}>Editar</Btn>
          <Btn size="sm" variant="danger" onClick={()=>del(detail.id)}>Excluir</Btn>
        </div>}/>
      {detail.photo&&<div style={{marginBottom:12,borderRadius:12,overflow:'hidden',border:'1px solid #e5e7eb'}}><img src={detail.photo} style={{width:'100%',maxHeight:260,objectFit:'cover'}}/></div>}
      <Card style={{marginBottom:12}}>
        <CardHeader title="Identificação" icon="✝" action={<SyncBadge status={detail.sync_status}/>}/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="ID Animal" value={detail.animal_id}/>
          <Info label="Categoria" value={detail.category}/>
          <Info label="Data" value={H.fmtDate(detail.death_date)}/>
          <Info label="Safra" value={H.getSeason(detail.death_date)}/>
          <Info label="Causa" value={<Badge color="red">{detail.cause}</Badge>}/>
          <Info label="Colaborador" value={col?.name||'—'}/>
          <Info label="Lote" value={lot?.name||'—'}/>
          <Info label="Pasto" value={past?.name||'—'}/>
        </div>
      </Card>
      {detail.fact&&<Card style={{marginBottom:12}}>
        <CardHeader title="Fato ocorrido" icon="📝"/>
        <div style={{padding:'14px 16px',fontSize:13,color:'#374151',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{detail.fact}</div>
      </Card>}
      {detail.notes&&<Card><CardHeader title="Observações"/><div style={{padding:'14px 16px',fontSize:13,color:'#374151',whiteSpace:'pre-wrap'}}>{detail.notes}</div></Card>}
    </div>;
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="✝ Mortalidade" sub={items.length+' registros'} action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}/>
    <Card>
      {items.length===0
        ? <EmptyState icon="✝" text="Sem mortalidades registradas"/>
        : items.map(m=>{
            const lot=lots.find(l=>l.id===m.lot_id);
            return <ListItem key={m.id} onClick={()=>setDetail(m)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <strong style={{fontSize:13}}>{m.animal_id}</strong>
                    <Badge color="red">{m.cause}</Badge>
                  </div>
                  <p style={{fontSize:11,color:'#6b7280'}}>{m.category} · {lot?.name||'—'} · {H.fmtDate(m.death_date)}</p>
                  {m.fact&&<p style={{fontSize:11,color:'#9ca3af',marginTop:2,fontStyle:'italic'}}>"{m.fact.slice(0,80)}{m.fact.length>80?'...':''}"</p>}
                </div>
                <SyncBadge status={m.sync_status}/>
              </div>
            </ListItem>;
          })
      }
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar':'Nova Mortalidade'} size="lg">
      <MortalityForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}} lots={lots} pastures={pastures} users={users} user={user}/>
    </Modal>
  </div>;
}

function MortalityForm({initial,onSave,onCancel,lots,pastures,users,user}){

    animal_id:'',category:'Vacas',lot_id:lots[0]?.id||'',pasture_id:pastures[0]?.id||'',

  }
  return <>

      value={f.animal_id} onChange={pickAnimal}

      <Field label="Categoria"><Select value={f.category} onChange={e=>s('category',e.target.value)}>{H.CATS.map(c=><option key={c}>{c}</option>)}</Select></Field>
      <Field label="Data" required><Input type="date" value={f.death_date} onChange={e=>s('death_date',e.target.value)}/></Field>
    </FormRow>
    <FormRow>
      <Field label="Causa"><Select value={f.cause} onChange={e=>s('cause',e.target.value)}>{H.DCAUSES.map(c=><option key={c}>{c}</option>)}</Select></Field>
      <Field label="Lote"><Select value={f.lot_id} onChange={e=>s('lot_id',e.target.value)}><option value="">—</option>{lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Select></Field>
    </FormRow>
    <Field label="Pasto"><Select value={f.pasture_id} onChange={e=>s('pasture_id',e.target.value)}><option value="">—</option>{pastures.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</Select></Field>
    <Field label="Fato ocorrido / Descrição detalhada" hint="Descreva sintomas, tratamento, circunstâncias">
      <Textarea rows={4} value={f.fact} onChange={e=>s('fact',e.target.value)} placeholder="Ex: Animal apresentou sintomas de timpanismo após entrar no pasto novo..."/>
    </Field>
    <PhotoField label="📷 Foto (opcional)" value={f.photo} onChange={v=>s('photo',v)}/>
    <Field label="Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)}/></Field>
    <Field label="Colaborador"><Select value={f.collaborator_id} onChange={e=>s('collaborator_id',e.target.value)}>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</Select></Field>
    <FormActions onSave={()=>{
      if(!f.animal_id)return alert('Selecione o animal no Inventário');
      if(!initial){
        const a=DB.findAnimalByIdentifier(f.animal_id);
        if(!a)return alert('Animal "'+f.animal_id+'" não está no Inventário. Cadastre-o primeiro.');
        if((a.status||'ativo')!=='ativo')return alert('Animal "'+f.animal_id+'" já está marcado como SAIU. Não é possível registrar morte em animal inativo.');
      }
      if(!f.death_date)return alert('Data é obrigatória');
      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}

function Pastures({user}){
  const[items,setItems]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);
  const[showMovForm,setShowMovForm]=useState(false);

  useEffect(()=>{setItems(DB.get('pastures').sort((a,b)=>a.name.localeCompare(b.name)));},[rev]);

  function save(data){
    if(editing)DB.update('pastures',editing.id,data);
    else DB.insert('pastures',data);
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }
  function del(id){if(!confirm('Excluir?'))return;DB.delete('pastures',id);setRev(r=>r+1);setDetail(null);}

  if(detail){
    const lots=DB.get('lots');
    const movs=DB.where('pasture_movements',m=>m.pasture_id===detail.id).sort((a,b)=>(b.entry_date||'').localeCompare(a.entry_date||''));
    const current=movs.find(m=>!m.exit_date);
    const totalDays=movs.reduce((s,m)=>{if(!m.entry_date)return s;const end=m.exit_date||TODAY;const d=H.daysBetween(m.entry_date,end);return s+(d>0?d:0);},0);

    function saveMov(data){
      DB.insert('pasture_movements',{...data,pasture_id:detail.id,collaborator_id:user.id});
      setRev(r=>r+1);setShowMovForm(false);
    }
    function closeMov(movId){
      if(!confirm('Registrar saída hoje?'))return;
      DB.update('pasture_movements',movId,{exit_date:TODAY});setRev(r=>r+1);
    }

    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={detail.name} sub={detail.description} onBack={()=>setDetail(null)}
        action={user.role==='admin'&&<div style={{display:'flex',gap:8}}>
          <Btn size="sm" variant="secondary" onClick={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}>Editar</Btn>
          <Btn size="sm" variant="danger" onClick={()=>del(detail.id)}>Excluir</Btn>
        </div>}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <StatCard label="Área" value={detail.area_ha?detail.area_ha+' ha':'—'} color="green" icon="📐"/>
        <StatCard label="Status" value={detail.status} color={detail.status==='Ativo'?'green':'amber'}/>
        <StatCard label="Capacidade" value={detail.capacity||'—'} sub="animais" color="blue"/>
        <StatCard label="Dias ocupado (total)" value={totalDays} color="amber"/>
      </div>
      {current&&<Card style={{marginBottom:12}}>
        <CardHeader title="Ocupação atual" icon="🐂"/>
        <div style={{padding:'12px 16px'}}>
          <strong style={{fontSize:14,color:'#166534'}}>{lots.find(l=>l.id===current.lot_id)?.name||'—'}</strong>
          <p style={{fontSize:12,color:'#6b7280',marginTop:2}}>Entrou em {H.fmtDate(current.entry_date)} ({H.daysBetween(current.entry_date,TODAY)} dias)</p>
          {user.role==='admin'&&<Btn size="sm" variant="secondary" style={{marginTop:10}} onClick={()=>closeMov(current.id)}>Registrar saída hoje</Btn>}
        </div>
      </Card>}
      <Btn onClick={()=>setShowMovForm(true)} fullWidth style={{marginBottom:16}}>+ Registrar entrada de lote</Btn>
      <Card>
        <CardHeader title="Histórico de uso" icon="📅" action={<Badge color="blue">{movs.length}</Badge>}/>
        {movs.length===0 ? <EmptyState text="Sem movimentações"/> :
          movs.map(m=>{
            const lot=lots.find(l=>l.id===m.lot_id);
            const days=m.exit_date?H.daysBetween(m.entry_date,m.exit_date):H.daysBetween(m.entry_date,TODAY);
            return <ListItem key={m.id}>
              <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                <div>
                  <strong style={{fontSize:13}}>{lot?.name||'—'}</strong> <Badge color="gray">Safra {H.getSeason(m.entry_date)}</Badge>
                  <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>{H.fmtDate(m.entry_date)} {m.exit_date?'→ '+H.fmtDate(m.exit_date):'→ em uso'} · <strong>{days} dias</strong></p>
                </div>
                <Badge color={m.exit_date?'gray':'green'}>{m.exit_date?'Concluída':'Atual'}</Badge>
              </div>
            </ListItem>;
          })
        }
      </Card>
      <Modal open={showMovForm} onClose={()=>setShowMovForm(false)} title="Registrar entrada de lote">
        <MovForm lots={lots} onSave={saveMov} onCancel={()=>setShowMovForm(false)}/>
      </Modal>
    </div>;
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="🌿 Pastos" sub={items.length+' pasto'+(items.length!==1?'s':'')} action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}/>
    <PasturesList items={items} onDetail={setDetail}/>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar':'Novo Pasto'}>
      <PastureForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
  </div>;
}

function PasturesList({items,onDetail}){
  const[query,setQuery]=useState('');
  const[filterStatus,setFilterStatus]=useState('all');
  const[sort,setSort]=useState('name-asc');

  // Somatórias
  const totalHa=items.reduce((s,p)=>s+(parseFloat(p.area_ha)||0),0);
  const totalCap=items.reduce((s,p)=>s+(parseInt(p.capacity)||0),0);
  const activeCount=items.filter(p=>p.status==='Ativo').length;
  const restingCount=items.filter(p=>p.status==='Em descanso').length;

  // Filtros + ordenação
  const filtered=useMemo(()=>{
    let arr=items.slice();
    if(query){const q=query.toLowerCase();arr=arr.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q));}
    if(filterStatus!=='all')arr=arr.filter(p=>p.status===filterStatus);
    const[key,dir]=sort.split('-');
    arr.sort((a,b)=>{
      let va=a[key],vb=b[key];
      if(key==='area_ha'||key==='capacity'){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
      else{va=String(va||'').toLowerCase();vb=String(vb||'').toLowerCase();}
      if(va<vb)return dir==='asc'?-1:1;
      if(va>vb)return dir==='asc'?1:-1;
      return 0;
    });
    return arr;
  },[items,query,filterStatus,sort]);

  return <>
    {/* Painel de somatórias */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <StatCard label="Área total" value={totalHa.toFixed(2)+' ha'} color="green" icon="📐" sub={items.length+' piquete'+(items.length!==1?'s':'')}/>
      <StatCard label="Capacidade total" value={totalCap+' animais'} color="blue" icon="🐂"/>
      <StatCard label="Ativos" value={activeCount} color="green"/>
      <StatCard label="Em descanso" value={restingCount} color="amber"/>
    </div>

    {/* Busca e filtros */}
    <Card style={{marginBottom:12,padding:12}}>
      <Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Buscar pasto por nome ou descrição..." style={{marginBottom:8}}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <Select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="all">Todos os status</option>
          {H.PST.map(s=><option key={s} value={s}>{s}</option>)}
        </Select>
        <Select value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="name-asc">Nome (A→Z)</option>
          <option value="name-desc">Nome (Z→A)</option>
          <option value="area_ha-desc">Maior área primeiro</option>
          <option value="area_ha-asc">Menor área primeiro</option>
          <option value="capacity-desc">Maior capacidade</option>
          <option value="capacity-asc">Menor capacidade</option>
          <option value="status-asc">Status</option>
        </Select>
      </div>
    </Card>

    {filtered.length>0&&(query||filterStatus!=='all')&&<p style={{fontSize:11,color:'#6b7280',textAlign:'center',marginBottom:8}}>
      Mostrando {filtered.length} de {items.length} pasto{items.length!==1?'s':''}
    </p>}

    <Card>
      {filtered.length===0
        ? <EmptyState icon="🌿" text={query||filterStatus!=='all'?'Nenhum pasto encontrado com os filtros':'Sem pastos'}/>
        : filtered.map(p=>
            <ListItem key={p.id} onClick={()=>onDetail(p)}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <strong style={{fontSize:13}}>{p.name}</strong>
                  <Badge color={p.status==='Ativo'?'green':p.status==='Em descanso'?'amber':'gray'}>{p.status}</Badge>
                  {p.area_ha&&<Badge color="blue">{p.area_ha} ha</Badge>}
                </div>
                <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>
                  Cap: {p.capacity||'—'}{p.description?' · '+p.description:''}
                </p>
              </div>
            </ListItem>
          )
      }
    </Card>
  </>;
}

/* ═══ CONFIGURAÇÕES ═══ */
/* ═══ SINCRONIZAÇÃO HÍBRIDA (Drive/Dropbox/OneDrive via arquivo) ═══
   Estratégia:
   - Arquivo fixo: pecuaria-sync.json
   - Timestamp global em meta._last_modified
   - Timestamp por registro em updated_at
   - 3 modos: SUBSTITUIR (sobrescreve tudo), MESCLAR (merge inteligente), CANCELAR
   - Merge: para cada tabela, comparamos por id; o mais recente (updated_at) vence
*/
function DriveSyncCard({farmName}){
  const fileRef=useRef();
  const[lastSync,setLastSync]=useState(localStorage.getItem('pm_last_sync_at')||'');
  const[showImport,setShowImport]=useState(false);
  const[importData,setImportData]=useState(null);
  const[mode,setMode]=useState('merge');

  function getLocalSnapshot(){
    const raw=localStorage.getItem('pm_data_v1');
    return raw?JSON.parse(raw):{};
  }

  function exportSync(){
    try{
      const data=getLocalSnapshot();
      const now=new Date().toISOString();
      const pkg={
        _pm_sync:true,
        _version:'1.0',
        _last_modified:now,
        _farm:farmName,
        _device:navigator.userAgent.substring(0,80),
        data,
      };
      const blob=new Blob([JSON.stringify(pkg,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='pecuaria-sync.json';a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1500);
      localStorage.setItem('pm_last_sync_at',now);
      setLastSync(now);
      alert('✅ Arquivo "pecuaria-sync.json" gerado!\n\nAgora salve esse arquivo na sua pasta compartilhada (Google Drive / Dropbox / OneDrive).\n\nNos outros dispositivos, baixe esse mesmo arquivo e clique em "↑ Importar do Drive".');
    }catch(e){alert('Erro: '+e.message);}
  }

  function handleImport(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed._pm_sync&&!parsed._pm_backup){
          alert('Arquivo não é um arquivo de sync do PecuáriaManager.');
          return;
        }
        if(!parsed.data||!Array.isArray(parsed.data.users)){
          alert('Arquivo corrompido ou estrutura inválida.');
          return;
        }
        setImportData(parsed);
        setShowImport(true);
      }catch(err){alert('Erro ao ler: '+err.message);}
    };
    reader.readAsText(file);
    e.target.value='';
  }

  function applyImport(){
    if(!importData)return;
    const local=getLocalSnapshot();
    const remote=importData.data;

    if(mode==='replace'){
      localStorage.setItem('pm_data_v1',JSON.stringify(remote));
    } else if(mode==='merge'){
      const merged=mergeData(local,remote);
      localStorage.setItem('pm_data_v1',JSON.stringify(merged));
    }

    const now=new Date().toISOString();
    localStorage.setItem('pm_last_sync_at',now);
    alert('✅ Sincronização concluída!\n\nA página vai recarregar para mostrar os dados atualizados.');
    setTimeout(()=>location.reload(),300);
  }

  // MERGE INTELIGENTE: combina os dois bancos, registro mais novo vence
  function mergeData(local,remote){
    const result={...local};
    const TABLES=['users','animals','animal_lot_history','animal_exits','births','deaths','health_managements','herbicide_applications','mineral_supplementations','weighings','reproductive_protocols','pregnancy_diagnoses','feces_records','inventory_adjustments','pasture_movements','revenues','costs','lots','pastures'];
    TABLES.forEach(t=>{
      const localArr=Array.isArray(local[t])?local[t]:[];
      const remoteArr=Array.isArray(remote[t])?remote[t]:[];
      const map=new Map();
      // Adiciona locais primeiro
      localArr.forEach(r=>map.set(r.id,r));
      // Para cada remoto: se id já existe e remoto é mais novo, substitui; se não existe, adiciona
      remoteArr.forEach(rr=>{
        const lr=map.get(rr.id);
        if(!lr){map.set(rr.id,rr);return;}
        const lt=lr.updated_at||lr.created_at||'';
        const rt=rr.updated_at||rr.created_at||'';
        if(rt>lt)map.set(rr.id,rr);
      });
      result[t]=Array.from(map.values());
    });
    // Settings: pega o mais novo
    if(remote.settings){
      const ls=local.settings?._updated_at||'';
      const rs=remote.settings?._updated_at||importData._last_modified||'';
      if(rs>ls)result.settings=remote.settings;
    }
    return result;
  }

  // Stats da diferença
  let diff=null;
  if(importData){
    const local=getLocalSnapshot();
    const remote=importData.data;
    const TABLES=['animals','births','deaths','weighings','pregnancy_diagnoses','reproductive_protocols','revenues','costs','animal_exits'];
    diff={};
    TABLES.forEach(t=>{
      const lc=(local[t]||[]).length;
      const rc=(remote[t]||[]).length;
      if(lc!==rc)diff[t]={local:lc,remote:rc};
    });
    diff.localDate=localStorage.getItem('pm_last_sync_at')||'(nunca)';
    diff.remoteDate=importData._last_modified||'(desconhecido)';
    diff.remoteDevice=importData._device||'';
  }

  return <Card style={{marginBottom:16}}>
    <CardHeader title="Sincronização entre dispositivos" icon="🔄"/>
    <div style={{padding:16}}>
      <Alert type="info" style={{marginBottom:12}}>
        <strong>Como sincronizar entre celulares e computadores:</strong>
        <ol style={{margin:'8px 0 0 18px',padding:0,fontSize:12,lineHeight:1.7}}>
          <li>Crie uma pasta compartilhada no Google Drive, Dropbox ou OneDrive</li>
          <li>Em <strong>cada dispositivo</strong> clique em <strong>↓ Exportar para Drive</strong> e salve o arquivo nessa pasta</li>
          <li>Quando outro dispositivo precisar dos dados, baixe esse arquivo do Drive e clique em <strong>↑ Importar do Drive</strong></li>
          <li>O sistema detecta automaticamente se há mudanças mais novas e oferece <strong>mesclar</strong> ou <strong>substituir</strong></li>
        </ol>
      </Alert>

      {lastSync&&<p style={{fontSize:11,color:'#6b7280',marginBottom:10}}>📅 Última sincronização: <strong>{new Date(lastSync).toLocaleString('pt-BR')}</strong></p>}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        <Btn onClick={exportSync} fullWidth>↓ Exportar para Drive</Btn>
        <Btn variant="secondary" onClick={()=>fileRef.current.click()} fullWidth>↑ Importar do Drive</Btn>
      </div>
      <input ref={fileRef} type="file" accept=".json,application/json" style={{display:'none'}} onChange={handleImport}/>

      <details style={{marginTop:8,fontSize:11}}>
        <summary style={{cursor:'pointer',color:'#6b7280'}}>💡 Dicas de uso</summary>
        <div style={{marginTop:8,padding:10,background:'#f9fafb',borderRadius:6,color:'#4b5563',lineHeight:1.6}}>
          <p>• <strong>Mesclar (recomendado)</strong>: junta os dois bancos. Registros editados em ambos: a versão mais recente vence (por data de modificação).</p>
          <p>• <strong>Substituir</strong>: apaga seus dados locais e usa só os do Drive.</p>
          <p>• Se duas pessoas editarem o mesmo registro ao mesmo tempo, vence quem salvou por último — então é melhor combinar quem edita o quê.</p>
          <p>• O nome do arquivo é sempre <code>pecuaria-sync.json</code> — substituir o anterior na pasta compartilhada é o esperado.</p>
        </div>
      </details>
    </div>

    {/* MODAL DE COMPARAÇÃO ANTES DE IMPORTAR */}
    <Modal open={showImport} onClose={()=>{setShowImport(false);setImportData(null);}} title="Comparação antes de importar" size="lg">
      {diff&&<>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <div style={{padding:10,background:'#f0fdf4',borderRadius:8}}>
            <p style={{fontSize:11,fontWeight:700,color:'#166534'}}>SEU APARELHO</p>
            <p style={{fontSize:11,color:'#374151',marginTop:4}}>Última sync: <strong>{diff.localDate==='(nunca)'?'(nunca)':new Date(diff.localDate).toLocaleString('pt-BR')}</strong></p>
          </div>
          <div style={{padding:10,background:'#eff6ff',borderRadius:8}}>
            <p style={{fontSize:11,fontWeight:700,color:'#1e40af'}}>ARQUIVO IMPORTADO</p>
            <p style={{fontSize:11,color:'#374151',marginTop:4}}>Modificado: <strong>{diff.remoteDate==='(desconhecido)'?diff.remoteDate:new Date(diff.remoteDate).toLocaleString('pt-BR')}</strong></p>
          </div>
        </div>

        {Object.keys(diff).filter(k=>k!=='localDate'&&k!=='remoteDate'&&k!=='remoteDevice').length>0
          ? <Card style={{marginBottom:12}}>
              <CardHeader title="Diferenças encontradas"/>
              {Object.entries(diff).filter(([k])=>k!=='localDate'&&k!=='remoteDate'&&k!=='remoteDevice').map(([k,v])=>{
                const labels={animals:'🐂 Animais',births:'🐮 Nascimentos',deaths:'✝ Mortalidade',weighings:'⚖️ Pesagens',pregnancy_diagnoses:'🤰 Gestação',reproductive_protocols:'🔬 Reprodução',revenues:'💰 Receitas',costs:'💵 Custos',animal_exits:'📤 Saídas'};
                return <div key={k} style={{padding:'8px 16px',borderBottom:'1px solid #f3f4f6',display:'grid',gridTemplateColumns:'1fr auto auto',gap:8,fontSize:12,alignItems:'center'}}>
                  <span>{labels[k]||k}</span>
                  <Badge color="green">{v.local} aqui</Badge>
                  <Badge color="blue">{v.remote} arquivo</Badge>
                </div>;
              })}
            </Card>
          : <Alert type="success">Quantidades de registros são idênticas. Pode haver edições de conteúdo a sincronizar.</Alert>
        }

        <Field label="Modo de sincronização">
          <Select value={mode} onChange={e=>setMode(e.target.value)}>
            <option value="merge">🔀 MESCLAR (recomendado) — junta os dois bancos, mais recente vence</option>
            <option value="replace">⚠️ SUBSTITUIR TUDO — apaga local e usa só o do arquivo</option>
          </Select>
        </Field>

        {mode==='replace'&&<Alert type="error">⚠️ ATENÇÃO: o modo SUBSTITUIR apaga todos os dados deste aparelho. Use apenas se tiver certeza que o arquivo importado é o mais atualizado.</Alert>}

        <FormActions onSave={applyImport} onCancel={()=>{setShowImport(false);setImportData(null);}} saveLabel={mode==='merge'?'🔀 Mesclar':'⚠️ Substituir'}/>
      </>}
    </Modal>
  </Card>;
}
