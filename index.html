/* ─── Tela de Migração: subir dados do localStorage para Supabase ─── */
function MigrationTool({onDone}){
  const[stage,setStage]=useState('idle'); // idle | running | done | wiping
  const[progress,setProgress]=useState([]);
  const[errors,setErrors]=useState([]);
  const[result,setResult]=useState(null);
  const[mode,setMode]=useState('replace'); // 'replace' | 'append'
  const fileRef=useRef();

  async function startFromLocalStorage(){
    const msg=mode==='replace'
      ? '⚠ ATENÇÃO: Modo SUBSTITUIR\n\nIsso vai:\n1. APAGAR todos os dados atuais no Supabase\n2. Subir TUDO do localStorage do navegador\n\nUse essa opção pra evitar duplicatas. Prosseguir?'
      : '🚀 Modo ACRESCENTAR\n\nIsso vai SOMAR os dados do localStorage aos dados existentes no Supabase. Pode criar duplicatas.\n\nProsseguir?';
    if(!confirm(msg))return;
    const raw=localStorage.getItem('pm_data_v1');
    if(!raw){alert('Nenhum dado local encontrado neste navegador.\n\nUse a opção "Carregar arquivo de backup".');return;}
    await runMigration(JSON.parse(raw));
  }

  async function handleFileUpload(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        const data=parsed.data||parsed;
        if(!data||(!Array.isArray(data.animals)&&!Array.isArray(data.births)&&!Array.isArray(data.pastures))){
          alert('Arquivo não parece ser um backup válido do PecuáriaManager.');
          return;
        }
        const counts={
          Animais:(data.animals||[]).length,
          Nascimentos:(data.births||[]).length,
          Pastos:(data.pastures||[]).length,
          Lotes:(data.lots||[]).length,
          Pesagens:(data.weighings||[]).length,
          Reprodução:(data.reproductive_protocols||[]).length,
          Gestação:(data.pregnancy_diagnoses||[]).length,
          Custos:(data.costs||[]).length,
          Receitas:(data.revenues||[]).length,
        };
        const summary=Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>`  ${k}: ${v}`).join('\n');
        const modeMsg=mode==='replace'
          ? '⚠ MODO SUBSTITUIR — Os dados atuais no Supabase serão APAGADOS antes da importação.'
          : '➕ MODO ACRESCENTAR — Pode gerar duplicatas se já houver dados.';
        if(!confirm(`Arquivo lido com sucesso!\n\nConteúdo:\n${summary}\n\n${modeMsg}\n\nProsseguir?`))return;
        await runMigration(data);
      }catch(err){
        alert('Erro ao ler arquivo: '+err.message);
      }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  async function runMigration(data){
    setStage('running');setProgress([]);setErrors([]);
    try{
      const r=await window.SupaDB.migrateFromLocal(data,(p)=>{
        setProgress(prev=>[...prev,p]);
      },{replace:mode==='replace'});
      setResult(r);setStage('done');
      if(onDone)onDone(r);
    }catch(e){
      setErrors([{label:'Geral',error:e.message||String(e)}]);
      setStage('done');
    }
  }

  async function doReset(){
    const c1=confirm('🚨 ATENÇÃO MÁXIMA — RESETAR TUDO\n\nIsso vai APAGAR PERMANENTEMENTE:\n• Todos os animais\n• Todos os pastos\n• Todos os lotes\n• Todos os nascimentos, mortes, pesagens\n• Toda a reprodução, gestação\n• Todos os manejos\n• Todas as receitas e custos\n\nApenas usuários e configurações ficam.\n\nTem CERTEZA ABSOLUTA?');
    if(!c1)return;
    const c2=prompt('Digite CONFIRMAR (em maiúsculas) pra prosseguir:');
    if(c2!=='CONFIRMAR'){alert('Cancelado. Você precisa digitar exatamente CONFIRMAR.');return;}
    setStage('wiping');setProgress([]);setErrors([]);
    try{
      const r=await window.SupaDB.wipeAll((p)=>{
        setProgress(prev=>[...prev,{...p,count:'apagado'}]);
      });
      setResult({success:r.success.map(s=>({...s,count:0,wiped:true})),errors:r.errors});
      setStage('done');
    }catch(e){
      setErrors([{label:'Geral',error:e.message||String(e)}]);
      setStage('done');
    }
  }

  return <Card style={{marginBottom:16}}>
    <CardHeader title="Importar / Resetar Dados" icon="🔄"/>
    <div style={{padding:16}}>
      {stage==='idle'&&<>
        <Alert type="info">
          <strong>Importar backup:</strong> sobe os dados de um arquivo .json para o Supabase.
        </Alert>

        {/* Toggle modo: substituir ou acrescentar */}
        <div style={{display:'flex',gap:4,marginBottom:14,background:'#f3f4f6',padding:4,borderRadius:10}}>
          <button onClick={()=>setMode('replace')}
            style={{flex:1,padding:10,background:mode==='replace'?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:mode==='replace'?600:400,color:mode==='replace'?'#1e40af':'#6b7280'}}>
            🔁 Substituir<br/><span style={{fontSize:10,fontWeight:400}}>(sem duplicatas)</span>
          </button>
          <button onClick={()=>setMode('append')}
            style={{flex:1,padding:10,background:mode==='append'?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:mode==='append'?600:400,color:mode==='append'?'#92400e':'#6b7280'}}>
            ➕ Acrescentar<br/><span style={{fontSize:10,fontWeight:400}}>(pode duplicar)</span>
          </button>
        </div>

        {mode==='replace'&&<Alert type="warning">
          <strong>Modo SUBSTITUIR ativo:</strong> os dados atuais no Supabase serão APAGADOS antes da importação. Recomendado pra evitar duplicatas.
        </Alert>}

        <div style={{display:'grid',gap:12,marginBottom:14,marginTop:12}}>
          <div style={{padding:14,background:'#f0fdf4',border:'1px solid #86efac',borderRadius:10}}>
            <strong style={{fontSize:13,color:'#166534'}}>📂 Importar arquivo de backup (.json)</strong>
            <p style={{fontSize:12,color:'#374151',margin:'6px 0 10px'}}>
              Recomendado se você tem um arquivo de backup salvo do app local.
            </p>
            <Btn onClick={()=>fileRef.current.click()} fullWidth>📂 Carregar arquivo de backup</Btn>
            <input ref={fileRef} type="file" accept=".json,application/json" style={{display:'none'}} onChange={handleFileUpload}/>
          </div>

          <div style={{padding:14,background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:10}}>
            <strong style={{fontSize:13,color:'#1e3a8a'}}>💾 Migrar do navegador atual</strong>
            <p style={{fontSize:12,color:'#374151',margin:'6px 0 10px'}}>
              Use se você tem dados salvos neste navegador (modo Local).
            </p>
            <Btn variant="secondary" onClick={startFromLocalStorage} fullWidth>💾 Migrar do localStorage</Btn>
          </div>
        </div>

        <div style={{borderTop:'2px solid #fee2e2',marginTop:18,paddingTop:18}}>
          <div style={{padding:14,background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:10}}>
            <strong style={{fontSize:13,color:'#991b1b'}}>🚨 Resetar tudo (zona de perigo)</strong>
            <p style={{fontSize:12,color:'#374151',margin:'6px 0 10px'}}>
              APAGA todos os dados do Supabase. Útil pra começar do zero.
              Usuários e configurações ficam.
            </p>
            <Btn variant="danger" onClick={doReset} fullWidth>🗑 Resetar todos os dados</Btn>
          </div>
        </div>
      </>}
      {(stage==='running'||stage==='wiping')&&<>
        <Alert type="warning">⏳ {stage==='wiping'?'Limpando dados antigos...':'Importando...'} NÃO feche essa janela.</Alert>
        {progress.map((p,i)=><div key={i} style={{padding:'6px 12px',borderBottom:'1px solid #f3f4f6',fontSize:12,display:'flex',justifyContent:'space-between'}}>
          <span>{p.table==='__wipe__'?'🗑':'✅'} {p.label}</span>
          <strong>{p.count} {typeof p.count==='number'?'reg.':''}</strong>
        </div>)}
      </>}
      {stage==='done'&&<>
        {result&&result.success.length>0&&<Alert type="success">
          <strong>✅ {result.success[0]?.wiped?'Dados apagados!':'Concluído!'}</strong>
          <ul style={{margin:'6px 0 0 18px',fontSize:12}}>{result.success.map((s,i)=><li key={i}>
            {s.label}{s.count!==undefined&&!s.wiped?': '+s.count:''}
            {s.skipped>0&&<span style={{color:'#92400e'}}> (⚠ {s.skipped} pulados)</span>}
            {s.errors>0&&<span style={{color:'#991b1b'}}> (❌ {s.errors} erros)</span>}
          </li>)}</ul>
        </Alert>}
        {result&&result.errors.length>0&&<Alert type="error">
          <strong>⚠ Alguns erros:</strong>
          <ul style={{margin:'6px 0 0 18px',fontSize:12}}>{result.errors.map((s,i)=><li key={i}><strong>{s.label}:</strong> {s.error}</li>)}</ul>
        </Alert>}
        {errors.length>0&&errors.map((e,i)=><Alert key={i} type="error">{e.error}</Alert>)}
        <Btn onClick={()=>{setStage('idle');setResult(null);setProgress([]);setErrors([]);}} variant="secondary" fullWidth>Voltar</Btn>
      </>}
    </div>
  </Card>;
}

/* ─── Tela de gestão de colaboradores online ─── */
function OnlineCollaborators({user}){
  const[users,setUsers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState('');
  const[rev,setRev]=useState(0);
  const[showCreate,setShowCreate]=useState(false);
  const[editing,setEditing]=useState(null);

  useEffect(()=>{
    (async()=>{
      try{setLoading(true);const list=await window.SupaDB.listUsers();setUsers(list);}
      catch(e){setErr(e.message);}
      finally{setLoading(false);}
    })();
  },[rev]);

  async function toggleActive(u){
    try{
      await window.SupaDB.update('profiles',u.id,{active:!u.active});
      setRev(r=>r+1);
    }catch(e){alert('Erro: '+e.message);}
  }
  async function setRole(u,role){
    try{
      await window.SupaDB.update('profiles',u.id,{role});
      setRev(r=>r+1);
    }catch(e){alert('Erro: '+e.message);}
  }

  async function saveProfile(u,patch){
    try{
      await window.SupaDB.update('profiles',u.id,patch);
      setEditing(null);
      setRev(r=>r+1);
    }catch(e){alert('Erro ao salvar: '+e.message);}
  }

  async function sendPasswordReset(u){
    if(!confirm('Enviar email de redefinição de senha para "'+u.email+'"?\n\nO usuário receberá um link para criar nova senha.'))return;
    try{
      const{error}=await window.SUPA.client.auth.resetPasswordForEmail(u.email);
      if(error)throw error;
      alert('✅ Email enviado para '+u.email+'\n\nO usuário deve verificar a caixa de entrada (e spam) e clicar no link.');
    }catch(e){alert('Erro: '+e.message);}
  }

  async function createUser(data){
    try{
      // Usar signUp (cria conta E perfil via trigger)
      const{data:authData,error}=await window.SUPA.client.auth.signUp({
        email:data.email,
        password:data.password,
      });
      if(error)throw error;

      // Aguardar um pouco para o trigger criar o perfil
      await new Promise(r=>setTimeout(r,1500));

      // Atualizar perfil com nome e role
      if(authData.user){
        try{
          await window.SupaDB.update('profiles',authData.user.id,{
            name:data.name,
            role:data.role,
            active:true,
          });
        }catch(e){
          // Se o perfil ainda não existe, tentar criar manualmente
          try{
            await window.SupaDB.insert('profiles',{
              id:authData.user.id,
              email:data.email,
              name:data.name,
              role:data.role,
              active:true,
            });
          }catch(e2){
            console.warn('Perfil pode ser criado automaticamente:',e2.message);
          }
        }
      }

      setShowCreate(false);
      setRev(r=>r+1);
      alert('✅ Usuário "'+data.name+'" criado!\n\n'+
        (authData.user?.email_confirmed_at?'Pode fazer login imediatamente.':
         'Um email de confirmação pode ter sido enviado para '+data.email+' (depende da configuração do Supabase).')+
        '\n\nSenha: '+data.password+'\n\nGuarde essa senha e passe para o usuário!');
    }catch(e){
      alert('Erro ao criar usuário: '+e.message+'\n\nDicas:\n• Email já cadastrado?\n• Senha precisa ter no mínimo 6 caracteres');
    }
  }

  async function deactivateUser(u){
    if(u.id===user.id){alert('Você não pode desativar a si mesmo.');return;}
    if(!confirm('🚨 DESATIVAR USUÁRIO\n\nIsso vai impedir que "'+(u.name||u.email)+'" faça login.\n\nObs: o usuário não é apagado permanentemente (apenas admin do Supabase pode fazer isso). Para reativar, basta clicar de novo no botão de status.\n\nProsseguir?'))return;
    try{
      await window.SupaDB.update('profiles',u.id,{active:false});
      setRev(r=>r+1);
    }catch(e){alert('Erro: '+e.message);}
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="👥 Gestão de Usuários" sub={users.length+' usuários cadastrados'}
      action={<Btn onClick={()=>setShowCreate(true)}>+ Novo usuário</Btn>}/>

    {err&&<Alert type="error">{err}</Alert>}

    <Alert type="info">
      <strong>📌 O que você pode fazer:</strong>
      <ul style={{margin:'4px 0 0 18px',fontSize:12,lineHeight:1.6}}>
        <li><strong>Criar</strong> novos usuários (botão acima)</li>
        <li><strong>Editar</strong> nome e função</li>
        <li><strong>Resetar senha</strong> (envia email pro usuário)</li>
        <li><strong>Desativar</strong> (impede login mas mantém dados)</li>
      </ul>
      <p style={{marginTop:6,fontSize:11,color:'#6b7280'}}>⚠ Excluir <em>permanentemente</em> precisa ser feito direto no painel do Supabase (Authentication → Users).</p>
    </Alert>

    {loading?<EmptyState text="Carregando..."/>:
      <Card>
        {users.map(u=>{
          const isMe=u.id===user.id;
          return <ListItem key={u.id}>
            <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
              <div style={{width:40,height:40,borderRadius:999,background:u.role==='admin'?'#fef3c7':'#f0fdf4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{u.role==='admin'?'👑':'👤'}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <strong style={{fontSize:13}}>{u.name||'(sem nome)'}</strong>
                  {isMe&&<Badge color="blue">você</Badge>}
                  {!u.active&&<Badge color="red">desativado</Badge>}
                </div>
                <p style={{fontSize:11,color:'#6b7280'}}>{u.email}</p>
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                <select value={u.role} onChange={e=>setRole(u,e.target.value)} style={{padding:'4px 8px',fontSize:11,border:'1px solid #d1d5db',borderRadius:6}} disabled={isMe}>
                  <option value="collaborator">Colaborador</option>
                  <option value="admin">Admin</option>
                </select>
                <button onClick={()=>setEditing(u)} title="Editar nome" style={{padding:'4px 8px',fontSize:11,border:'1px solid #d1d5db',background:'#fff',borderRadius:6,cursor:'pointer'}}>✏ Editar</button>
                <button onClick={()=>sendPasswordReset(u)} title="Enviar email de redefinição de senha" style={{padding:'4px 8px',fontSize:11,border:'1px solid #d1d5db',background:'#fff',borderRadius:6,cursor:'pointer'}}>🔑 Senha</button>
                <button onClick={()=>toggleActive(u)} disabled={isMe} style={{padding:'4px 8px',fontSize:11,border:'1px solid '+(u.active?'#86efac':'#fca5a5'),background:u.active?'#dcfce7':'#fee2e2',color:u.active?'#166534':'#991b1b',borderRadius:6,cursor:isMe?'not-allowed':'pointer',opacity:isMe?.5:1}}>
                  {u.active?'✅ Ativo':'❌ Inativo'}
                </button>
              </div>
            </div>
          </ListItem>;
        })}
      </Card>
    }

    <Modal open={showCreate} onClose={()=>setShowCreate(false)} title="Criar novo usuário" size="md">
      <CreateUserForm onSave={createUser} onCancel={()=>setShowCreate(false)}/>
    </Modal>

    <Modal open={!!editing} onClose={()=>setEditing(null)} title={editing?'Editar '+editing.email:''} size="md">
      {editing&&<EditUserForm user={editing} onSave={(patch)=>saveProfile(editing,patch)} onCancel={()=>setEditing(null)}/>}
    </Modal>
  </div>;
}

function CreateUserForm({onSave,onCancel}){
  const[f,setF]=useState({name:'',email:'',password:'',role:'collaborator'});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  function gen(){
    const chars='ABCDEFGHJKMNPQRSTUVWXYZ23456789abcdefghjkmnpqrstuvwxyz';
    let p='';for(let i=0;i<10;i++)p+=chars[Math.floor(Math.random()*chars.length)];
    s('password',p);
  }
  return <>
    <Field label="Nome completo" required><Input value={f.name} onChange={e=>s('name',e.target.value)} placeholder="Ex: João Silva"/></Field>
    <Field label="Email" required hint="Será usado para login"><Input type="email" value={f.email} onChange={e=>s('email',e.target.value.toLowerCase().trim())} placeholder="exemplo@email.com"/></Field>
    <Field label="Senha inicial" required hint="Mínimo 6 caracteres. O usuário pode mudar depois.">
      <div style={{display:'flex',gap:6}}>
        <Input value={f.password} onChange={e=>s('password',e.target.value)} placeholder="Mínimo 6 caracteres" style={{flex:1}}/>
        <button type="button" onClick={gen} style={{padding:'8px 12px',background:'#f3f4f6',border:'1px solid #d1d5db',borderRadius:6,cursor:'pointer',fontSize:12}}>🎲 Gerar</button>
      </div>
    </Field>
    <Field label="Função"><Select value={f.role} onChange={e=>s('role',e.target.value)}>
      <option value="collaborator">👤 Colaborador (acesso operacional)</option>
      <option value="admin">👑 Admin (acesso total)</option>
    </Select></Field>

    <Alert type="warning">
      ⚠ <strong>Atenção:</strong> a senha será exibida na próxima tela. Anote ou copie pra passar pro usuário. Ele pode trocar depois usando "🔑 Esqueci minha senha" no login.
    </Alert>

    <FormActions onSave={()=>{
      if(!f.name)return alert('Nome obrigatório');
      if(!f.email||!f.email.includes('@'))return alert('Email inválido');
      if(!f.password||f.password.length<6)return alert('Senha precisa ter no mínimo 6 caracteres');
      onSave(f);
    }} onCancel={onCancel} saveLabel="Criar usuário"/>
  </>;
}

function EditUserForm({user,onSave,onCancel}){
  const[f,setF]=useState({name:user.name||'',role:user.role||'collaborator'});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <>
    <Field label="Nome completo" required><Input value={f.name} onChange={e=>s('name',e.target.value)}/></Field>
    <Field label="Email"><Input value={user.email} disabled hint="Email não pode ser alterado por aqui"/></Field>
    <Field label="Função"><Select value={f.role} onChange={e=>s('role',e.target.value)}>
      <option value="collaborator">👤 Colaborador</option>
      <option value="admin">👑 Admin</option>
    </Select></Field>
    <Alert type="info">💡 Para mudar a senha, use o botão "🔑 Senha" na lista (envia email de redefinição).</Alert>
    <FormActions onSave={()=>{
      if(!f.name)return alert('Nome obrigatório');
      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}

/* ─── Tela de Configurações no modo online (resumida) ─── */
function OnlineSettings({user,onLogout}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;
  const[s,setS]=useState({farm_name:'',birth_alert_days:30});
  const[loading,setLoading]=useState(true);
  const[saved,setSaved]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{const cfg=await window.SupaDB.getSettings();setS(cfg||{farm_name:'',birth_alert_days:30});}
      catch(e){console.error(e);}
      finally{setLoading(false);}
    })();
  },[]);

  async function save(){
    try{
      await window.SupaDB.updateSettings({farm_name:s.farm_name,birth_alert_days:parseInt(s.birth_alert_days)||30});
      setSaved(true);setTimeout(()=>setSaved(false),2000);
    }catch(e){alert('Erro: '+e.message);}
  }

  if(loading)return <div style={{padding:32}}><EmptyState text="Carregando..."/></div>;

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="⚙️ Configurações (online)"/>

    <Card style={{marginBottom:16}}>
      <CardHeader title="Fazenda"/>
      <div style={{padding:16}}>
        <Field label="Nome da Fazenda"><Input value={s.farm_name||''} onChange={e=>setS({...s,farm_name:e.target.value})}/></Field>
        <Field label="Dias de alerta antes do parto"><Input type="number" value={s.birth_alert_days||30} onChange={e=>setS({...s,birth_alert_days:e.target.value})} min={1} max={90}/></Field>
        {saved&&<Alert type="success">Configurações salvas!</Alert>}
        <Btn onClick={save} fullWidth>Salvar</Btn>
      </div>
    </Card>

    <Card>
      <CardHeader title="Sessão"/>
      <div style={{padding:16}}>
        <p style={{fontSize:12,color:'#6b7280',marginBottom:10}}>Logado como: <strong>{user.email}</strong> ({user.role})</p>
        <Btn variant="secondary" onClick={onLogout} fullWidth>Sair / Trocar usuário</Btn>
      </div>
    </Card>
  </div>;
}

/* ─── Dashboard online (esqueleto inicial — será evoluído) ─── */
function OnlineDashboard({user,onNav}){
  const[loading,setLoading]=useState(true);
  const[stats,setStats]=useState({});
  const[err,setErr]=useState('');

  useEffect(()=>{
    (async()=>{
      try{
        setLoading(true);
        const[animals,births,deaths,preg,lots,pastures,settings,services]=await Promise.all([
          window.SupaDB.get('animals',{eq:{status:'ativo'}}),
          window.SupaDB.get('births'),
          window.SupaDB.get('deaths'),
          window.SupaDB.get('pregnancy_diagnoses'),
          window.SupaDB.get('lots'),
          window.SupaDB.get('pastures'),
          window.SupaDB.getSettings(),
          window.SupaDB.get('services').catch(()=>[]),
        ]);
        setStats({animals,births,deaths,preg,lots,pastures,settings,services});
      }catch(e){setErr(e.message);}
      finally{setLoading(false);}
    })();
  },[]);

  if(loading)return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:32}}>⏳</div><p style={{marginTop:8,color:'#6b7280'}}>Carregando dados...</p></div>;

  const{animals=[],births=[],deaths=[],preg=[],lots=[],pastures=[],settings={},services=[]}=stats;
  const farmName=settings.farm_name||'Fazenda';

  // ─── Calcular alertas ───
  const alerts=[];
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];

  // Serviços urgentes pendentes
  const servicosUrgentes=services.filter(s=>s.priority==='Urgente'&&['pendente','em_andamento'].includes(s.status));
  if(servicosUrgentes.length>0){
    alerts.push({
      level:'urgent',icon:'🚨',
      title:servicosUrgentes.length+' serviço(s) URGENTE(S) pendente(s)',
      desc:servicosUrgentes.slice(0,3).map(s=>s.title).join(' · '),
      onClick:()=>onNav('online-services'),
    });
  }

  // Serviços atrasados
  const servicosAtrasados=services.filter(s=>s.due_date&&s.due_date<todayStr&&['pendente','em_andamento'].includes(s.status));
  if(servicosAtrasados.length>0){
    alerts.push({
      level:'warning',icon:'⏰',
      title:servicosAtrasados.length+' serviço(s) com prazo vencido',
      desc:servicosAtrasados.slice(0,3).map(s=>s.title).join(' · '),
      onClick:()=>onNav('online-services'),
    });
  }

  // 1) Partos próximos (≤7 dias) — URGENTE
  const partosProximos=preg.filter(p=>{
    if(p.result!=='Positivo'||!p.expected_birth_date)return false;
    const days=H.daysUntil(p.expected_birth_date);
    return days!==null&&days>=0&&days<=7;
  });
  if(partosProximos.length>0){
    alerts.push({
      level:'urgent',icon:'🚨',
      title:`${partosProximos.length} parto${partosProximos.length>1?'s':''} previsto${partosProximos.length>1?'s':''} em até 7 dias`,
      desc:partosProximos.slice(0,3).map(p=>`${p.cow_id} (${H.fmtDate(p.expected_birth_date)})`).join(' · '),
      onClick:()=>onNav('online-pregnancy'),
    });
  }

  // 2) Partos atrasados (data prevista já passou e não tem nascimento)
  const partosAtrasados=preg.filter(p=>{
    if(p.result!=='Positivo'||!p.expected_birth_date)return false;
    const days=H.daysUntil(p.expected_birth_date);
    if(days===null||days>=0)return false;
    // Ver se já tem nascimento dessa vaca após a data prevista
    const hadBirth=births.some(b=>b.mother_id===p.cow_id&&b.birth_date>=p.expected_birth_date);
    return !hadBirth;
  });
  if(partosAtrasados.length>0){
    alerts.push({
      level:'urgent',icon:'⏰',
      title:`${partosAtrasados.length} parto${partosAtrasados.length>1?'s':''} atrasado${partosAtrasados.length>1?'s':''} sem registro`,
      desc:partosAtrasados.slice(0,3).map(p=>`${p.cow_id} (previsto: ${H.fmtDate(p.expected_birth_date)})`).join(' · '),
      onClick:()=>onNav('online-pregnancy'),
    });
  }

  // 3) Animais sem lote
  const semLote=animals.filter(a=>!a.lot_id);
  if(semLote.length>0){
    alerts.push({
      level:'warning',icon:'⚠️',
      title:`${semLote.length} animal${semLote.length>1?'is':''} sem lote definido`,
      desc:semLote.slice(0,5).map(a=>a.identifier).join(', ')+(semLote.length>5?'...':''),
      onClick:()=>onNav('online-inventory'),
    });
  }

  // 4) Pastos acima da capacidade (precisa contar animais por lote/pasto)
  // Agregação simples: contar animais por lot_id, depois somar por pasture_id
  const animaisPorLote={};
  animals.forEach(a=>{if(a.lot_id)animaisPorLote[a.lot_id]=(animaisPorLote[a.lot_id]||0)+1;});
  const animaisPorPasto={};
  lots.forEach(l=>{if(l.pasture_id)animaisPorPasto[l.pasture_id]=(animaisPorPasto[l.pasture_id]||0)+(animaisPorLote[l.id]||0);});
  const pastosCheios=pastures.filter(p=>p.capacity&&animaisPorPasto[p.id]>p.capacity);
  if(pastosCheios.length>0){
    alerts.push({
      level:'warning',icon:'🌿',
      title:`${pastosCheios.length} pasto${pastosCheios.length>1?'s':''} acima da capacidade`,
      desc:pastosCheios.slice(0,3).map(p=>`${p.name}: ${animaisPorPasto[p.id]}/${p.capacity}`).join(' · '),
      onClick:()=>onNav('online-pastures'),
    });
  }

  // 5) Animais com identifier duplicado (refletir a validação do Inventário)
  const seen={};const dupIds=[];
  animals.forEach(a=>{
    const k=(a.identifier||'').toLowerCase();
    if(!k)return;
    if(seen[k])dupIds.push(a.identifier);else seen[k]=true;
  });
  const uniqDups=[...new Set(dupIds)];
  if(uniqDups.length>0){
    alerts.push({
      level:'urgent',icon:'⚠',
      title:`${uniqDups.length} identificador${uniqDups.length>1?'es':''} duplicado${uniqDups.length>1?'s':''} no Inventário`,
      desc:uniqDups.slice(0,5).join(', ')+(uniqDups.length>5?` ... e +${uniqDups.length-5}`:''),
      onClick:()=>onNav('online-inventory'),
    });
  }

  // 6) Vacas com diagnóstico positivo antigo sem novo registro (>9 meses sem update)
  // Pulando por hora — pode ser próxima evolução

  return <div style={{padding:'0 0 100px'}}>
    <div style={{background:'linear-gradient(135deg,#0c4a6e,#1e40af)',padding:'24px 20px 60px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <p style={{color:'rgba(255,255,255,.7)',fontSize:12}}>🌐 ONLINE</p>
        <ConnectionBadge/>
      </div>
      <h1 style={{color:'#fff',fontSize:20,fontWeight:700}}>{farmName}</h1>
      <p style={{color:'rgba(255,255,255,.6)',fontSize:12,marginTop:4}}>Olá, {user.name?.split(' ')[0]||user.email}</p>
    </div>
    <div style={{padding:'0 16px',marginTop:-40}}>
      {err&&<Alert type="error">{err}</Alert>}

      {/* CENTRO DE ALERTAS */}
      {alerts.length>0&&<Card style={{marginBottom:14,border:'2px solid '+(alerts.some(a=>a.level==='urgent')?'#fca5a5':'#fde68a'),background:alerts.some(a=>a.level==='urgent')?'#fef2f2':'#fffbeb'}}>
        <div style={{padding:'12px 16px 8px',display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid rgba(0,0,0,.06)'}}>
          <span style={{fontSize:18}}>🔔</span>
          <strong style={{fontSize:13,color:'#92400e'}}>Alertas e Lembretes</strong>
          <Badge color={alerts.some(a=>a.level==='urgent')?'red':'amber'}>{alerts.length}</Badge>
        </div>
        {alerts.map((a,i)=>
          <div key={i} onClick={a.onClick} style={{padding:'10px 16px',borderBottom:i<alerts.length-1?'1px solid rgba(0,0,0,.04)':'none',cursor:'pointer',display:'flex',gap:10,alignItems:'flex-start'}}>
            <span style={{fontSize:18,flexShrink:0}}>{a.icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontSize:12,fontWeight:600,color:a.level==='urgent'?'#991b1b':'#92400e'}}>{a.title}</p>
              {a.desc&&<p style={{fontSize:11,color:'#6b7280',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.desc}</p>}
            </div>
            <span style={{fontSize:14,color:'#9ca3af'}}>›</span>
          </div>
        )}
      </Card>}

      {alerts.length===0&&<Alert type="success" style={{marginBottom:14}}>
        ✨ <strong>Tudo em ordem!</strong> Nenhum alerta no momento.
      </Alert>}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        <StatCard label="Animais ativos" value={animals.length} color="green" icon="🐂" onClick={()=>onNav('online-inventory')}/>
        <StatCard label="Nascimentos" value={births.length} color="blue" icon="🐮" onClick={()=>onNav('online-births')}/>
        <StatCard label="Mortes" value={deaths.length} color="red" onClick={()=>onNav('online-mortality')}/>
        <StatCard label="Diagnósticos" value={preg.length} color="amber" onClick={()=>onNav('online-pregnancy')}/>
        <StatCard label="Lotes" value={lots.length} color="gray" onClick={()=>onNav('online-lots')}/>
        <StatCard label="Pastos" value={pastures.length} color="green" onClick={()=>onNav('online-pastures')}/>
      </div>

      <p style={{fontSize:11,fontWeight:600,color:'#6b7280',textTransform:'uppercase',marginBottom:10,marginTop:16}}>Ações rápidas</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        {[['🐮','Nascimento','online-births','#166534'],['📋','Inventário','online-inventory','#1d4ed8'],['⚖️','Pesagem','online-weighings','#d97706'],['🤰','Gestação','online-pregnancy','#9333ea'],['🔍','Buscar Animal','online-search','#0891b2'],['🔧','Serviços','online-services','#0c4a6e']].map(([i,l,p,c])=>
          <button key={p} onClick={()=>onNav(p)} style={{padding:'16px 12px',background:c,color:'#fff',borderRadius:12,textAlign:'left',cursor:'pointer',border:'none'}}>
            <div style={{fontSize:26,marginBottom:6}}>{i}</div>
            <div style={{fontSize:12,fontWeight:600}}>{l}</div>
          </button>
        )}
      </div>

      {user.role==='admin'&&<>
        <p style={{fontSize:11,fontWeight:600,color:'#6b7280',textTransform:'uppercase',marginBottom:10,marginTop:8}}>Análises e Relatórios</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[['📊','Análises','online-analysis','#7c3aed'],['📑','Relatório de Safra','online-safra','#0c4a6e'],['🖨','Fichas Imprim.','online-print','#0891b2'],['🖼','Galeria','online-gallery','#a855f7'],['📊','Importar Excel','online-import','#15803d'],['📸','Importar por Foto','online-photo','#7e22ce'],['📥','Exportar CSV','online-export','#059669'],['👥','Colaboradores','online-collaborators','#1e40af']].map(([i,l,p,c])=>
            <button key={p} onClick={()=>onNav(p)} style={{padding:'14px 12px',background:c,color:'#fff',borderRadius:12,textAlign:'left',cursor:'pointer',border:'none'}}>
              <div style={{fontSize:22,marginBottom:4}}>{i}</div>
              <div style={{fontSize:11,fontWeight:600}}>{l}</div>
            </button>
          )}
        </div>
      </>}
    </div>
  </div>;
}

  const nav=ONLINE_NAV.filter(n=>n.roles.includes(user.role));

  return <div style={{display:'flex',minHeight:'100vh',background:'#f4f6f0'}}>

/* ─── INVENTÁRIO ONLINE ─── */
function OnlineInventory({user,onNav}){
  const[items,setItems]=useState([]);
  const[lots,setLots]=useState([]);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState(null);
  const[query,setQuery]=useState('');
  const[filterStatus,setFilterStatus]=useState('ativo');
  const[filterLot,setFilterLot]=useState('');
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{setLoading(true);setErr(null);
        const[an,lt]=await Promise.all([
          window.SupaDB.get('animals'),
          window.SupaDB.get('lots'),
        ]);
        if(!cancelled){setItems(an);setLots(lt);}
      }catch(e){if(!cancelled)setErr(e.message);}
      finally{if(!cancelled)setLoading(false);}
    })();
    return()=>{cancelled=true;};
  },[rev]);

  const filtered=useMemo(()=>{
    return items.filter(a=>{
      if(filterStatus==='ativo'&&(a.status||'ativo')!=='ativo')return false;
      if(filterStatus==='saiu'&&(a.status||'ativo')!=='saiu')return false;
      if(filterLot&&a.lot_id!==filterLot)return false;
      if(query){const q=query.toLowerCase();if(!(a.identifier||'').toLowerCase().includes(q)&&!(a.farm_tag||'').toLowerCase().includes(q))return false;}
      return true;
    }).sort((a,b)=>(a.identifier||'').localeCompare(b.identifier||'',undefined,{numeric:true,sensitivity:'base'}));
  },[items,query,filterStatus,filterLot]);

  // Contagem por lote (apenas animais ativos)
  const countByLot=useMemo(()=>{
    const m={};
    items.filter(a=>(a.status||'ativo')==='ativo').forEach(a=>{
      const k=a.lot_id||'__no_lot__';
      m[k]=(m[k]||0)+1;
    });
    return m;
  },[items]);

  // Detectar identifiers duplicados (ativos)
  const duplicates=useMemo(()=>{
    const seen={};const dups=[];
    items.filter(a=>(a.status||'ativo')==='ativo').forEach(a=>{
      const k=a.identifier;
      if(!k)return;
      if(seen[k])dups.push(a.identifier);
      else seen[k]=true;
    });
    return [...new Set(dups)];
  },[items]);

  const stats={
    total:items.length,
    ativos:items.filter(a=>(a.status||'ativo')==='ativo').length,
    saidos:items.filter(a=>a.status==='saiu').length,
    femeas:items.filter(a=>a.sex==='Fêmea'&&(a.status||'ativo')==='ativo').length,
    machos:items.filter(a=>a.sex==='Macho'&&(a.status||'ativo')==='ativo').length,
  };

  async function save(data){
    try{
      // VALIDAÇÃO DE DUPLICIDADE — não pode existir outro animal com mesmo identifier (excluindo o próprio em edição)
      const id=(data.identifier||'').trim();
      if(!id){alert('O identificador é obrigatório.');return;}
      const existing=items.find(a=>(a.identifier||'').toLowerCase()===id.toLowerCase()&&(!editing||a.id!==editing.id));
      if(existing){alert('⚠️ Já existe um animal com este identificador: '+id+'\n\nNão é permitido cadastrar duplicidade.');return;}
      // Também verifica farm_tag e official_tag se informados
      if(data.farm_tag){
        const f=data.farm_tag.trim();
        const existsFarm=items.find(a=>a.farm_tag&&a.farm_tag.toLowerCase()===f.toLowerCase()&&(!editing||a.id!==editing.id));
        if(existsFarm){alert('⚠️ Já existe um animal com este Brinco Fazenda: '+f);return;}
      }
      if(data.official_tag){
        const o=data.official_tag.trim();
        const existsOff=items.find(a=>a.official_tag&&a.official_tag.toLowerCase()===o.toLowerCase()&&(!editing||a.id!==editing.id));
        if(existsOff){alert('⚠️ Já existe um animal com este Brinco CIDASC: '+o);return;}
      }
      if(editing){await window.SupaDB.update('animals',editing.id,data);}
      else{await window.SupaDB.insert('animals',{...data,status:'ativo'});}
      setShowForm(false);setEditing(null);setRev(r=>r+1);
    }catch(e){alert('Erro: '+e.message);}
  }
  async function del(id){
    if(user.role!=='admin'){alert('Apenas admin pode apagar.');return;}
    if(!confirm('Excluir animal?'))return;
    try{await window.SupaDB.remove('animals',id);setDetail(null);setRev(r=>r+1);}
    catch(e){alert('Erro: '+e.message);}
  }

  return <OnlinePage title="Inventário" subtitle={stats.ativos+' ativos · '+stats.saidos+' saídos'} icon="📋" loading={loading} error={err}
    action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Animal</Btn>}>

    {duplicates.length>0&&<Alert type="error">
      <strong>⚠️ {duplicates.length} identificador(es) duplicado(s) detectado(s):</strong>
      <div style={{marginTop:6,fontSize:12,maxHeight:90,overflowY:'auto'}}>
        {duplicates.slice(0,30).map((d,i)=><span key={i} style={{display:'inline-block',padding:'2px 8px',margin:2,background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:4,fontFamily:'monospace'}}>{d}</span>)}
        {duplicates.length>30&&<span style={{fontSize:11,color:'#991b1b'}}> ... e +{duplicates.length-30}</span>}
      </div>
      <p style={{fontSize:11,marginTop:6}}>Filtre por estes IDs para identificar e ajustar os registros duplicados.</p>
    </Alert>}

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <StatCard label="Ativos" value={stats.ativos} color="green" icon="🐂"/>
      <StatCard label="Saíram" value={stats.saidos} color="gray" icon="📤"/>
      <StatCard label="Fêmeas" value={stats.femeas} color="red"/>
      <StatCard label="Machos" value={stats.machos} color="blue"/>
    </div>

    {/* Resumo por lote */}
    {lots.length>0&&<Card style={{marginBottom:12}}>
      <CardHeader title="Animais por Lote" icon="🐄"/>
      <div style={{padding:'8px 16px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8}}>
        {lots.map(l=>{
          const count=countByLot[l.id]||0;
          return <button key={l.id} onClick={()=>setFilterLot(filterLot===l.id?'':l.id)}
            style={{padding:'8px 10px',background:filterLot===l.id?'#dbeafe':'#f9fafb',border:'1px solid '+(filterLot===l.id?'#60a5fa':'#e5e7eb'),borderRadius:8,textAlign:'left',cursor:'pointer'}}>
            <p style={{fontSize:11,color:'#6b7280',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{l.name}</p>
            <strong style={{fontSize:18,color:filterLot===l.id?'#1e40af':'#111827'}}>{count}</strong>
            <span style={{fontSize:10,color:'#6b7280',marginLeft:4}}>{count===1?'animal':'animais'}</span>
          </button>;
        })}
        {countByLot['__no_lot__']>0&&<button onClick={()=>setFilterLot(filterLot==='__no_lot__'?'':'__no_lot__')}
          style={{padding:'8px 10px',background:filterLot==='__no_lot__'?'#fef3c7':'#f9fafb',border:'1px solid '+(filterLot==='__no_lot__'?'#f59e0b':'#e5e7eb'),borderRadius:8,textAlign:'left',cursor:'pointer'}}>
          <p style={{fontSize:11,color:'#6b7280'}}>⚠ Sem lote</p>
          <strong style={{fontSize:18,color:'#92400e'}}>{countByLot['__no_lot__']}</strong>
        </button>}
      </div>
    </Card>}

    <Card style={{marginBottom:12,padding:12}}>
      <Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Buscar por ID, brinco..." style={{marginBottom:8}}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <Select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="ativo">🟢 Ativos ({stats.ativos})</option>
          <option value="saiu">📤 Saíram ({stats.saidos})</option>
          <option value="all">Todos ({stats.total})</option>
        </Select>
        <Select value={filterLot} onChange={e=>setFilterLot(e.target.value)}>
          <option value="">Todos os lotes</option>
          <option value="__no_lot__">⚠ Sem lote</option>
          {lots.map(l=><option key={l.id} value={l.id}>{l.name} ({countByLot[l.id]||0})</option>)}
        </Select>
      </div>
    </Card>
    <Card>
      {filtered.length===0?<EmptyState icon="🐂" text={query?'Nenhum animal encontrado':'Sem animais ainda'} action={!query&&<Btn onClick={()=>setShowForm(true)}>Cadastrar primeiro</Btn>}/>:
        filtered.map(a=>{
          const lot=lots.find(l=>l.id===a.lot_id);
          const saiu=a.status==='saiu';
          const isDup=duplicates.includes(a.identifier);
          return <ListItem key={a.id} onClick={()=>setDetail(a)} style={saiu?{opacity:.7,background:'#f9fafb'}:isDup?{background:'#fef2f2',borderLeft:'3px solid #dc2626'}:{}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                <strong style={{fontSize:13,textDecoration:saiu?'line-through':'none'}}>{a.identifier}</strong>
                {isDup&&<Badge color="red">⚠ Duplicado</Badge>}
                {saiu&&<Badge color="red">📤 Saiu</Badge>}
                {!saiu&&<Badge color={a.sex==='Macho'?'blue':'red'}>{a.sex}</Badge>}
                {!saiu&&<Badge color="gray">{a.type}</Badge>}
              </div>
              <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>
                {saiu?'Saiu em '+H.fmtDate(a.exit_date):a.race+' · '+(lot?.name||'Sem lote')}
              </p>
            </div>
          </ListItem>;
        })
      }
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar Animal':'Novo Animal'} size="lg">
      <OnlineAnimalForm initial={editing} lots={lots} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
    <Modal open={!!detail} onClose={()=>setDetail(null)} title={detail?detail.identifier:''} size="lg">
      {detail&&<OnlineAnimalDetail animal={detail} lots={lots} user={user} onEdit={()=>{setEditing(detail);setShowForm(true);setDetail(null);}} onDelete={()=>del(detail.id)} onClose={()=>setDetail(null)}/>}
    </Modal>
  </OnlinePage>;
}

function OnlineAnimalForm({initial,lots,onSave,onCancel}){
  const[f,setF]=useState({identifier:'',type:'Vaca',race:'Nelore',sex:'Fêmea',birth_date:'',lot_id:'',farm_tag:'',official_tag:'',notes:'',father:'',mother:'',paternal_grandfather:'',paternal_grandmother:'',maternal_grandfather:'',maternal_grandmother:'',...initial});
  const[showGenealogy,setShowGenealogy]=useState(!!(initial&&(initial.father||initial.mother||initial.paternal_grandfather)));
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <>
    <FormRow>
      <Field label="Identificador" required hint="Ex: VAC-001"><Input value={f.identifier} onChange={e=>s('identifier',e.target.value)}/></Field>
      <Field label="Tipo"><Select value={f.type} onChange={e=>s('type',e.target.value)}><option>Vaca</option><option>Bezerro</option><option>Touro</option><option>Novilha</option><option>Garrote</option><option>Outro</option></Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Sexo"><Select value={f.sex} onChange={e=>s('sex',e.target.value)}><option>Fêmea</option><option>Macho</option></Select></Field>
      <Field label="Raça"><Select value={f.race} onChange={e=>s('race',e.target.value)}>{H.RACES.map(r=><option key={r}>{r}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Data Nasc."><Input type="date" value={f.birth_date||''} onChange={e=>s('birth_date',e.target.value)}/></Field>
      <Field label="Lote"><Select value={f.lot_id||''} onChange={e=>s('lot_id',e.target.value||null)}><option value="">— Sem lote —</option>{lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Brinco Fazenda"><Input value={f.farm_tag||''} onChange={e=>s('farm_tag',e.target.value)}/></Field>
      <Field label="Brinco CIDASC"><Input value={f.official_tag||''} onChange={e=>s('official_tag',e.target.value)}/></Field>
    </FormRow>

    <button type="button" onClick={()=>setShowGenealogy(!showGenealogy)} style={{width:'100%',padding:10,background:'#f3f4f6',border:'1px solid #e5e7eb',borderRadius:8,marginBottom:12,cursor:'pointer',fontSize:13,fontWeight:600,color:'#374151',textAlign:'left'}}>
      {showGenealogy?'▼':'▶'} 🧬 Genealogia (pais e avós)
    </button>

    {showGenealogy&&<div style={{padding:'4px 0 12px'}}>
      <FormRow>
        <Field label="Pai"><Input value={f.father||''} onChange={e=>s('father',e.target.value)} placeholder="Nome/ID do pai"/></Field>
        <Field label="Mãe"><Input value={f.mother||''} onChange={e=>s('mother',e.target.value)} placeholder="Nome/ID da mãe"/></Field>
      </FormRow>
      <p style={{fontSize:11,color:'#6b7280',marginBottom:6,marginTop:8,fontWeight:600}}>Avós paternos:</p>
      <FormRow>
        <Field label="Avô paterno"><Input value={f.paternal_grandfather||''} onChange={e=>s('paternal_grandfather',e.target.value)}/></Field>
        <Field label="Avó paterna"><Input value={f.paternal_grandmother||''} onChange={e=>s('paternal_grandmother',e.target.value)}/></Field>
      </FormRow>
      <p style={{fontSize:11,color:'#6b7280',marginBottom:6,marginTop:8,fontWeight:600}}>Avós maternos:</p>
      <FormRow>
        <Field label="Avô materno"><Input value={f.maternal_grandfather||''} onChange={e=>s('maternal_grandfather',e.target.value)}/></Field>
        <Field label="Avó materna"><Input value={f.maternal_grandmother||''} onChange={e=>s('maternal_grandmother',e.target.value)}/></Field>
      </FormRow>
    </div>}

    <Field label="Observações"><Textarea value={f.notes||''} onChange={e=>s('notes',e.target.value)}/></Field>
    <FormActions onSave={()=>{if(!f.identifier)return alert('Identificador obrigatório');onSave(f);}} onCancel={onCancel}/>
  </>;
}

        <Info label="Mãe" value={animal.mother||'—'}/>

        <Info label="Avó paterna" value={animal.paternal_grandmother||'—'}/>

    <div style={{display:'flex',gap:8}}>

      <Btn variant="secondary" onClick={onClose}>Fechar</Btn>
    </div>
  </>;
}

/* ─── PASTOS ONLINE ─── */
function OnlinePastures({user}){
  const{data:items,loading,error,reload}=useSupaQuery('pastures');
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[query,setQuery]=useState('');
  const[filterStatus,setFilterStatus]=useState('all');

  async function save(data){
    try{
      if(editing)await window.SupaDB.update('pastures',editing.id,data);
      else await window.SupaDB.insert('pastures',data);
      setShowForm(false);setEditing(null);reload();
    }catch(e){alert('Erro: '+e.message);}
  }
  async function del(id){
    if(user.role!=='admin'){alert('Apenas admin pode apagar.');return;}
    if(!confirm('Excluir pasto?'))return;
    try{await window.SupaDB.remove('pastures',id);reload();}
    catch(e){alert('Erro: '+e.message);}
  }

  const filtered=items.filter(p=>{
    if(filterStatus!=='all'&&p.status!==filterStatus)return false;
    if(query&&!(p.name||'').toLowerCase().includes(query.toLowerCase()))return false;
    return true;
  });

function OnlineBirths({user}){
  const{data:items,loading,error,reload}=useSupaQuery('births',{order:{column:'birth_date',ascending:false}});
  const{data:lots}=useSupaQuery('lots');
  const{data:pastures}=useSupaQuery('pastures');
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[query,setQuery]=useState('');

  async function save(data){
    try{
      // Validação: bezerro com mesmo identifier já existe?
      if(!editing&&data.calf_id){
        const exists=await asyncFindAnimal(data.calf_id);
        if(exists){
          if(!confirm(`⚠ Já existe um animal com identifier "${data.calf_id}" no Inventário.\n\nProsseguir mesmo assim?\n(O nascimento será registrado, mas não criará animal duplicado)`))return;
        }
      }
      // Validação: já existe nascimento desse bezerro?
      const dupBirth=items.find(b=>b.calf_id===data.calf_id&&(!editing||b.id!==editing.id));
      if(dupBirth){
        if(!confirm(`⚠ Já existe um nascimento registrado para o bezerro "${data.calf_id}".\n\nProsseguir mesmo assim?`))return;
      }

      if(editing)await window.SupaDB.update('births',editing.id,data);
      else{
        await window.SupaDB.insert('births',data);
        // Tenta criar bezerro no inventário se ainda não existir
        const exists=await asyncFindAnimal(data.calf_id);
        if(!exists){
          await window.SupaDB.insert('animals',{
            identifier:data.calf_id,type:'Bezerro',race:data.calf_race,sex:data.calf_sex,
            birth_date:data.birth_date,lot_id:data.lot_id||null,
            farm_tag:data.farm_tag||data.calf_id,official_tag:data.official_tag||'',
            father:data.bull_name||null,mother:data.mother_id||null,
            notes:'Criado automaticamente no nascimento',status:'ativo',
          });
        }
      }
      setShowForm(false);setEditing(null);reload();
    }catch(e){alert('Erro: '+e.message);}
  }
  async function del(id){
    if(user.role!=='admin'){alert('Apenas admin pode apagar.');return;}
    if(!confirm('Excluir?'))return;
    try{await window.SupaDB.remove('births',id);reload();}
    catch(e){alert('Erro: '+e.message);}
  }

  const filtered=query?items.filter(b=>(b.calf_id+' '+b.mother_id).toLowerCase().includes(query.toLowerCase())):items;

  return <OnlinePage title="Nascimentos" subtitle={items.length+' registros'} icon="🐮" loading={loading} error={error}
    action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}>
    <div style={{marginBottom:12}}><Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Buscar..."/></div>
    <Card>
      {filtered.length===0?<EmptyState icon="🐮" text="Sem nascimentos"/>:
        filtered.map(b=><ListItem key={b.id} onClick={()=>{setEditing(b);setShowForm(true);}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                <strong style={{fontSize:13}}>{b.calf_id}</strong>
                <Badge color={b.calf_sex==='Macho'?'blue':'red'}>{b.calf_sex}</Badge>
                <Badge color="gray">{b.calf_race}</Badge>
              </div>
              <p style={{fontSize:11,color:'#6b7280'}}>Mãe: {b.mother_id} · {b.birth_weight}kg · {H.fmtDate(b.birth_date)}</p>
            </div>
            {user.role==='admin'&&<button onClick={e=>{e.stopPropagation();del(b.id);}} style={{fontSize:11,color:'#dc2626',background:'none',border:'none',cursor:'pointer'}}>×</button>}
          </div>
        </ListItem>)
      }
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar Nascimento':'Novo Nascimento'} size="lg">
      <OnlineBirthForm initial={editing} lots={lots} pastures={pastures} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
  </OnlinePage>;
}

/* ─── MORTALIDADE ONLINE ─── */
function OnlineMortality({user}){
  const{data:items,loading,error,reload}=useSupaQuery('deaths',{order:{column:'death_date',ascending:false}});
  const{data:lots}=useSupaQuery('lots');
  const{data:pastures}=useSupaQuery('pastures');
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);

  async function save(data){
    try{
      if(!editing){
        // Verificar se animal existe e está ativo
        const a=await asyncFindAnimal(data.animal_id);
        if(!a){
          if(!confirm(`⚠ Animal "${data.animal_id}" NÃO está no Inventário.\n\nProsseguir mesmo assim?\n(O registro será salvo, mas sem vínculo com Inventário)`))return;
        } else if(a.status==='saiu'){
          alert(`❌ Animal "${data.animal_id}" já saiu da propriedade em ${H.fmtDate(a.exit_date)} (motivo: ${a.exit_reason}).\n\nNão é possível registrar nova morte.`);
          return;
        }
        // Verificar se já existe death pra esse animal
        const dup=items.find(d=>d.animal_id===data.animal_id);
        if(dup){
          if(!confirm(`⚠ Já existe registro de morte para "${data.animal_id}" em ${H.fmtDate(dup.death_date)}.\n\nProsseguir mesmo assim?`))return;
        }
        await window.SupaDB.insert('deaths',data);
        // Marcar animal como saiu
        if(a&&a.status!=='saiu'){
          await window.SupaDB.update('animals',a.id,{status:'saiu',exit_date:data.death_date,exit_reason:'morte'});
        }
      } else {
        await window.SupaDB.update('deaths',editing.id,data);
      }
      setShowForm(false);setEditing(null);reload();
    }catch(e){alert('Erro: '+e.message);}
  }
  async function del(id){
    if(user.role!=='admin'){alert('Apenas admin pode apagar.');return;}
    if(!confirm('Excluir?'))return;
    try{await window.SupaDB.remove('deaths',id);reload();}
    catch(e){alert('Erro: '+e.message);}
  }

  return <OnlinePage title="Mortalidade" subtitle={items.length+' registros'} icon="✝" loading={loading} error={error}
    action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}>
    <Card>
      {items.length===0?<EmptyState icon="✝" text="Sem registros"/>:
        items.map(m=><ListItem key={m.id} onClick={()=>{setEditing(m);setShowForm(true);}}>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <div>
              <strong style={{fontSize:13}}>{m.animal_id}</strong> <Badge color="red">{m.cause}</Badge>
              <p style={{fontSize:11,color:'#6b7280'}}>{m.category} · {H.fmtDate(m.death_date)}</p>
            </div>
            {user.role==='admin'&&<button onClick={e=>{e.stopPropagation();del(m.id);}} style={{fontSize:11,color:'#dc2626',background:'none',border:'none',cursor:'pointer'}}>×</button>}
          </div>
        </ListItem>)
      }
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar':'Nova Mortalidade'} size="lg">
      <OnlineMortalityForm initial={editing} lots={lots} pastures={pastures} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
  </OnlinePage>;
}

          </ListItem>;
        })
      }
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar':'Nova Pesagem'}>
      <OnlineWeighingForm initial={editing} lots={lots} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
  </OnlinePage>;
}

/* ─── REPRODUÇÃO ONLINE ─── */
function OnlineReproductive({user}){
  const{data:items,loading,error,reload}=useSupaQuery('reproductive_protocols',{order:{column:'date',ascending:false}});
  const{data:lots}=useSupaQuery('lots');
  const{data:animals}=useSupaQuery('animals');
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[viewMode,setViewMode]=useState('animal'); // 'animal' | 'lot'
  const[query,setQuery]=useState('');

  async function save(data){
    try{
      if(editing)await window.SupaDB.update('reproductive_protocols',editing.id,data);
      else await window.SupaDB.insert('reproductive_protocols',data);
      setShowForm(false);setEditing(null);reload();
    }catch(e){alert('Erro: '+e.message);}
  }
  async function del(id){
    if(user.role!=='admin'){alert('Apenas admin pode apagar.');return;}
    if(!confirm('Excluir?'))return;
    try{await window.SupaDB.remove('reproductive_protocols',id);reload();}
    catch(e){alert('Erro: '+e.message);}
  }

  // Filtrar por busca
  const filtered=useMemo(()=>{
    if(!query)return items;
    const q=query.toLowerCase();
    return items.filter(p=>(p.cow_id||'').toLowerCase().includes(q)||(p.semen_bull||'').toLowerCase().includes(q));
  },[items,query]);

  // Agrupar por modo
  const grouped=useMemo(()=>{
    if(viewMode==='animal'){
      // Ordenar por número crescente
      return [...filtered].sort((a,b)=>(a.cow_id||'').localeCompare(b.cow_id||'',undefined,{numeric:true,sensitivity:'base'}));
    } else {
      // Agrupar por lote
      const g={};
      filtered.forEach(p=>{
        // Tenta usar lot_id; se não tiver, busca pelo animal
        let lotId=p.lot_id;
        if(!lotId){const a=animals.find(x=>x.identifier===p.cow_id);lotId=a?.lot_id;}
        const key=lotId||'__no_lot__';
        if(!g[key])g[key]=[];
        g[key].push(p);
      });
      // Ordenar dentro de cada lote
      Object.keys(g).forEach(k=>{
        g[k].sort((a,b)=>(a.cow_id||'').localeCompare(b.cow_id||'',undefined,{numeric:true,sensitivity:'base'}));
      });
      return g;
    }
  },[filtered,viewMode,animals]);

  return <OnlinePage title="Reprodução" subtitle={items.length+' protocolos'} icon="🔬" loading={loading} error={error}
    action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}>

    {/* Modo de visualização */}
    <div style={{display:'flex',gap:4,marginBottom:12,background:'#f3f4f6',padding:4,borderRadius:10}}>
      <button onClick={()=>setViewMode('animal')} style={{flex:1,padding:8,background:viewMode==='animal'?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:viewMode==='animal'?600:400,color:viewMode==='animal'?'#1e40af':'#6b7280'}}>🐄 Por animal</button>
      <button onClick={()=>setViewMode('lot')} style={{flex:1,padding:8,background:viewMode==='lot'?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:viewMode==='lot'?600:400,color:viewMode==='lot'?'#1e40af':'#6b7280'}}>🐂 Por lote</button>
    </div>

    <Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Buscar por animal ou touro..." style={{marginBottom:12}}/>

    {viewMode==='animal'?
      <Card>
        {grouped.length===0?<EmptyState icon="🔬" text="Sem protocolos"/>:
          grouped.map(p=><ListItem key={p.id} onClick={()=>{setEditing(p);setShowForm(true);}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <div>
                <strong style={{fontSize:13}}>{p.cow_id}</strong> — {p.protocol_name}
                <p style={{fontSize:11,color:'#6b7280'}}>{p.semen_bull||'—'} · {H.fmtDate(p.date)}</p>
              </div>
              {user.role==='admin'&&<button onClick={e=>{e.stopPropagation();del(p.id);}} style={{fontSize:11,color:'#dc2626',background:'none',border:'none',cursor:'pointer'}}>×</button>}
            </div>
          </ListItem>)
        }
      </Card>
    :
      <>
        {Object.keys(grouped).length===0?<EmptyState icon="🔬" text="Sem protocolos"/>:
          Object.entries(grouped).sort((a,b)=>{
            const la=lots.find(l=>l.id===a[0])?.name||'ZZZ';
            const lb=lots.find(l=>l.id===b[0])?.name||'ZZZ';
            return la.localeCompare(lb);
          }).map(([lotId,protocols])=>{
            const lot=lots.find(l=>l.id===lotId);
            return <Card key={lotId} style={{marginBottom:12}}>
              <CardHeader title={lot?.name||'⚠ Sem lote definido'} icon="🐂" action={<Badge color="blue">{protocols.length}</Badge>}/>
              {protocols.map(p=><ListItem key={p.id} onClick={()=>{setEditing(p);setShowForm(true);}}>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <div>
                    <strong style={{fontSize:13}}>{p.cow_id}</strong> — {p.protocol_name}
                    <p style={{fontSize:11,color:'#6b7280'}}>{p.semen_bull||'—'} · {H.fmtDate(p.date)}</p>
                  </div>
                  {user.role==='admin'&&<button onClick={e=>{e.stopPropagation();del(p.id);}} style={{fontSize:11,color:'#dc2626',background:'none',border:'none',cursor:'pointer'}}>×</button>}
                </div>
              </ListItem>)}
            </Card>;
          })
        }
      </>
    }

    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar':'Novo Protocolo'} size="lg">
      <OnlineProtocolForm initial={editing} lots={lots} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
  </OnlinePage>;
}

/* ─── GESTAÇÃO ONLINE ─── */
function OnlinePregnancy({user}){
  const{data:items,loading,error,reload}=useSupaQuery('pregnancy_diagnoses',{order:{column:'diagnosis_date',ascending:false}});
  const{data:animals,loading:lA}=useSupaQuery('animals');
  const{data:lots}=useSupaQuery('lots');
  const{data:protocols}=useSupaQuery('reproductive_protocols',{order:{column:'date',ascending:false}});
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detailFemale,setDetailFemale]=useState(null);
  const[viewMode,setViewMode]=useState('females'); // 'females' | 'history'
  const[filterStatus,setFilterStatus]=useState('all'); // all | prenha | vazia | sem
  const[filterLot,setFilterLot]=useState('');
  const[query,setQuery]=useState('');

  async function save(data){
    try{
      if(editing)await window.SupaDB.update('pregnancy_diagnoses',editing.id,data);
      else await window.SupaDB.insert('pregnancy_diagnoses',data);
      setShowForm(false);setEditing(null);reload();
    }catch(e){alert('Erro: '+e.message);}
  }
  async function del(id){
    if(user.role!=='admin'){alert('Apenas admin pode apagar.');return;}
    if(!confirm('Excluir?'))return;
    try{await window.SupaDB.remove('pregnancy_diagnoses',id);reload();}
    catch(e){alert('Erro: '+e.message);}
  }

  // Diagnóstico rápido: cria um registro de gestação direto
  async function quickDiagnose(female,result){
    try{
      const protocol=protocols.find(p=>p.cow_id===female.identifier);
      const data={
        cow_id:female.identifier,
        lot_id:female.lot_id||null,
        diagnosis_date:TODAY,
        result,
        expected_birth_date:result==='Positivo'?H.addDays(TODAY,283):null,
        notes:protocol?'Vinculado ao protocolo de '+H.fmtDate(protocol.date):null,
      };
      // Limpar campos vazios pra evitar erro UUID inválido
      Object.keys(data).forEach(k=>{if(data[k]==='')data[k]=null;});
      const r=await window.SupaDB.insert('pregnancy_diagnoses',data);
      if(!r){throw new Error('Falha ao salvar — verifique sua conexão');}
      reload();
    }catch(e){
      console.error('Erro no quickDiagnose:',e);
      alert('Erro ao salvar diagnóstico: '+(e.message||e.toString())+'\n\nPossíveis causas:\n• Sem conexão com Supabase\n• Permissão insuficiente\n• Sessão expirada (faça login novamente)');
    }
  }

  // Para cada fêmea, encontrar o último diagnóstico e o último protocolo
  const females=useMemo(()=>{
    return animals
      .filter(a=>a.sex==='Fêmea'&&['Vaca','Novilha'].includes(a.type)&&(a.status||'ativo')==='ativo')
      .map(a=>{
        const lastDiag=items.find(p=>p.cow_id===a.identifier);
        const lastProtocol=protocols.find(p=>p.cow_id===a.identifier);
        let status='sem'; // sem diagnóstico
        if(lastDiag){
          if(lastDiag.result==='Positivo')status='prenha';
          else if(lastDiag.result==='Negativo')status='vazia';
          else status='duvidoso';
        }
        return{...a,_lastDiag:lastDiag,_lastProtocol:lastProtocol,_status:status};
      });
  },[animals,items,protocols]);

  const filteredFemales=useMemo(()=>{
    return females.filter(f=>{
      if(filterStatus!=='all'&&f._status!==filterStatus)return false;
      if(filterLot&&f.lot_id!==filterLot)return false;
      if(query&&!(f.identifier||'').toLowerCase().includes(query.toLowerCase()))return false;
      return true;
    }).sort((a,b)=>(a.identifier||'').localeCompare(b.identifier||'',undefined,{numeric:true,sensitivity:'base'}));
  },[females,filterStatus,filterLot,query]);

  // Estatísticas
  const stats={
    total:females.length,
    prenha:females.filter(f=>f._status==='prenha').length,
    vazia:females.filter(f=>f._status==='vazia').length,
    sem:females.filter(f=>f._status==='sem').length,
  };
  const rate=stats.total>0?(stats.prenha/(stats.prenha+stats.vazia||1))*100:0;

  return <OnlinePage title="Gestação" subtitle={stats.total+' fêmeas reprodutivas'} icon="🤰" loading={loading||lA} error={error}>

    <div style={{display:'flex',gap:4,marginBottom:12,background:'#f3f4f6',padding:4,borderRadius:10}}>
      <button onClick={()=>setViewMode('females')} style={{flex:1,padding:8,background:viewMode==='females'?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:viewMode==='females'?600:400,color:viewMode==='females'?'#1e40af':'#6b7280'}}>🐄 Fêmeas (status atual)</button>
      <button onClick={()=>setViewMode('history')} style={{flex:1,padding:8,background:viewMode==='history'?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:viewMode==='history'?600:400,color:viewMode==='history'?'#1e40af':'#6b7280'}}>📜 Histórico ({items.length})</button>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:12}}>
      <StatCard label="Prenhas" value={stats.prenha} color="green"/>
      <StatCard label="Vazias" value={stats.vazia} color="red"/>
      <StatCard label="Sem diag." value={stats.sem} color="gray"/>
      <StatCard label="Taxa" value={rate.toFixed(0)+'%'} color="amber"/>
    </div>

    {viewMode==='females'?
      <>
        <Card style={{marginBottom:12,padding:12}}>
          <Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Buscar por brinco..." style={{marginBottom:8}}/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <Select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="all">Todos status ({stats.total})</option>
              <option value="prenha">🟢 Prenhas ({stats.prenha})</option>
              <option value="vazia">🔴 Vazias ({stats.vazia})</option>
              <option value="sem">⚪ Sem diagnóstico ({stats.sem})</option>
            </Select>
            <Select value={filterLot} onChange={e=>setFilterLot(e.target.value)}>
              <option value="">Todos os lotes</option>
              {lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
            </Select>
          </div>
        </Card>

        <Card>
          {filteredFemales.length===0?<EmptyState icon="🐄" text={query||filterStatus!=='all'||filterLot?'Nenhuma fêmea bate':'Sem fêmeas reprodutivas no Inventário'}/>:
            filteredFemales.map(f=>{
              const lot=lots.find(l=>l.id===f.lot_id);
              const statusInfo={
                prenha:{color:'green',label:'🟢 Prenha',bg:'#f0fdf4'},
                vazia:{color:'red',label:'🔴 Vazia',bg:'#fef2f2'},
                sem:{color:'gray',label:'⚪ Sem diagnóstico',bg:'#fff'},
                duvidoso:{color:'amber',label:'⚠ Duvidoso',bg:'#fffbeb'},
              }[f._status]||{color:'gray',label:f._status,bg:'#fff'};
              return <div key={f.id} style={{borderBottom:'1px solid #f3f4f6',padding:'10px 12px',background:statusInfo.bg}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,flexWrap:'wrap'}}>
                  <div onClick={()=>setDetailFemale(f)} style={{flex:1,minWidth:140,cursor:'pointer'}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      <strong style={{fontSize:13}}>{f.identifier}</strong>
                      <Badge color={statusInfo.color}>{statusInfo.label}</Badge>
                      <Badge color="gray">{f.type}</Badge>
                    </div>
                    <p style={{fontSize:11,color:'#6b7280',marginTop:3}}>
                      {f.race} · {lot?.name||'Sem lote'}
                      {f._lastProtocol&&<span> · IATF: {H.fmtDate(f._lastProtocol.date)} ({f._lastProtocol.semen_bull||'—'})</span>}
                    </p>
                    {f._lastDiag&&<p style={{fontSize:11,color:'#6b7280'}}>
                      Diagnóstico: {H.fmtDate(f._lastDiag.diagnosis_date)}
                      {f._lastDiag.expected_birth_date&&' · Parto: '+H.fmtDate(f._lastDiag.expected_birth_date)}
                    </p>}
                  </div>
                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button onClick={()=>quickDiagnose(f,'Positivo')} title="Marcar prenha"
                      style={{padding:'5px 10px',background:'#16a34a',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:600}}>🟢 Prenha</button>
                    <button onClick={()=>quickDiagnose(f,'Negativo')} title="Marcar vazia"
                      style={{padding:'5px 10px',background:'#dc2626',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:600}}>🔴 Vazia</button>
                  </div>
                </div>
              </div>;
            })
          }
        </Card>
        <div style={{marginTop:12,display:'flex',justifyContent:'flex-end'}}>
          <Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Diagnóstico detalhado</Btn>
        </div>
      </>
    :
      <Card>
        {items.length===0?<EmptyState icon="🤰" text="Sem diagnósticos"/>:
          items.map(p=><ListItem key={p.id} onClick={()=>{setEditing(p);setShowForm(true);}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <div>
                <strong style={{fontSize:13}}>{p.cow_id}</strong> <Badge color={p.result==='Positivo'?'green':'red'}>{p.result}</Badge>
                <p style={{fontSize:11,color:'#6b7280'}}>{H.fmtDate(p.diagnosis_date)}{p.expected_birth_date?' · Parto: '+H.fmtDate(p.expected_birth_date):''}</p>
                {p.notes&&<p style={{fontSize:10,color:'#9ca3af',marginTop:2}}>{p.notes}</p>}
              </div>
              {user.role==='admin'&&<button onClick={e=>{e.stopPropagation();del(p.id);}} style={{fontSize:11,color:'#dc2626',background:'none',border:'none',cursor:'pointer'}}>×</button>}
            </div>
          </ListItem>)
        }
      </Card>
    }

    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar':'Novo Diagnóstico'} size="lg">
      <OnlinePregForm initial={editing} lots={lots} protocols={protocols} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>

    <Modal open={!!detailFemale} onClose={()=>setDetailFemale(null)} title={detailFemale?detailFemale.identifier:''} size="lg">
      {detailFemale&&<OnlineFemaleDetail female={detailFemale} items={items} protocols={protocols} lots={lots} onClose={()=>setDetailFemale(null)}/>}
    </Modal>
  </OnlinePage>;
}

function OnlinePregForm({initial,lots,protocols,onSave,onCancel}){
  const[f,setF]=useState({cow_id:'',lot_id:'',diagnosis_date:TODAY,result:'Positivo',expected_birth_date:'',notes:'',...initial});
  const[matchedProtocol,setMatchedProtocol]=useState(null);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  function pickCow(id,a){
    const upd={cow_id:id};
    if(a&&a.lot_id)upd.lot_id=a.lot_id;
    // Buscar último protocolo dessa vaca
    const proto=protocols&&protocols.find(p=>p.cow_id===id);
    setMatchedProtocol(proto||null);
    setF(p=>({...p,...upd}));
  }
  return <>
    <OnlineAnimalPicker label="Vaca" required value={f.cow_id} onChange={pickCow} sex="Fêmea" types={['Vaca','Novilha']}/>

    {matchedProtocol&&<Alert type="info" style={{marginBottom:12}}>

      {matchedProtocol.semen_bull&&<><br/>Touro IATF: <strong>{matchedProtocol.semen_bull}</strong></>}
      {matchedProtocol.repasse_bull&&<><br/>Touro Repasse: <strong>{matchedProtocol.repasse_bull}</strong></>}
    </Alert>}

    <Field label="Lote"><Select value={f.lot_id||''} onChange={e=>s('lot_id',e.target.value||null)}><option value="">—</option>{lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Select></Field>

      <Field label="Data Diagnóstico"><Input type="date" value={f.diagnosis_date} onChange={e=>s('diagnosis_date',e.target.value)}/></Field>
      <Field label="Resultado"><Select value={f.result} onChange={e=>s('result',e.target.value)}>{H.PRESULTS.map(r=><option key={r}>{r}</option>)}</Select></Field>
    </FormRow>
    <Field label="Parto Previsto" hint={f.result==='Positivo'?'Obrigatório se positivo':''}><Input type="date" value={f.expected_birth_date||''} onChange={e=>s('expected_birth_date',e.target.value||null)}/></Field>

      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}

/* ─── SAÍDA DE ANIMAIS ONLINE (admin) ─── */
function OnlineExits({user}){
  const{data:items,loading,error,reload}=useSupaQuery('animal_exits',{order:{column:'date',ascending:false}});
  const[showForm,setShowForm]=useState(false);

  async function save(data){
    try{
      const animal=await asyncFindAnimal(data.identifier);
      if(!animal){alert('Animal não está no Inventário.');return;}
      if(animal.status==='saiu'){alert('Animal já saiu.');return;}
      // Se motivo for morte, criar registro em deaths
      let deathId=null;
      if(data.reason==='morte'){
        const cat={'Vaca':'Vacas','Bezerro':'Bezerros','Touro':'Touros','Novilha':'Novilhas','Garrote':'Garrotes'}[animal.type]||'Outro';
        const d=await window.SupaDB.insert('deaths',{
          animal_id:animal.identifier,category:cat,lot_id:animal.lot_id,
          death_date:data.date,cause:data.death_cause||'Desconhecida',
          fact:data.notes||'',notes:'Criado a partir de Saída',
        });
        deathId=d.id;
      }
      await window.SupaDB.insert('animal_exits',{
        animal_id:animal.id,identifier:animal.identifier,date:data.date,reason:data.reason,
        buyer:data.buyer||null,sale_value:data.sale_value?parseFloat(data.sale_value):null,
        death_cause:data.death_cause||null,notes:data.notes||null,death_id:deathId,
      });
      await window.SupaDB.update('animals',animal.id,{status:'saiu',exit_date:data.date,exit_reason:data.reason});
      setShowForm(false);reload();
    }catch(e){alert('Erro: '+e.message);}
  }

  const REASONS={morte:{icon:'✝',color:'red',label:'Morte'},venda:{icon:'💰',color:'green',label:'Venda'},consumo:{icon:'🍖',color:'amber',label:'Consumo'},doacao:{icon:'🎁',color:'blue',label:'Doação'},outro:{icon:'📤',color:'gray',label:'Outro'}};

  return <OnlinePage title="Saída de Animais" subtitle={items.length+' saídas'} icon="📤" loading={loading} error={error}
    action={<Btn onClick={()=>setShowForm(true)}>+ Nova Saída</Btn>}>
    <Alert type="info">📋 Registre saídas por venda, morte, consumo ou doação. Animal é marcado como SAIU no Inventário.</Alert>
    <Card>
      {items.length===0?<EmptyState icon="📤" text="Nenhuma saída"/>:
        items.map(x=>{
          const r=REASONS[x.reason]||REASONS.outro;
          return <ListItem key={x.id}>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <div style={{fontSize:24}}>{r.icon}</div>
              <div>
                <strong style={{fontSize:13}}>{x.identifier}</strong> <Badge color={r.color}>{r.label}</Badge>
                <p style={{fontSize:11,color:'#6b7280'}}>{H.fmtDate(x.date)}{x.buyer?' · '+x.buyer:''}{x.sale_value?' · '+H.fmtMoney(x.sale_value):''}</p>
              </div>
            </div>
          </ListItem>;
        })
      }
    </Card>
    <Modal open={showForm} onClose={()=>setShowForm(false)} title="Nova Saída" size="lg">
      <OnlineExitForm REASONS={REASONS} onSave={save} onCancel={()=>setShowForm(false)}/>
    </Modal>
  </OnlinePage>;
}
