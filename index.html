/* ═══ RECEITAS ═══ */
function Revenues({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;

  const[season,setSeason]=useState(H.currentSeason());
  const[items,setItems]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);

  useEffect(()=>{setItems([...DB.get('revenues')].sort((a,b)=>(b.date||'').localeCompare(a.date||'')));},[rev]);

  const allRevenues=DB.get('revenues');
  const seasons=H.listSeasons(allRevenues);
  const filtered=items.filter(r=>H.getSeason(r.date)===season);

  function save(data){
    if(editing)DB.update('revenues',editing.id,data);
    else DB.insert('revenues',{...data,created_by:user.id});
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }
  function del(id){if(!confirm('Excluir esta receita?'))return;DB.delete('revenues',id);setRev(r=>r+1);setDetail(null);}

  const total=filtered.reduce((s,r)=>s+(parseFloat(r.total_value)||0),0);
  const totalHead=filtered.reduce((s,r)=>s+(parseInt(r.quantity)||0),0);
  const avgHead=totalHead>0?total/totalHead:0;

  // Agregar por categoria
  const byCategory={};
  filtered.forEach(r=>{if(!byCategory[r.category])byCategory[r.category]={value:0,qty:0,count:0};byCategory[r.category].value+=parseFloat(r.total_value)||0;byCategory[r.category].qty+=parseInt(r.quantity)||0;byCategory[r.category].count+=1;});

  if(detail){
    const creator=DB.find('users',detail.created_by);
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title="Receita" onBack={()=>setDetail(null)}
        action={<div style={{display:'flex',gap:8}}>
          <Btn size="sm" variant="secondary" onClick={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}>Editar</Btn>
          <Btn size="sm" variant="danger" onClick={()=>del(detail.id)}>Excluir</Btn>
        </div>}/>
      <Card>
        <CardHeader title={H.fmtMoney(detail.total_value)} icon="💰" action={<SyncBadge status={detail.sync_status}/>}/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="Valor total" value={<strong style={{fontSize:18,color:'#166534'}}>{H.fmtMoney(detail.total_value)}</strong>}/>
          <Info label="Valor por cabeça" value={H.fmtMoney(detail.per_head_value)}/>
          <Info label="Quantidade" value={detail.quantity+' animais'}/>
          <Info label="Sexo" value={detail.sex}/>
          <Info label="Categoria" value={<Badge color="green">{detail.category}</Badge>}/>
          <Info label="Tipo de Venda" value={detail.sale_type}/>
          <Info label="Data" value={H.fmtDate(detail.date)}/>
          <Info label="Safra" value={H.getSeason(detail.date)}/>
          <Info label="Lançado por" value={creator?.name||'—'}/>
          {detail.notes&&<div style={{gridColumn:'1/-1'}}><Info label="Observações" value={detail.notes}/></div>}
        </div>
      </Card>
    </div>;
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="💰 Receitas" sub={'Safra '+season} action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Lançar</Btn>}/>

    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
      <span style={{fontSize:12,fontWeight:600,color:'#374151'}}>Safra:</span>
      <select value={season} onChange={e=>setSeason(e.target.value)} style={{padding:'6px 10px',border:'1px solid #d1d5db',borderRadius:8,fontSize:13,fontWeight:600,background:'#fff'}}>
        {seasons.map(s=><option key={s} value={s}>Safra {s}</option>)}
      </select>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <StatCard label="Receita total" value={H.fmtMoney(total)} color="green" icon="💰"/>
      <StatCard label="Animais vendidos" value={totalHead} color="blue"/>
      <StatCard label="Média/cabeça" value={H.fmtMoney(avgHead)} color="amber"/>
      <StatCard label="Lançamentos" value={filtered.length} color="gray"/>
    </div>

    {Object.keys(byCategory).length>0&&<Card style={{marginBottom:12}}>
      <CardHeader title="Por Categoria" icon="📊"/>
      {Object.entries(byCategory).sort((a,b)=>b[1].value-a[1].value).map(([cat,d])=>
        <div key={cat} style={{padding:'10px 16px',borderBottom:'1px solid #f9fafb',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <p style={{fontWeight:500,fontSize:13}}>{cat}</p>
            <p style={{fontSize:11,color:'#6b7280'}}>{d.qty} animais · {d.count} lançamento{d.count>1?'s':''}</p>
          </div>
          <strong style={{fontSize:14,color:'#166534'}}>{H.fmtMoney(d.value)}</strong>
        </div>
      )}
    </Card>}

    <Card>
      <CardHeader title="Lançamentos" icon="📝" action={<Badge color="gray">{filtered.length}</Badge>}/>
      {filtered.length===0?<EmptyState icon="💰" text="Nenhuma receita nesta safra" action={<Btn onClick={()=>setShowForm(true)}>+ Primeira receita</Btn>}/>:
        filtered.map(r=><ListItem key={r.id} onClick={()=>setDetail(r)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                <strong style={{fontSize:13}}>{H.fmtMoney(r.total_value)}</strong>
                <Badge color="green">{r.category}</Badge>
              </div>
              <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>{r.quantity} cab{r.sex?' '+r.sex.toLowerCase():''} · {r.sale_type} · {H.fmtDate(r.date)}</p>
              {r.per_head_value&&<p style={{fontSize:11,color:'#9ca3af'}}>{H.fmtMoney(r.per_head_value)}/cabeça</p>}
            </div>
            <SyncBadge status={r.sync_status}/>
          </div>
        </ListItem>)
      }
    </Card>

    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar Receita':'Nova Receita'} size="lg">
      <RevenueForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
  </div>;
}

function RevenueForm({initial,onSave,onCancel}){
  const[f,setF]=useState({date:TODAY,category:'Bezerros',quantity:'',sex:'Macho',sale_type:'Venda direta',total_value:'',per_head_value:'',notes:'',...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  // Auto-calcula valor por cabeça
  const updTotal=(v)=>{s('total_value',v);if(f.quantity&&parseFloat(v)>0)s('per_head_value',(parseFloat(v)/parseFloat(f.quantity)).toFixed(2));};
  const updQty=(v)=>{s('quantity',v);if(f.total_value&&parseFloat(v)>0)s('per_head_value',(parseFloat(f.total_value)/parseFloat(v)).toFixed(2));};
  return <>
    <FormRow>
      <Field label="Data"><Input type="date" value={f.date} onChange={e=>s('date',e.target.value)}/></Field>
      <Field label="Categoria"><Select value={f.category} onChange={e=>s('category',e.target.value)}>{['Bezerros','Vacas de descarte','Novilhas','Reprodutores','Outro'].map(c=><option key={c}>{c}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Quantidade" required><Input type="number" value={f.quantity} onChange={e=>updQty(e.target.value)}/></Field>
      <Field label="Sexo"><Select value={f.sex} onChange={e=>s('sex',e.target.value)}><option>Macho</option><option>Fêmea</option><option>Misto</option></Select></Field>
    </FormRow>
    <Field label="Tipo de Venda"><Select value={f.sale_type} onChange={e=>s('sale_type',e.target.value)}>{['Venda direta','Frigorífico','Leilão','Outro'].map(t=><option key={t}>{t}</option>)}</Select></Field>
    <FormRow>
      <Field label="Valor Total (R$)" required hint="O valor por cabeça é calculado automaticamente"><Input type="number" step="0.01" value={f.total_value} onChange={e=>updTotal(e.target.value)}/></Field>
      <Field label="Valor/Cabeça (R$)"><Input type="number" step="0.01" value={f.per_head_value} onChange={e=>s('per_head_value',e.target.value)}/></Field>
    </FormRow>
    <Field label="Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)} placeholder="Comprador, condições, detalhes..."/></Field>
    <FormActions onSave={()=>{
      if(!f.quantity||!f.total_value)return alert('Quantidade e valor obrigatórios');
      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}

/* ═══ CUSTOS ═══ */
function Costs({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;

  const[season,setSeason]=useState(H.currentSeason());
  const[filter,setFilter]=useState('all');
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);

  const allCosts=useMemo(()=>DB.get('costs'),[rev]);
  const costs=allCosts.filter(c=>H.getSeason(c.date)===season);
  const seasons=H.listSeasons(allCosts);
  const filteredByType=filter==='all'?costs:costs.filter(c=>c.type===filter);

  function save(data){
    if(editing)DB.update('costs',editing.id,data);
    else DB.insert('costs',{...data,responsible_id:user.id});
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }
  function del(id){if(!confirm('Excluir este custo?'))return;DB.delete('costs',id);setRev(r=>r+1);setDetail(null);}

  // Totais por categoria
  const byCategory={};
  filteredByType.forEach(c=>{if(!byCategory[c.category])byCategory[c.category]={count:0,value:0};byCategory[c.category].count+=1;byCategory[c.category].value+=parseFloat(c.value)||0;});

  const totalCusteio=costs.filter(c=>c.type==='Custeio').reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const totalInvest=costs.filter(c=>c.type==='Investimento').reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const totalGeral=totalCusteio+totalInvest;

  const animals=DB.get('animals');
  const costPerHead=animals.length>0?totalCusteio/animals.length:0;

  if(detail){
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title="Detalhe do Custo" onBack={()=>setDetail(null)}
        action={<div style={{display:'flex',gap:8}}>
          <Btn size="sm" variant="secondary" onClick={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}>Editar</Btn>
          <Btn size="sm" variant="danger" onClick={()=>del(detail.id)}>Excluir</Btn>
        </div>}/>
      <Card>
        <CardHeader title={detail.description} icon={detail.type==='Custeio'?'💸':'🏗'} action={<SyncBadge status={detail.sync_status}/>}/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="Valor" value={<strong style={{fontSize:18,color:'#dc2626'}}>{H.fmtMoney(detail.value)}</strong>}/>
          <Info label="Tipo" value={<Badge color={detail.type==='Custeio'?'amber':'blue'}>{detail.type}</Badge>}/>
          <Info label="Data" value={H.fmtDate(detail.date)}/>
          <Info label="Safra" value={H.getSeason(detail.date)}/>
          <Info label="Categoria" value={detail.category}/>
          <Info label="Subcategoria" value={detail.subcategory||'—'}/>
          {detail.sub_sub&&<Info label="Sub-subcategoria" value={detail.sub_sub}/>}
          {detail.cost_center&&<Info label="Centro de Custo" value={detail.cost_center}/>}
          {detail.notes&&<div style={{gridColumn:'1/-1'}}><Info label="Observações" value={detail.notes}/></div>}
        </div>
      </Card>
    </div>;
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="💵 Custos" sub={'Safra '+season} action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Lançar</Btn>}/>

    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
      <span style={{fontSize:12,fontWeight:600,color:'#374151'}}>Safra:</span>
      <select value={season} onChange={e=>setSeason(e.target.value)} style={{padding:'6px 10px',border:'1px solid #d1d5db',borderRadius:8,fontSize:13,fontWeight:600,background:'#fff'}}>
        {seasons.map(s=><option key={s} value={s}>Safra {s}</option>)}
      </select>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <StatCard label="Custeio" value={H.fmtMoney(totalCusteio)} color="amber" icon="💸"/>
      <StatCard label="Investimentos" value={H.fmtMoney(totalInvest)} color="blue" icon="🏗"/>
      <StatCard label="Desembolso total" value={H.fmtMoney(totalGeral)} color="red"/>
      <StatCard label="Custeio/Cabeça" value={H.fmtMoney(costPerHead)} sub={animals.length+' animais'} color="gray"/>
    </div>

    <Alert type="info">Lance aqui os custos e investimentos da fazenda. Estrutura baseada em centros de custo.</Alert>

    <div style={{display:'flex',gap:4,marginBottom:12,background:'#f3f4f6',padding:4,borderRadius:10}}>
      {['all','Custeio','Investimento'].map(t=>
        <button key={t} onClick={()=>setFilter(t)} style={{flex:1,padding:8,background:filter===t?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:filter===t?600:400,color:filter===t?'#166534':'#6b7280'}}>
          {t==='all'?'Todos':t}
        </button>
      )}
    </div>

    {Object.keys(byCategory).length>0&&<Card style={{marginBottom:12}}>
      <CardHeader title="Por Categoria" icon="📊"/>
      {Object.entries(byCategory).sort((a,b)=>b[1].value-a[1].value).map(([cat,d])=>{
        const struct=H.CSTRUCT[cat];
        return <div key={cat} style={{padding:'10px 16px',borderBottom:'1px solid #f9fafb',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <p style={{fontWeight:500,fontSize:13}}>{struct?.icon||'📋'} {cat}</p>
            <p style={{fontSize:11,color:'#6b7280'}}>{d.count} lançamento{d.count>1?'s':''}</p>
          </div>
          <strong style={{fontSize:14,color:'#dc2626'}}>{H.fmtMoney(d.value)}</strong>
        </div>;
      })}
    </Card>}

    <Card>
      <CardHeader title="Lançamentos" icon="📝" action={<Badge color="gray">{filteredByType.length}</Badge>}/>
      {filteredByType.length===0?<EmptyState icon="💵" text="Sem lançamentos nesta safra" action={<Btn onClick={()=>setShowForm(true)}>+ Primeiro lançamento</Btn>}/>:
        filteredByType.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(c=><ListItem key={c.id} onClick={()=>setDetail(c)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                <strong style={{fontSize:13}}>{c.description||c.subcategory}</strong>
                <Badge color={c.type==='Custeio'?'amber':'blue'}>{c.type}</Badge>
              </div>
              <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>
                {c.category}{c.subcategory?' → '+c.subcategory:''}{c.sub_sub?' → '+c.sub_sub:''}
                {c.cost_center?' · '+c.cost_center:''}
              </p>
              <p style={{fontSize:11,color:'#9ca3af'}}>{H.fmtDate(c.date)}</p>
            </div>
            <div style={{textAlign:'right'}}>
              <strong style={{fontSize:14,color:'#dc2626'}}>{H.fmtMoney(c.value)}</strong>
            </div>
          </div>
        </ListItem>)
      }
    </Card>

    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar Custo':'Lançar Custo'} size="lg">
      <CostForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
  </div>;
}

function CostForm({initial,onSave,onCancel}){
  const[f,setF]=useState({date:TODAY,type:'Custeio',category:'Produção',subcategory:'',sub_sub:'',value:'',description:'',cost_center:'',notes:'',...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const struct=H.CSTRUCT[f.category];
  const subOptions=struct?.subs||[];
  const showSubSub=f.category==='Outros animais';
  const subSubs=showSubSub?(H.CSTRUCT['Outros animais'].subSubs||['Compra de animais','Custeio']):[];
  return <>
    <FormRow>
      <Field label="Data"><Input type="date" value={f.date} onChange={e=>s('date',e.target.value)}/></Field>
      <Field label="Tipo" required><Select value={f.type} onChange={e=>s('type',e.target.value)}>{H.CTYPES.map(t=><option key={t}>{t}</option>)}</Select></Field>
    </FormRow>
    <Field label="Categoria" required>
      <Select value={f.category} onChange={e=>{s('category',e.target.value);s('subcategory','');s('sub_sub','');}}>
        {Object.keys(H.CSTRUCT).map(c=><option key={c}>{c}</option>)}
      </Select>
    </Field>
    {subOptions.length>0&&<Field label={showSubSub?'Tipo de Animal':'Subcategoria'} required>
      <Select value={f.subcategory} onChange={e=>{s('subcategory',e.target.value);s('sub_sub','');}}>
        <option value="">—</option>
        {subOptions.map(x=><option key={x}>{x}</option>)}
      </Select>
    </Field>}
    {showSubSub&&f.subcategory&&<Field label="Subcategoria" required>
      <Select value={f.sub_sub} onChange={e=>s('sub_sub',e.target.value)}>
        <option value="">—</option>
        {subSubs.map(x=><option key={x}>{x}</option>)}
      </Select>
    </Field>}
    <FormRow>
      <Field label="Valor (R$)" required><Input type="number" step="0.01" value={f.value} onChange={e=>s('value',e.target.value)} placeholder="0,00"/></Field>
      <Field label="Centro de Custo"><Input value={f.cost_center} onChange={e=>s('cost_center',e.target.value)} placeholder="Ex: Vacas, Bezerros, Geral"/></Field>
    </FormRow>
    <Field label="Descrição" required><Input value={f.description} onChange={e=>s('description',e.target.value)} placeholder="Ex: Sal mineral – mês de novembro"/></Field>
    <Field label="Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)}/></Field>
    <FormActions onSave={()=>{
      if(!f.value||parseFloat(f.value)<=0)return alert('Informe um valor válido');
      if(!f.description)return alert('Descrição obrigatória');
      if(subOptions.length>0&&!f.subcategory)return alert('Selecione a subcategoria');
      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}

/* ═══ ANÁLISES — custo/bezerro, receita×custo, calendário ═══ */

/* ─── Apuração do custo do bezerro produzido ─── */
function CalfCostAnalysis(){
  const[season,setSeason]=useState(H.currentSeason());
  const allBirths=DB.get('births');
  const allCosts=DB.get('costs');
  const seasons=H.listSeasons([...allBirths,...allCosts]);

  const births=allBirths.filter(b=>H.getSeason(b.birth_date)===season);
  const costs=allCosts.filter(c=>H.getSeason(c.date)===season);

  // Rateio: custos de PRODUÇÃO (Custeio) rateados pelos nascimentos
  const prodCosts=costs.filter(c=>c.type==='Custeio'&&(c.category==='Produção'||c.category==='Suporte à produção'));
  const totalProd=prodCosts.reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const totalInv=costs.filter(c=>c.type==='Investimento').reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const custoBezerro=births.length>0?totalProd/births.length:0;

  // Detalhamento por subcategoria
  const bySub={};
  prodCosts.forEach(c=>{const k=(c.category||'')+' › '+(c.subcategory||'Sem subcategoria');if(!bySub[k])bySub[k]={value:0,count:0};bySub[k].value+=parseFloat(c.value)||0;bySub[k].count+=1;});

  // Peso médio ao nascer
  const avgWeight=births.length>0?(births.reduce((s,b)=>s+(parseFloat(b.birth_weight)||0),0)/births.length).toFixed(1):0;

  return <>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
      <span style={{fontSize:12,fontWeight:600,color:'#374151'}}>Safra:</span>
      <select value={season} onChange={e=>setSeason(e.target.value)} style={{padding:'6px 10px',border:'1px solid #d1d5db',borderRadius:8,fontSize:13,fontWeight:600,background:'#fff'}}>
        {seasons.map(s=><option key={s} value={s}>Safra {s}</option>)}
      </select>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <StatCard label="Bezerros nascidos" value={births.length} color="green" icon="🐮"/>
      <StatCard label="Peso médio ao nascer" value={avgWeight+' kg'} color="amber"/>
      <StatCard label="Custos de produção" value={H.fmtMoney(totalProd)} sub="Custeio" color="red"/>
      <StatCard label="Custo por bezerro" value={H.fmtMoney(custoBezerro)} sub="rateio" color="blue"/>
    </div>

    {births.length===0?<Alert type="warning">Sem nascimentos na safra {season}. O custo/bezerro precisa de pelo menos 1 nascimento para ser calculado.</Alert>:
      prodCosts.length===0?<Alert type="info">Lance custos de <strong>Produção</strong> ou <strong>Suporte à produção</strong> do tipo <strong>Custeio</strong> para que o rateio seja apurado.</Alert>:null}

    <Card style={{marginBottom:12}}>
      <CardHeader title="Como é calculado" icon="💡"/>
      <div style={{padding:'14px 16px',fontSize:12,color:'#374151',lineHeight:1.6}}>
        <strong>Custo/bezerro = (Custos Produção + Custos Suporte à Produção) ÷ Nº de bezerros nascidos na safra</strong>
        <p style={{marginTop:8}}>Considera apenas lançamentos tipo <strong>Custeio</strong> (não inclui Investimentos nem Administrativos).</p>
        <p>Fórmula atual: {H.fmtMoney(totalProd)} ÷ {births.length} = <strong>{H.fmtMoney(custoBezerro)}</strong></p>
      </div>
    </Card>

    {Object.keys(bySub).length>0&&<Card style={{marginBottom:12}}>
      <CardHeader title="Custos de Produção por Subcategoria" icon="📋"/>
      {Object.entries(bySub).sort((a,b)=>b[1].value-a[1].value).map(([k,d])=>{
        const pct=totalProd>0?((d.value/totalProd)*100).toFixed(0):0;
        const perCalf=births.length>0?d.value/births.length:0;
        return <div key={k} style={{padding:'10px 16px',borderBottom:'1px solid #f9fafb'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:'#374151'}}>{k}</span>
            <strong style={{fontSize:13,color:'#dc2626'}}>{H.fmtMoney(d.value)}</strong>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
            <span style={{fontSize:10,color:'#9ca3af'}}>{pct}% do total · {d.count} lanç.</span>
            <span style={{fontSize:10,color:'#6b7280'}}>{H.fmtMoney(perCalf)}/bezerro</span>
          </div>
        </div>;
      })}
    </Card>}

    <Card>
      <CardHeader title="Investimentos (não entram no custo/bezerro)" icon="🏗"/>
      <div style={{padding:'14px 16px',fontSize:13}}>
        <p>Total investido na safra: <strong style={{color:'#1e40af'}}>{H.fmtMoney(totalInv)}</strong></p>
        <p style={{fontSize:11,color:'#6b7280',marginTop:4}}>Investimentos são amortizados ao longo do tempo e tratados separadamente do custo de produção.</p>
      </div>
    </Card>
  </>;
}

/* ─── Receita × Custo por mês ─── */
function RevCostChart(){
  const[months,setMonths]=useState(12);
  const now=new Date();
  const periods=[];
  for(let i=months-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const y=d.getFullYear();const m=d.getMonth();
    const start=y+'-'+String(m+1).padStart(2,'0')+'-01';
    const end=new Date(y,m+1,0).toISOString().split('T')[0];
    const label=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][m]+'/'+String(y).slice(-2);
    periods.push({label,start,end,y,m});
  }

  const allRev=DB.get('revenues');
  const allCost=DB.get('costs');

  const data=periods.map(p=>{
    const rev=allRev.filter(r=>r.date>=p.start&&r.date<=p.end).reduce((s,r)=>s+(parseFloat(r.total_value)||0),0);
    const cost=allCost.filter(c=>c.date>=p.start&&c.date<=p.end).reduce((s,c)=>s+(parseFloat(c.value)||0),0);
    return{...p,rev,cost,result:rev-cost};
  });

  const maxVal=Math.max(...data.flatMap(d=>[d.rev,d.cost]),1);
  const totalRev=data.reduce((s,d)=>s+d.rev,0);
  const totalCost=data.reduce((s,d)=>s+d.cost,0);
  const totalResult=totalRev-totalCost;

  return <>
    <div style={{display:'flex',gap:8,marginBottom:12}}>
      {[6,12,24].map(n=>
        <button key={n} onClick={()=>setMonths(n)} style={{padding:'6px 12px',border:'1px solid #d1d5db',background:months===n?'#166534':'#fff',color:months===n?'#fff':'#374151',borderRadius:8,fontSize:12,cursor:'pointer'}}>{n} meses</button>
      )}
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}}>
      <StatCard label="Receitas" value={H.fmtMoney(totalRev)} color="green"/>
      <StatCard label="Custos" value={H.fmtMoney(totalCost)} color="red"/>
      <StatCard label="Resultado" value={H.fmtMoney(totalResult)} color={totalResult>=0?'green':'red'}/>
    </div>

    <Card style={{marginBottom:12}}>
      <CardHeader title="Receita × Custo mensal" icon="📈"/>
      <div style={{padding:'14px 8px',overflowX:'auto'}}>
        <div style={{display:'flex',gap:6,minWidth:months*40,height:180,alignItems:'flex-end',paddingBottom:30,position:'relative'}}>
          {data.map((d,i)=>{
            const revH=maxVal>0?(d.rev/maxVal)*140:0;
            const costH=maxVal>0?(d.cost/maxVal)*140:0;
            return <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',gap:2,position:'relative',minWidth:30}}>
              <div style={{display:'flex',gap:2,alignItems:'flex-end',height:140}}>
                <div title={'Receita: '+H.fmtMoney(d.rev)} style={{width:12,height:revH,background:'#166534',borderRadius:'2px 2px 0 0'}}/>
                <div title={'Custo: '+H.fmtMoney(d.cost)} style={{width:12,height:costH,background:'#dc2626',borderRadius:'2px 2px 0 0'}}/>
              </div>
              <span style={{position:'absolute',bottom:-22,fontSize:9,color:'#6b7280',whiteSpace:'nowrap',transform:'rotate(-30deg)',transformOrigin:'center'}}>{d.label}</span>
            </div>;
          })}
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:20,marginTop:16,fontSize:11}}>
          <span style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:12,background:'#166534',borderRadius:2}}/>Receita</span>
          <span style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:12,background:'#dc2626',borderRadius:2}}/>Custo</span>
        </div>
      </div>
    </Card>

    <Card>
      <CardHeader title="Detalhamento mensal"/>
      {data.filter(d=>d.rev>0||d.cost>0).reverse().map((d,i)=>
        <div key={i} style={{padding:'10px 16px',borderBottom:'1px solid #f9fafb',display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,fontSize:12}}>
          <strong>{d.label}</strong>
          <span style={{color:'#166534'}}>{H.fmtMoney(d.rev)}</span>
          <span style={{color:'#dc2626'}}>{H.fmtMoney(d.cost)}</span>
          <strong style={{color:d.result>=0?'#166534':'#dc2626',textAlign:'right'}}>{H.fmtMoney(d.result)}</strong>
        </div>
      )}
      {data.every(d=>d.rev===0&&d.cost===0)&&<EmptyState text="Sem lançamentos no período"/>}
    </Card>
  </>;
}

/* ─── Calendário reprodutivo ─── */
function ReproCalendar({onNav}){
  const preg=DB.get('pregnancy_diagnoses').filter(p=>p.result==='Positivo'&&p.expected_birth_date);
  const lots=DB.get('lots');
  const settings=DB.settings();
  const alertDays=parseInt(settings.birth_alert_days||'30');

  // Agrupa por mês de parto previsto
  const byMonth={};
  preg.forEach(p=>{
    const d=new Date(p.expected_birth_date+'T12:00:00');
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(!byMonth[key])byMonth[key]=[];
    byMonth[key].push(p);
  });

  const today=new Date();today.setHours(0,0,0,0);
  const next30=preg.filter(p=>{const d=H.daysUntil(p.expected_birth_date);return d!==null&&d>=0&&d<=30;}).sort((a,b)=>a.expected_birth_date.localeCompare(b.expected_birth_date));
  const next90=preg.filter(p=>{const d=H.daysUntil(p.expected_birth_date);return d!==null&&d>30&&d<=90;}).sort((a,b)=>a.expected_birth_date.localeCompare(b.expected_birth_date));
  const later=preg.filter(p=>{const d=H.daysUntil(p.expected_birth_date);return d!==null&&d>90;}).sort((a,b)=>a.expected_birth_date.localeCompare(b.expected_birth_date));
  const past=preg.filter(p=>{const d=H.daysUntil(p.expected_birth_date);return d!==null&&d<0;}).sort((a,b)=>b.expected_birth_date.localeCompare(a.expected_birth_date));

  function Row({p}){
    const days=H.daysUntil(p.expected_birth_date);
    const lot=lots.find(l=>l.id===p.lot_id);
    const color=days<0?'gray':days<=7?'red':days<=alertDays?'amber':'blue';
    const label=days<0?Math.abs(days)+'d atrás':days===0?'Hoje':days+' dia'+(days>1?'s':'');
    return <ListItem onClick={()=>onNav&&onNav('pregnancy')}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
        <div>
          <strong style={{fontSize:13}}>{p.cow_id}</strong>
          <p style={{fontSize:11,color:'#6b7280'}}>Parto: {H.fmtDate(p.expected_birth_date)}{lot?' · '+lot.name:''}</p>
        </div>
        <Badge color={color}>{label}</Badge>
      </div>
    </ListItem>;
  }

  return <>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}}>
      <StatCard label="Próximos 30 dias" value={next30.length} color={next30.length>0?'red':'gray'} icon="🚨"/>
      <StatCard label="31-90 dias" value={next90.length} color="amber"/>
      <StatCard label="Total prenhas" value={preg.length} color="blue"/>
    </div>

    {next30.length>0&&<Card style={{marginBottom:12}}>
      <CardHeader title="🚨 Partos Próximos (até 30 dias)" action={<Badge color="red">{next30.length}</Badge>}/>
      {next30.map(p=><Row key={p.id} p={p}/>)}
    </Card>}

    {next90.length>0&&<Card style={{marginBottom:12}}>
      <CardHeader title="Partos em 31–90 dias" action={<Badge color="amber">{next90.length}</Badge>}/>
      {next90.map(p=><Row key={p.id} p={p}/>)}
    </Card>}

    {later.length>0&&<Card style={{marginBottom:12}}>
      <CardHeader title="Mais de 90 dias" action={<Badge color="blue">{later.length}</Badge>}/>
      {later.map(p=><Row key={p.id} p={p}/>)}
    </Card>}

    {past.length>0&&<Card style={{marginBottom:12}}>
      <CardHeader title="⚠ Partos já previstos (atrasados)" action={<Badge color="gray">{past.length}</Badge>}/>
      {past.map(p=><Row key={p.id} p={p}/>)}
    </Card>}

    {preg.length===0&&<EmptyState icon="📅" text="Sem gestações positivas com data prevista"/>}

    <Card>
      <CardHeader title="Previsão por mês" icon="📆"/>
      {Object.keys(byMonth).length===0?<EmptyState text="Sem dados"/>:
        Object.entries(byMonth).sort().map(([mk,ps])=>{
          const[y,m]=mk.split('-');
          const name=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][parseInt(m)-1];
          return <div key={mk} style={{padding:'10px 16px',borderBottom:'1px solid #f9fafb',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:500}}>{name} / {y}</span>
            <Badge color="blue">{ps.length} parto{ps.length>1?'s':''}</Badge>
          </div>;
        })
      }
    </Card>
  </>;
}

/* ═══ RELATÓRIO DE SAFRA (imprimível) ═══ */
function Report({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;
  const[season,setSeason]=useState(H.currentSeason());
  const settings=DB.settings();
  const allBirths=DB.get('births');
  const allDeaths=DB.get('deaths');
  const allPreg=DB.get('pregnancy_diagnoses');
  const allRev=DB.get('revenues');
  const allCosts=DB.get('costs');
  const seasons=H.listSeasons([...allBirths,...allDeaths,...allPreg,...allRev,...allCosts]);

  const births=allBirths.filter(b=>H.getSeason(b.birth_date)===season);
  const deaths=allDeaths.filter(d=>H.getSeason(d.death_date)===season);
  const diags=allPreg.filter(p=>H.getSeason(p.diagnosis_date)===season);
  const revenues=allRev.filter(r=>H.getSeason(r.date)===season);
  const costs=allCosts.filter(c=>H.getSeason(c.date)===season);

  const preg=H.calcPregnancy(allPreg,season);
  const mRate=births.length>0?((deaths.length/births.length)*100).toFixed(1):'0.0';
  const males=births.filter(b=>b.calf_sex==='Macho').length;
  const females=births.length-males;
  const avgW=births.length>0?(births.reduce((s,b)=>s+(parseFloat(b.birth_weight)||0),0)/births.length).toFixed(1):0;
  const totalRev=revenues.reduce((s,r)=>s+(parseFloat(r.total_value)||0),0);
  const totalCusteio=costs.filter(c=>c.type==='Custeio').reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const totalInvest=costs.filter(c=>c.type==='Investimento').reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const totalCost=totalCusteio+totalInvest;
  const result=totalRev-totalCost;
  const prodCosts=costs.filter(c=>c.type==='Custeio'&&(c.category==='Produção'||c.category==='Suporte à produção')).reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const custoBezerro=births.length>0?prodCosts/births.length:0;

  function doPrint(){window.print();}

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="🖨 Relatório de Safra" sub="Visão consolidada · pronto para imprimir" action={<Btn onClick={doPrint}>🖨 Imprimir</Btn>}/>

    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}} className="no-print">
      <span style={{fontSize:12,fontWeight:600,color:'#374151'}}>Safra:</span>
      <select value={season} onChange={e=>setSeason(e.target.value)} style={{padding:'6px 10px',border:'1px solid #d1d5db',borderRadius:8,fontSize:13,fontWeight:600,background:'#fff'}}>
        {seasons.map(s=><option key={s} value={s}>Safra {s}</option>)}
      </select>
    </div>

    <div id="printable-report" style={{background:'#fff',padding:24,borderRadius:12,border:'1px solid #e5e7eb'}}>
      <div style={{textAlign:'center',marginBottom:24,paddingBottom:16,borderBottom:'2px solid #166534'}}>
        <h1 style={{fontSize:22,fontWeight:700,color:'#14532d'}}>🐂 {settings.farm_name||'Fazenda'}</h1>
        <h2 style={{fontSize:16,fontWeight:500,color:'#374151',marginTop:4}}>Relatório da Safra {season}</h2>
        <p style={{fontSize:11,color:'#6b7280',marginTop:4}}>Gerado em {H.fmtDate(TODAY)}</p>
      </div>

      <h3 style={{fontSize:14,fontWeight:700,color:'#14532d',marginBottom:10}}>📊 INDICADORES PRODUTIVOS</h3>
      <table style={{width:'100%',fontSize:12,borderCollapse:'collapse',marginBottom:20}}>
        <tbody>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>Nascimentos</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right',fontWeight:600}}>{births.length}</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>&nbsp;&nbsp;&nbsp;Machos</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right'}}>{males}</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>&nbsp;&nbsp;&nbsp;Fêmeas</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right'}}>{females}</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>Peso médio ao nascer</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right',fontWeight:600}}>{avgW} kg</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>Mortalidade</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right',fontWeight:600}}>{deaths.length} ({mRate}%)</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>Diagnósticos de gestação</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right'}}>{diags.length}</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>Taxa de prenhez</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right',fontWeight:600}}>{preg.rate.toFixed(0)}% ({preg.positive}/{preg.total})</td></tr>
        </tbody>
      </table>

      <h3 style={{fontSize:14,fontWeight:700,color:'#14532d',marginBottom:10}}>💰 INDICADORES FINANCEIROS</h3>
      <table style={{width:'100%',fontSize:12,borderCollapse:'collapse',marginBottom:20}}>
        <tbody>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>Receita total</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right',fontWeight:600,color:'#166534'}}>{H.fmtMoney(totalRev)}</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>Custeio</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right',color:'#dc2626'}}>{H.fmtMoney(totalCusteio)}</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>Investimentos</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right',color:'#1e40af'}}>{H.fmtMoney(totalInvest)}</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6'}}>Custo total</td><td style={{padding:'6px 0',borderBottom:'1px solid #f3f4f6',textAlign:'right',fontWeight:600,color:'#dc2626'}}>{H.fmtMoney(totalCost)}</td></tr>
          <tr><td style={{padding:'6px 0',borderBottom:'2px solid #14532d',fontWeight:700}}>RESULTADO LÍQUIDO</td><td style={{padding:'6px 0',borderBottom:'2px solid #14532d',textAlign:'right',fontWeight:700,fontSize:14,color:result>=0?'#166534':'#dc2626'}}>{H.fmtMoney(result)}</td></tr>
          <tr><td style={{padding:'6px 0'}}>Custo por bezerro produzido</td><td style={{padding:'6px 0',textAlign:'right',fontWeight:600}}>{H.fmtMoney(custoBezerro)}</td></tr>
          <tr><td style={{padding:'6px 0'}}>Receita média por bezerro nascido</td><td style={{padding:'6px 0',textAlign:'right',fontWeight:600}}>{H.fmtMoney(births.length>0?totalRev/births.length:0)}</td></tr>
        </tbody>
      </table>

      {revenues.length>0&&<>
        <h3 style={{fontSize:14,fontWeight:700,color:'#14532d',marginBottom:10}}>💰 RECEITAS DETALHADAS</h3>
        <table style={{width:'100%',fontSize:11,borderCollapse:'collapse',marginBottom:20}}>
          <thead><tr style={{background:'#f0fdf4'}}><th style={{padding:'6px',textAlign:'left'}}>Data</th><th style={{padding:'6px',textAlign:'left'}}>Categoria</th><th style={{padding:'6px',textAlign:'right'}}>Qtd</th><th style={{padding:'6px',textAlign:'right'}}>Valor</th></tr></thead>
          <tbody>{revenues.map(r=><tr key={r.id} style={{borderBottom:'1px solid #f3f4f6'}}>
            <td style={{padding:'5px 6px'}}>{H.fmtDate(r.date)}</td><td style={{padding:'5px 6px'}}>{r.category}</td>
            <td style={{padding:'5px 6px',textAlign:'right'}}>{r.quantity}</td><td style={{padding:'5px 6px',textAlign:'right',fontWeight:600}}>{H.fmtMoney(r.total_value)}</td>
          </tr>)}</tbody>
        </table>
      </>}

      {costs.length>0&&<>
        <h3 style={{fontSize:14,fontWeight:700,color:'#14532d',marginBottom:10}}>💵 CUSTOS DETALHADOS</h3>
        <table style={{width:'100%',fontSize:11,borderCollapse:'collapse',marginBottom:20}}>
          <thead><tr style={{background:'#fef2f2'}}><th style={{padding:'6px',textAlign:'left'}}>Data</th><th style={{padding:'6px',textAlign:'left'}}>Tipo</th><th style={{padding:'6px',textAlign:'left'}}>Categoria</th><th style={{padding:'6px',textAlign:'left'}}>Descrição</th><th style={{padding:'6px',textAlign:'right'}}>Valor</th></tr></thead>
          <tbody>{costs.map(c=><tr key={c.id} style={{borderBottom:'1px solid #f3f4f6'}}>
            <td style={{padding:'5px 6px'}}>{H.fmtDate(c.date)}</td><td style={{padding:'5px 6px'}}>{c.type}</td>
            <td style={{padding:'5px 6px'}}>{c.category}{c.subcategory?' › '+c.subcategory:''}</td>
            <td style={{padding:'5px 6px'}}>{c.description}</td><td style={{padding:'5px 6px',textAlign:'right',fontWeight:600}}>{H.fmtMoney(c.value)}</td>
          </tr>)}</tbody>
        </table>
      </>}

      <div style={{marginTop:30,paddingTop:16,borderTop:'1px solid #e5e7eb',fontSize:10,color:'#9ca3af',textAlign:'center'}}>
        Gerado por PecuáriaManager · {H.fmtDate(TODAY)}
      </div>
    </div>

    <style>{`
      @media print {
        body{background:#fff}
        .no-print,.pm-sidebar,.pm-topbar,.pm-bottomnav{display:none!important}
        main{padding:0!important}
        #printable-report{border:none!important;padding:0!important}
      }
    `}</style>
  </div>;
}

/* ═══ GALERIA DE FOTOS ═══ */
function Gallery({user,onNav}){
  const[filter,setFilter]=useState('all');
  const[lightbox,setLightbox]=useState(null);

  // Coletar todas as fotos do sistema
  const photos=useMemo(()=>{
    const out=[];
    DB.get('births').forEach(b=>{
      if(b.cow_photo)out.push({img:b.cow_photo,type:'birth-cow',label:'Mãe '+b.mother_id,date:b.birth_date,ref:b.id,category:'births',extra:'Bezerro: '+b.calf_id});
      if(b.calf_photo)out.push({img:b.calf_photo,type:'birth-calf',label:'Bezerro '+b.calf_id,date:b.birth_date,ref:b.id,category:'births',extra:b.calf_sex+' · '+b.birth_weight+'kg'});
    });
    DB.get('deaths').forEach(d=>{
      if(d.photo)out.push({img:d.photo,type:'death',label:d.animal_id,date:d.death_date,ref:d.id,category:'mortality',extra:d.cause});
    });
    DB.get('feces_records').forEach(f=>{
      if(f.image)out.push({img:f.image,type:'feces',label:'Fezes '+H.fmtDate(f.date),date:f.date,ref:f.id,category:'feces',extra:f.category});
    });
    return out.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  },[]);

  const CATS={all:'Todas',births:'🐮 Nascimentos',mortality:'✝ Mortalidade',feces:'🔍 Fezes'};
  const filtered=filter==='all'?photos:photos.filter(p=>p.category===filter);
  const counts={};photos.forEach(p=>{counts[p.category]=(counts[p.category]||0)+1;});

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="📸 Galeria de Fotos" sub={photos.length+' foto'+(photos.length!==1?'s':'')+' no sistema'}/>

    <div style={{display:'flex',gap:4,marginBottom:14,background:'#f3f4f6',padding:4,borderRadius:10,overflowX:'auto'}}>
      {Object.entries(CATS).map(([id,lbl])=>{
        const c=id==='all'?photos.length:counts[id]||0;
        return <button key={id} onClick={()=>setFilter(id)} style={{flex:'1 0 auto',padding:8,background:filter===id?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:filter===id?600:400,color:filter===id?'#166534':'#6b7280',whiteSpace:'nowrap'}}>
          {lbl} ({c})
        </button>;
      })}
    </div>

    {filtered.length===0
      ? <EmptyState icon="📷" text={filter==='all'?'Nenhuma foto cadastrada ainda':'Nenhuma foto nesta categoria'}/>
      : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8}}>
          {filtered.map((p,i)=>
            <div key={i} onClick={()=>setLightbox(p)} style={{position:'relative',aspectRatio:'1',borderRadius:8,overflow:'hidden',cursor:'pointer',border:'1px solid #e5e7eb',background:'#f3f4f6'}}>
              <img src={p.img} alt={p.label} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'20px 8px 8px',background:'linear-gradient(transparent,rgba(0,0,0,.75))',color:'#fff',fontSize:10}}>
                <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.label}</div>
                <div style={{fontSize:9,opacity:.85}}>{H.fmtDate(p.date)}</div>
              </div>
            </div>
          )}
        </div>
    }

    {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16,flexDirection:'column'}}>
      <img src={lightbox.img} alt={lightbox.label} style={{maxWidth:'100%',maxHeight:'75vh',objectFit:'contain',borderRadius:8}}/>
      <div style={{marginTop:12,color:'#fff',textAlign:'center'}}>
        <strong style={{fontSize:14}}>{lightbox.label}</strong>
        <p style={{fontSize:12,opacity:.8,marginTop:2}}>{lightbox.extra} · {H.fmtDate(lightbox.date)}</p>
      </div>
      <button onClick={()=>setLightbox(null)} style={{position:'absolute',top:16,right:16,width:40,height:40,borderRadius:999,background:'rgba(255,255,255,.2)',border:'none',color:'#fff',fontSize:24,cursor:'pointer'}}>×</button>
    </div>}
  </div>;
}

/* ═══ MULTI-FAZENDA ═══ */
function Farms({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;

  const[rev,setRev]=useState(0);
  const farms=JSON.parse(localStorage.getItem('pm_farms')||'[]');
  const activeFarm=localStorage.getItem('pm_active_farm')||'default';
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);

  // Se nunca configurou, oferece "converter" a fazenda atual na primeira da lista
  useEffect(()=>{
    if(farms.length===0){
      const settings=DB.settings();
      const defaultFarm={id:'default',name:settings.farm_name||'Fazenda Principal',data_key:'pm_data_v1',created_at:new Date().toISOString()};
      localStorage.setItem('pm_farms',JSON.stringify([defaultFarm]));
      localStorage.setItem('pm_active_farm','default');
      setRev(r=>r+1);
    }
  },[]);

  function switchFarm(farmId){
    if(farmId===activeFarm)return;
    if(!confirm('Trocar para esta fazenda? A página será recarregada.'))return;
    localStorage.setItem('pm_active_farm',farmId);
    location.reload();
  }

  function saveFarm(data){
    const list=JSON.parse(localStorage.getItem('pm_farms')||'[]');
    if(editing){
      const i=list.findIndex(f=>f.id===editing.id);
      if(i>=0)list[i]={...list[i],...data};
    }else{
      const id='farm_'+Date.now();
      list.push({id,name:data.name,data_key:'pm_data_'+id,created_at:new Date().toISOString()});
    }
    localStorage.setItem('pm_farms',JSON.stringify(list));
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }

  function delFarm(f){
    if(f.id===activeFarm){alert('Não é possível excluir a fazenda atualmente em uso. Troque para outra primeiro.');return;}
    if(!confirm('Excluir fazenda "'+f.name+'"? Os dados desta fazenda serão APAGADOS permanentemente.'))return;
    if(!confirm('TEM CERTEZA? Esta ação é irreversível.'))return;
    localStorage.removeItem(f.data_key);
    const list=JSON.parse(localStorage.getItem('pm_farms')||'[]').filter(x=>x.id!==f.id);
    localStorage.setItem('pm_farms',JSON.stringify(list));
    setRev(r=>r+1);
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="🌐 Fazendas" sub="Gerencie múltiplas propriedades"
      action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Nova Fazenda</Btn>}/>
    <Alert type="info">Cada fazenda tem seu próprio banco de dados isolado. Você pode alternar entre elas a qualquer momento. ⚠️ <strong>IMPORTANTE</strong>: atualmente multi-fazenda tem limitação técnica — a troca requer recarregar a página. Para usar de verdade múltiplas fazendas com segurança, use <strong>backup/restauração</strong> como alternativa.</Alert>

    <Card>
      {farms.length===0?<EmptyState text="Nenhuma fazenda configurada"/>:
        farms.map(f=>{
          const isActive=f.id===activeFarm;
          return <ListItem key={f.id}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <strong style={{fontSize:13}}>🏠 {f.name}</strong>
                  {isActive&&<Badge color="green">Em uso</Badge>}
                </div>
                <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>Criada em {H.fmtDate(f.created_at?.split('T')[0])}</p>
              </div>
              <div style={{display:'flex',gap:6}}>
                {!isActive&&<Btn size="sm" variant="secondary" onClick={()=>switchFarm(f.id)}>Trocar</Btn>}
                <Btn size="sm" variant="secondary" onClick={()=>{setEditing(f);setShowForm(true);}}>Editar</Btn>
                {!isActive&&f.id!=='default'&&<button onClick={()=>delFarm(f)} style={{fontSize:11,color:'#dc2626',background:'none',border:'none',cursor:'pointer'}}>×</button>}
              </div>
            </div>
          </ListItem>;
        })
      }
    </Card>

    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar Fazenda':'Nova Fazenda'}>
      <FarmForm initial={editing} onSave={saveFarm} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
  </div>;
}

function FarmForm({initial,onSave,onCancel}){
  const[f,setF]=useState({name:'',...initial});
  return <>
    <Field label="Nome da Fazenda" required><Input value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="Fazenda Boa Vista"/></Field>
    <Alert type="warning">Ao criar uma nova fazenda, ela começará com dados-exemplo. Use <strong>Configurações → Restaurar Backup</strong> para trazer dados de outra fonte.</Alert>
    <FormActions onSave={()=>{if(!f.name)return alert('Nome obrigatório');onSave(f);}} onCancel={onCancel}/>
  </>;
}

/* ═══ SAÍDA DE ANIMAIS ═══ */
function Exits({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;

  const[items,setItems]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);
  const[query,setQuery]=useState('');
  const[filterReason,setFilterReason]=useState('all');

  useEffect(()=>{setItems([...DB.get('animal_exits')].sort((a,b)=>(b.date||'').localeCompare(a.date||'')));},[rev]);

  function save(data){
    const animal=DB.findAnimalByIdentifier(data.identifier);
    if(!animal){alert('Animal "'+data.identifier+'" não está no Inventário.');return;}
    if((animal.status||'ativo')!=='ativo'){alert('Animal "'+data.identifier+'" já saiu da propriedade ('+ (animal.exit_reason||'—')+').');return;}
    // Se o motivo é "morte", criar também o registro de mortalidade
    let deathId=null;
    if(data.reason==='morte'){
      const deathRec=DB.insert('deaths',{
        animal_id:animal.identifier,
        category:{'Vaca':'Vacas','Bezerro':'Bezerros','Touro':'Touros','Novilha':'Novilhas','Garrote':'Garrotes'}[animal.type]||'Outro',
        lot_id:animal.lot_id||'',pasture_id:'',
        death_date:data.date,
        cause:data.death_cause||'Desconhecida',
        fact:data.notes||'',
        notes:'Criado a partir de Saída de Animais',
        collaborator_id:user.id,photo:null,
      });
      deathId=deathRec.id;
    }
    // Criar o exit
    DB.insert('animal_exits',{
      animal_id:animal.id,
      identifier:animal.identifier,
      date:data.date,
      reason:data.reason,
      buyer:data.buyer||'',
      sale_value:data.sale_value||'',
      death_cause:data.death_cause||'',
      notes:data.notes||'',
      death_id:deathId,
      collaborator_id:user.id,
    });
    // Atualizar animal
    DB.update('animals',animal.id,{status:'saiu',exit_date:data.date,exit_reason:data.reason});
    setRev(r=>r+1);setShowForm(false);
  }

  function revert(ex){
    if(!confirm('Reverter esta saída?\n\nO animal '+ex.identifier+' voltará como ATIVO no Inventário.\nO registro de saída será excluído.'))return;
    const animal=DB.find('animals',ex.animal_id);
    if(animal)DB.update('animals',ex.animal_id,{status:'ativo',exit_date:null,exit_reason:null});
    // Se tinha death associado, também remover?
    if(ex.death_id&&confirm('Também remover o registro de Mortalidade vinculado?'))DB.delete('deaths',ex.death_id);
    DB.delete('animal_exits',ex.id);
    setRev(r=>r+1);setDetail(null);
  }

  const REASONS={morte:{icon:'✝',color:'red',label:'Morte'},venda:{icon:'💰',color:'green',label:'Venda'},consumo:{icon:'🍖',color:'amber',label:'Consumo próprio'},doacao:{icon:'🎁',color:'blue',label:'Doação'},outro:{icon:'📤',color:'gray',label:'Outro'}};

  const filtered=items.filter(x=>{
    if(filterReason!=='all'&&x.reason!==filterReason)return false;
    if(query){const q=query.toLowerCase();if(!(x.identifier||'').toLowerCase().includes(q)&&!(x.buyer||'').toLowerCase().includes(q))return false;}
    return true;
  });

  // Estatísticas
  const stats={total:items.length};
  Object.keys(REASONS).forEach(r=>{stats[r]=items.filter(x=>x.reason===r).length;});
  const totalSold=items.filter(x=>x.reason==='venda').reduce((s,x)=>s+(parseFloat(x.sale_value)||0),0);

  if(detail){
    const animal=DB.find('animals',detail.animal_id);
    const r=REASONS[detail.reason]||REASONS.outro;
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={'Saída '+detail.identifier} onBack={()=>setDetail(null)}
        action={<Btn variant="danger" size="sm" onClick={()=>revert(detail)}>↺ Reverter saída</Btn>}/>
      <Alert type="warning">Reverter a saída retorna o animal para ATIVO no Inventário.</Alert>
      <Card>
        <CardHeader title={r.label} icon={r.icon} action={<SyncBadge status={detail.sync_status}/>}/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="Animal" value={detail.identifier}/>
          <Info label="Motivo" value={<Badge color={r.color}>{r.label}</Badge>}/>
          <Info label="Data da saída" value={H.fmtDate(detail.date)}/>
          {animal&&<Info label="Tipo/Raça" value={animal.type+' · '+animal.race}/>}
          {detail.reason==='venda'&&<>
            <Info label="Comprador" value={detail.buyer||'—'}/>
            <Info label="Valor" value={H.fmtMoney(detail.sale_value)}/>
          </>}
          {detail.reason==='morte'&&<Info label="Causa" value={detail.death_cause||'—'}/>}
          {detail.notes&&<div style={{gridColumn:'1/-1'}}><Info label="Observações" value={detail.notes}/></div>}
        </div>
      </Card>
    </div>;
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="📤 Saída de Animais" sub={items.length+' saída'+(items.length!==1?'s':'')+' registrada'+(items.length!==1?'s':'')}
      action={<Btn onClick={()=>setShowForm(true)}>+ Nova Saída</Btn>}/>

    <Alert type="info">📋 Registre aqui saídas por <strong>venda, morte, consumo próprio ou doação</strong>. O animal é automaticamente marcado como "Saiu" no Inventário e desaparece dos filtros ativos. Se o motivo for <strong>morte</strong>, um registro de Mortalidade também é criado.</Alert>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <StatCard label="Total" value={stats.total} color="gray" icon="📤"/>
      <StatCard label="Vendas" value={stats.venda||0} sub={H.fmtMoney(totalSold)} color="green" icon="💰"/>
      <StatCard label="Mortes" value={stats.morte||0} color="red"/>
      <StatCard label="Consumo/Doação" value={(stats.consumo||0)+(stats.doacao||0)} color="amber"/>
    </div>

    <Card style={{marginBottom:12,padding:12}}>
      <Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Buscar por ID ou comprador..." style={{marginBottom:8}}/>
      <Select value={filterReason} onChange={e=>setFilterReason(e.target.value)}>
        <option value="all">Todos os motivos</option>
        {Object.entries(REASONS).map(([k,r])=><option key={k} value={k}>{r.icon} {r.label}</option>)}
      </Select>
    </Card>

    <Card>
      {filtered.length===0
        ? <EmptyState icon="📤" text={query||filterReason!=='all'?'Nenhuma saída com esse filtro':'Nenhuma saída registrada'}/>
        : filtered.map(x=>{
            const r=REASONS[x.reason]||REASONS.outro;
            return <ListItem key={x.id} onClick={()=>setDetail(x)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:38,height:38,borderRadius:8,background:'#f3f4f6',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{r.icon}</div>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      <strong style={{fontSize:13}}>{x.identifier}</strong>
                      <Badge color={r.color}>{r.label}</Badge>
                    </div>
                    <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>
                      {H.fmtDate(x.date)}
                      {x.reason==='venda'&&x.buyer?' · '+x.buyer:''}
                      {x.reason==='venda'&&x.sale_value?' · '+H.fmtMoney(x.sale_value):''}
                      {x.reason==='morte'&&x.death_cause?' · '+x.death_cause:''}
                    </p>
                  </div>
                </div>
                <span style={{fontSize:16,color:'#9ca3af'}}>›</span>
              </div>
            </ListItem>;
          })
      }
    </Card>

    <Modal open={showForm} onClose={()=>setShowForm(false)} title="Registrar Saída" size="lg">
      <ExitForm onSave={save} onCancel={()=>setShowForm(false)} REASONS={REASONS}/>
    </Modal>
  </div>;
}

function ExitForm({onSave,onCancel,REASONS}){
  const[f,setF]=useState({identifier:'',date:TODAY,reason:'venda',buyer:'',sale_value:'',death_cause:'Desconhecida',notes:''});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <>
    <Alert type="warning">⚠️ Essa saída é <strong>irreversível automaticamente</strong>, mas você pode revertê-la manualmente depois.</Alert>
    <AnimalPicker label="Animal que está saindo" required value={f.identifier} onChange={(id)=>s('identifier',id)} requireActive={true}
      hint="Apenas animais ATIVOS no Inventário aparecem aqui."/>
    <FormRow>
      <Field label="Data da saída" required><Input type="date" value={f.date} onChange={e=>s('date',e.target.value)}/></Field>
      <Field label="Motivo" required>
        <Select value={f.reason} onChange={e=>s('reason',e.target.value)}>
          {Object.entries(REASONS).map(([k,r])=><option key={k} value={k}>{r.icon} {r.label}</option>)}
        </Select>
      </Field>
    </FormRow>
    {f.reason==='venda'&&<FormRow>
      <Field label="Comprador"><Input value={f.buyer} onChange={e=>s('buyer',e.target.value)} placeholder="Nome / Empresa"/></Field>
      <Field label="Valor (R$)"><Input type="number" step="0.01" value={f.sale_value} onChange={e=>s('sale_value',e.target.value)}/></Field>
    </FormRow>}
    {f.reason==='morte'&&<Field label="Causa da morte"><Select value={f.death_cause} onChange={e=>s('death_cause',e.target.value)}>{H.DCAUSES.map(c=><option key={c}>{c}</option>)}</Select></Field>}
    <Field label="Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)} placeholder="Detalhes da saída..."/></Field>
    <FormActions onSave={()=>{if(!f.identifier)return alert('Selecione o animal');onSave(f);}} onCancel={onCancel} saveLabel="Registrar Saída"/>
  </>;
}

/* ─── Tela de seleção: Modo Local x Modo Online ─── */
/* ─── Hook reutilizável para queries Supabase ─── */
function useSupaQuery(table,opts={},deps=[]){
  const[data,setData]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[rev,setRev]=useState(0);
  const reload=useCallback(()=>setRev(r=>r+1),[]);
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{setLoading(true);setError(null);
        const result=await window.SupaDB.get(table,opts);
        if(!cancelled)setData(result);
      }catch(e){
        if(!cancelled){setError(e.message||String(e));setData([]);}
      }finally{if(!cancelled)setLoading(false);}
    })();
    return()=>{cancelled=true;};
  // eslint-disable-next-line
  },[table,rev,...deps]);
  return{data,loading,error,reload};
}

/* ─── Helpers async ─── */
async function asyncFindAnimal(identifier){
  if(!identifier)return null;
  try{return await window.SupaDB.findBy('animals','identifier',identifier);}
  catch{return null;}
}

/* ─── Picker de animal online (autocomplete buscando Supabase) ─── */
function OnlineAnimalPicker({value,onChange,sex,types,requireActive=true,label='Animal',required,hint,placeholder='Digite ou selecione o brinco...'}){
  const[q,setQ]=useState(value||'');
  const[focused,setFocused]=useState(false);
  const[options,setOptions]=useState([]);
  const[loadingOpts,setLoadingOpts]=useState(false);

  useEffect(()=>{setQ(value||'');},[value]);

  // Buscar opções no Supabase quando focado/digitando
  useEffect(()=>{
    if(!focused){return;}
    let cancelled=false;
    (async()=>{
      try{
        setLoadingOpts(true);
        if(!window.SUPA||!window.SUPA.client){setLoadingOpts(false);return;}
        let qb=window.SUPA.client.from('animals').select('*').limit(20);
        if(requireActive)qb=qb.eq('status','ativo');
        if(sex)qb=qb.eq('sex',sex);
        if(types&&types.length>0)qb=qb.in('type',types);
        if(q&&q.length>0)qb=qb.ilike('identifier','%'+q+'%');
        qb=qb.order('identifier',{ascending:true});
        const{data,error}=await qb;
        if(!cancelled&&!error)setOptions(data||[]);
      }catch{}
      finally{if(!cancelled)setLoadingOpts(false);}
    })();
    return()=>{cancelled=true;};
  },[q,focused,sex,types?.join(','),requireActive]);

  const[selected,setSelected]=useState(null);
  useEffect(()=>{
    if(!value){setSelected(null);return;}
    let cancelled=false;
    (async()=>{
      const a=await asyncFindAnimal(value);
      if(!cancelled)setSelected(a);
    })();
    return()=>{cancelled=true;};
  },[value]);

  function pick(a){setQ(a.identifier);setFocused(false);onChange&&onChange(a.identifier,a);}
  function handleChange(v){setQ(v);onChange&&onChange(v,null);}

  const exists=selected!==null;
  const missing=value&&value.length>0&&selected===null&&!loadingOpts;

  return <div style={{marginBottom:14,position:'relative'}}>
    <label style={{display:'block',fontSize:13,fontWeight:500,color:'#374151',marginBottom:4}}>{label}{required&&<span style={{color:'#ef4444',marginLeft:2}}>*</span>}</label>
    <div style={{position:'relative'}}>
      <input type="text" value={q} onChange={e=>handleChange(e.target.value)}
        onFocus={()=>setFocused(true)}
        onBlur={()=>setTimeout(()=>setFocused(false),180)}
        placeholder={placeholder}
        style={{...INP,paddingRight:value?60:12,borderColor:missing?'#fca5a5':exists?'#86efac':'#d1d5db',background:missing?'#fef2f2':'#fff'}}/>
      {value&&<button type="button" onClick={()=>{setQ('');onChange&&onChange('',null);}}
        style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'#f3f4f6',border:'none',borderRadius:6,padding:'3px 8px',fontSize:11,color:'#6b7280',cursor:'pointer'}}>✕ limpar</button>}
    </div>
    {hint&&<p style={{fontSize:11,color:'#6b7280',marginTop:3}}>{hint}</p>}
    {exists&&!focused&&<div style={{marginTop:6,padding:8,background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,fontSize:12}}>
      ✅ <strong>{selected.identifier}</strong> · {selected.type} · {selected.race} · {selected.sex}
    </div>}

    </div>}

      {loadingOpts?<div style={{padding:12,fontSize:12,color:'#6b7280'}}>Buscando...</div>:
        options.length===0?<div style={{padding:12,fontSize:12,color:'#6b7280'}}>{q?'Nenhum animal bate':'Comece digitando o brinco'}</div>:
        options.map(a=>
          <div key={a.id} onMouseDown={()=>pick(a)}
            style={{padding:'8px 12px',borderBottom:'1px solid #f3f4f6',cursor:'pointer',fontSize:12}}>

              <Badge color="gray">{a.race}</Badge>

        )
      }
    </div>}
  </div>;
}

function OnlineLogin({onLogin,onBackToMode}){

  async function submit(e){
    e.preventDefault();
    if(!email||!pw){setErr('Preencha e-mail e senha');return;}
    setErr('');setLoading(true);
    try{
      await window.SupaDB.signIn(email,pw);
      const profile=window.SUPA.currentProfile;
      if(!profile){throw new Error('Perfil não encontrado. Contate o admin.');}
      if(profile.active===false){throw new Error('Sua conta está inativa.');}

  }

  return <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0c4a6e,#1e40af,#1d4ed8)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>

        <h2 style={{fontSize:16,fontWeight:600,marginBottom:20}}>Entrar</h2>

        <form onSubmit={submit}>
          <Field label="E-mail"><Input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seuemail@exemplo.com" autoComplete="email"/></Field>
          <Field label="Senha"><Input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" autoComplete="current-password"/></Field>
