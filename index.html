function Settings({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;
  const[s,setS]=useState(DB.settings());
  const[saved,setSaved]=useState(false);
  const fileRef=useRef();
  function save(){DB.updateSettings(s);setSaved(true);setTimeout(()=>setSaved(false),2000);}
  function resetAll(){
    if(!confirm('⚠️ ATENÇÃO: Isso apaga TODOS os dados. Continuar?'))return;
    if(!confirm('Tem CERTEZA? Esta ação não pode ser desfeita.\n\nDICA: antes de continuar, faça um BACKUP clicando em "Baixar backup completo"'))return;
    DB.resetAll();
    localStorage.removeItem('pm_user');
    location.reload();
  }
  function doBackup(){
    try{
      const raw=localStorage.getItem('pm_data_v1');
      const data=raw?JSON.parse(raw):DB.get('users'); // fallback
      const backup={
        _pm_backup:true,
        _version:'1.0',
        _exported_at:new Date().toISOString(),
        _farm:s.farm_name||'Fazenda',
        data:JSON.parse(raw||'{}'),
      };
      const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const fname='pecuaria-backup-'+(s.farm_name||'fazenda').replace(/[^a-z0-9]/gi,'_').toLowerCase()+'-'+new Date().toISOString().split('T')[0]+'.json';
      a.href=url;a.download=fname;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),1500);
    }catch(e){alert('Erro ao gerar backup: '+e.message);}
  }
  function handleRestore(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed._pm_backup||!parsed.data){
          alert('Arquivo inválido. Selecione um backup do PecuáriaManager.');
          return;
        }
        const d=parsed.data;
        if(!Array.isArray(d.users)||!Array.isArray(d.lots)){
          alert('Arquivo de backup corrompido ou incompleto.');
          return;
        }
        const msg='Restaurar backup de '+(parsed._farm||'?')+' ('+(parsed._exported_at||'').split('T')[0]+')?\n\n⚠️ TODOS os dados atuais serão SUBSTITUÍDOS pelos dados do backup.\n\nDica: faça um backup ANTES de restaurar outro, para segurança.';
        if(!confirm(msg))return;
        localStorage.setItem('pm_data_v1',JSON.stringify(d));
        alert('✅ Backup restaurado com sucesso!\nA página vai recarregar.');
        setTimeout(()=>location.reload(),500);
      }catch(err){
        alert('Erro ao ler arquivo: '+err.message);
      }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  // Estatísticas
  const totalAnimais=DB.get('animals').length;
  const totalNasc=DB.get('births').length;
  const totalPesagens=DB.get('weighings').length;
  const totalLotes=DB.get('lots').length;
  const totalPastos=DB.get('pastures').length;
  const totalLanc=DB.get('revenues').length+DB.get('costs').length;

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="⚙️ Configurações"/>
    <Card style={{marginBottom:16}}>
      <CardHeader title="Fazenda"/>
      <div style={{padding:16}}>
        <Field label="Nome da Fazenda"><Input value={s.farm_name||''} onChange={e=>setS({...s,farm_name:e.target.value})}/></Field>
        <Field label="Dias de alerta antes do parto" hint="Vacas com parto nesse prazo aparecem destacadas"><Input type="number" value={s.birth_alert_days||'30'} onChange={e=>setS({...s,birth_alert_days:e.target.value})} min={1} max={90}/></Field>
        {saved&&<Alert type="success">Configurações salvas!</Alert>}
        <Btn onClick={save} fullWidth>Salvar</Btn>
      </div>
    </Card>

    <Card style={{marginBottom:16}}>
      <CardHeader title="Backup e Restauração" icon="💾"/>
      <div style={{padding:16}}>
        <Alert type="info">Faça backup regularmente! O arquivo JSON gerado contém TODOS os dados e pode ser restaurado em outro computador ou navegador.</Alert>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <Btn variant="secondary" onClick={doBackup} fullWidth>↓ Baixar backup completo</Btn>
          <Btn variant="secondary" onClick={()=>fileRef.current.click()} fullWidth>↑ Restaurar backup</Btn>
        </div>
        <input ref={fileRef} type="file" accept=".json,application/json" style={{display:'none'}} onChange={handleRestore}/>
        <p style={{fontSize:11,color:'#6b7280',textAlign:'center'}}>O arquivo de backup contém seus dados em formato JSON. Guarde em lugar seguro.</p>
      </div>
    </Card>

    <DriveSyncCard farmName={s.farm_name||'Fazenda'}/>

    <Card style={{marginBottom:16}}>
      <CardHeader title="Informações do Sistema"/>
      <div style={{padding:16}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <StatCard label="Animais" value={totalAnimais} color="green"/>
          <StatCard label="Nascimentos" value={totalNasc} color="blue"/>
          <StatCard label="Pesagens" value={totalPesagens} color="amber"/>
          <StatCard label="Lotes" value={totalLotes} color="gray"/>
          <StatCard label="Pastos" value={totalPastos} color="green"/>
          <StatCard label="Lançamentos financeiros" value={totalLanc} color="blue"/>
        </div>
        <p style={{fontSize:11,color:'#6b7280',textAlign:'center',marginTop:8}}>PecuáriaManager · Versão 3.1 HTML</p>
      </div>
    </Card>

    <Card>
      <CardHeader title="Zona de Perigo"/>
      <div style={{padding:16}}>
        <Alert type="error">⚠️ Esta ação apaga TODOS os dados e é irreversível. FAÇA BACKUP antes!</Alert>
        <Btn variant="danger" fullWidth onClick={resetAll}>🗑 Resetar dados locais</Btn>
      </div>
    </Card>
  </div>;
}

/* ═══ PESAGENS ═══ */
function Weighings({user}){
  const[view,setView]=useState('lots');
  const[selLot,setSelLot]=useState(null);
  const[selAnimal,setSelAnimal]=useState(null);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[rev,setRev]=useState(0);
  const lots=DB.get('lots');
  const users=DB.get('users');
  const weighings=useMemo(()=>DB.get('weighings').sort((a,b)=>b.date.localeCompare(a.date)),[rev]);

  function save(data){
    if(editing)DB.update('weighings',editing.id,data);
    else DB.insert('weighings',{...data,collaborator_id:data.collaborator_id||user.id});
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }
  function del(id){if(!confirm('Excluir?'))return;DB.delete('weighings',id);setRev(r=>r+1);}

  const byLot=useMemo(()=>{const m={};weighings.forEach(w=>{const k=w.lot_id||'sem_lote';if(!m[k])m[k]=[];m[k].push(w);});return m;},[weighings]);

  // Visão animal individual com gráfico
  if(view==='animal'&&selAnimal){
    const hist=weighings.filter(w=>w.animal_id===selAnimal).sort((a,b)=>a.date.localeCompare(b.date));
    const first=hist[0];
    const last=hist[hist.length-1];
    const days=first&&last&&first!==last?H.daysBetween(first.date,last.date):0;
    const gain=first&&last?parseFloat(last.weight)-parseFloat(first.weight):0;
    const gmd=days>0?(gain/days).toFixed(2):'—';
    const maxW=Math.max(...hist.map(w=>parseFloat(w.weight)||0),1);
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={'Animal '+selAnimal} sub={hist.length+' pesagem'+(hist.length!==1?'s':'')} onBack={()=>{setSelAnimal(null);setView('lot');}}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <StatCard label="Peso atual" value={last?last.weight+' kg':'—'} color="green"/>
        <StatCard label="Ganho total" value={gain.toFixed(1)+' kg'} color="blue"/>
        <StatCard label="Período" value={days+' dias'} color="gray"/>
        <StatCard label="GMD" value={gmd+' kg/dia'} sub="Ganho médio" color="amber"/>
      </div>
      <Card style={{marginBottom:16}}>
        <CardHeader title="Evolução do Peso" icon="📈"/>
        <div style={{padding:16,height:160}}>
          <svg width="100%" height="120" style={{display:'block'}}>
            {hist.length>1&&<polyline fill="none" stroke="#166534" strokeWidth="2"
              points={hist.map((w,i)=>{const x=(i/(hist.length-1))*100;const y=100-((parseFloat(w.weight)/maxW)*85);return `${x}%,${y}`;}).join(' ')}/>}
            {hist.map((w,i)=>{const x=hist.length>1?(i/(hist.length-1))*100:50;const y=100-((parseFloat(w.weight)/maxW)*85);return <circle key={w.id} cx={`${x}%`} cy={y} r="4" fill="#166534"/>;})}
          </svg>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#6b7280',marginTop:4}}>
            {hist.length>0&&<span>{H.fmtDate(first.date)}</span>}
            {hist.length>1&&<span>{H.fmtDate(last.date)}</span>}
          </div>
        </div>
      </Card>
      <Card>
        <CardHeader title="Histórico" icon="⚖️" action={<Btn size="sm" onClick={()=>{setEditing({animal_id:selAnimal,lot_id:hist[0]?.lot_id||''});setShowForm(true);}}>+ Pesar</Btn>}/>
        {hist.map((w,i)=>{
          const prev=i>0?hist[i-1]:null;
          const dGain=prev?parseFloat(w.weight)-parseFloat(prev.weight):0;
          const dDays=prev?H.daysBetween(prev.date,w.date):0;
          return <ListItem key={w.id}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <strong style={{fontSize:13}}>{w.weight} kg</strong> <Badge color="gray">{w.category}</Badge>
                <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>{H.fmtDate(w.date)}</p>
                {prev&&dGain!==0&&<p style={{fontSize:11,color:dGain>0?'#166534':'#dc2626'}}>{dGain>0?'+':''}{dGain.toFixed(1)} kg em {dDays}d{dDays>0?' · GMD '+(dGain/dDays).toFixed(2):''}</p>}
              </div>
              {user.role==='admin'&&<button onClick={()=>del(w.id)} style={{fontSize:11,color:'#dc2626',background:'none',border:'none',cursor:'pointer'}}>excluir</button>}
            </div>
          </ListItem>;
        })}
      </Card>
      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title="Pesagem"><WeighingForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}} lots={lots} users={users} user={user}/></Modal>
    </div>;
  }

  // Visão lote
  if(view==='lot'&&selLot){
    const lot=lots.find(l=>l.id===selLot);
    const lotWs=byLot[selLot]||[];
    const animalsInLot=[...new Set(lotWs.map(w=>w.animal_id).filter(Boolean))];
    const avgW=lotWs.length?(lotWs.reduce((s,w)=>s+(parseFloat(w.weight)||0),0)/lotWs.length).toFixed(1):'—';
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={lot?.name||'Lote'} sub={lotWs.length+' pesagens · '+animalsInLot.length+' animais'} onBack={()=>{setSelLot(null);setView('lots');}}
        action={<Btn size="sm" onClick={()=>{setEditing({lot_id:selLot});setShowForm(true);}}>+ Pesar</Btn>}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <StatCard label="Média do lote" value={avgW+' kg'} color="green"/>
        <StatCard label="Animais pesados" value={animalsInLot.length} color="blue"/>
      </div>
      <Card>
        <CardHeader title="Animais do Lote" icon="🐂" action={<Badge color="gray">{animalsInLot.length}</Badge>}/>
        {animalsInLot.length===0?<EmptyState text="Sem pesagens neste lote"/>:
          animalsInLot.map(aid=>{
            const ws=lotWs.filter(w=>w.animal_id===aid).sort((a,b)=>b.date.localeCompare(a.date));
            const last=ws[0];
            return <ListItem key={aid} onClick={()=>{setSelAnimal(aid);setView('animal');}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <strong style={{fontSize:13}}>{aid}</strong>
                  <p style={{fontSize:11,color:'#6b7280'}}>{ws.length} pesagem{ws.length!==1?'s':''} · última: {H.fmtDate(last.date)}</p>
                </div>
                <div style={{textAlign:'right'}}>
                  <p style={{fontSize:14,fontWeight:700,color:'#166534'}}>{last.weight} kg</p>
                  <span style={{fontSize:10,color:'#6b7280'}}>ver →</span>
                </div>
              </div>
            </ListItem>;
          })
        }
      </Card>
      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?.id?'Editar Pesagem':'Nova Pesagem'}><WeighingForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}} lots={lots} users={users} user={user}/></Modal>
    </div>;
  }

  // Lista de lotes
  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="⚖️ Pesagens" sub={weighings.length+' pesagens · '+lots.length+' lotes'} action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Nova</Btn>}/>
    <Card>
      <CardHeader title="Pesagens por Lote" icon="🐂"/>
      {lots.length===0?<EmptyState text="Sem lotes"/>:lots.map(l=>{
        const ws=byLot[l.id]||[];
        const animals=new Set(ws.map(w=>w.animal_id).filter(Boolean)).size;
        return <ListItem key={l.id} onClick={()=>{setSelLot(l.id);setView('lot');}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <strong style={{fontSize:13}}>{l.name}</strong>
              <p style={{fontSize:11,color:'#6b7280'}}><Badge color="blue">{l.category}</Badge> · {ws.length} pesagens · {animals} animais pesados</p>
            </div>
            <span style={{fontSize:18,color:'#9ca3af'}}>›</span>
          </div>
        </ListItem>;
      })}
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar':'Nova Pesagem'}><WeighingForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}} lots={lots} users={users} user={user}/></Modal>
  </div>;
}

function WeighingForm({initial,onSave,onCancel,lots,users,user}){
  const[f,setF]=useState({target_type:'animal',animal_id:'',lot_id:lots[0]?.id||'',date:TODAY,weight:'',category:'Bezerros',notes:'',collaborator_id:user.id,...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  function pickAnimal(identifier,animal){
    const upd={animal_id:identifier};
    if(animal){
      if(animal.lot_id)upd.lot_id=animal.lot_id;
      const cat={'Vaca':'Vacas','Bezerro':'Bezerros','Touro':'Touros','Novilha':'Novilhas','Garrote':'Garrotes'}[animal.type];
      if(cat)upd.category=cat;
    }
    setF(p=>({...p,...upd}));
  }
  return <>
    <Field label="Alvo"><Select value={f.target_type} onChange={e=>s('target_type',e.target.value)}><option value="animal">Animal individual</option><option value="lote">Lote (média)</option></Select></Field>
    {f.target_type==='animal'
      ? <AnimalPicker label="Animal (do Inventário)" required value={f.animal_id} onChange={pickAnimal} hint="Lote/categoria preenchidos automaticamente."/>
      : <Field label="Lote"><Select value={f.lot_id} onChange={e=>s('lot_id',e.target.value)}><option value="">—</option>{lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Select></Field>}
    {f.target_type==='animal'&&<Field label="Lote"><Select value={f.lot_id} onChange={e=>s('lot_id',e.target.value)}><option value="">—</option>{lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Select></Field>}
    <FormRow>
      <Field label="Data"><Input type="date" value={f.date} onChange={e=>s('date',e.target.value)}/></Field>
      <Field label="Peso (kg)" required><Input type="number" step="0.1" value={f.weight} onChange={e=>s('weight',e.target.value)}/></Field>
    </FormRow>
    <Field label="Categoria"><Select value={f.category} onChange={e=>s('category',e.target.value)}>{H.CATS.map(c=><option key={c}>{c}</option>)}</Select></Field>
    <Field label="Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)}/></Field>
    <Field label="Colaborador"><Select value={f.collaborator_id} onChange={e=>s('collaborator_id',e.target.value)}>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</Select></Field>
    <FormActions onSave={()=>{
      if(!f.weight)return alert('Peso obrigatório');
      if(f.target_type==='animal'){
        if(!f.animal_id)return alert('Selecione o animal no Inventário');
        const a=DB.findAnimalByIdentifier(f.animal_id);
        if(!a)return alert('Animal "'+f.animal_id+'" não está no Inventário.');
        if((a.status||'ativo')!=='ativo')return alert('Animal "'+f.animal_id+'" já saiu da propriedade. Não é possível pesá-lo.');
      }
      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}

/* ═══ MANEJOS SANITÁRIOS ═══ */
function Health({user}){
  const[items,setItems]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);
  const lots=DB.get('lots');
  const users=DB.get('users');
  useEffect(()=>{setItems([...DB.get('health_managements')].sort((a,b)=>(b.date||'').localeCompare(a.date||'')));},[rev]);
  function save(data){if(editing)DB.update('health_managements',editing.id,data);else DB.insert('health_managements',{...data,collaborator_id:data.collaborator_id||user.id});setRev(r=>r+1);setShowForm(false);setEditing(null);}
  function del(id){if(!confirm('Excluir?'))return;DB.delete('health_managements',id);setRev(r=>r+1);setDetail(null);}

  if(detail){
    const lot=lots.find(l=>l.id===detail.lot_id);
    const col=users.find(u=>u.id===detail.collaborator_id);
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title="Detalhe do Manejo" onBack={()=>setDetail(null)}
        action={user.role==='admin'&&<div style={{display:'flex',gap:8}}><Btn size="sm" variant="secondary" onClick={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}>Editar</Btn><Btn size="sm" variant="danger" onClick={()=>del(detail.id)}>Excluir</Btn></div>}/>
      <Card>
        <CardHeader title={detail.type} icon="💉" action={<SyncBadge status={detail.sync_status}/>}/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="Produto" value={<Badge color="blue">{detail.product}</Badge>}/>
          <Info label="Dose" value={detail.dose||'—'}/>
          <Info label="Data" value={H.fmtDate(detail.date)}/>
          <Info label="Safra" value={H.getSeason(detail.date)}/>
          <Info label="Alvo" value={detail.target_type==='lote'?(lot?.name||'—'):(detail.animal_id||'—')}/>
          <Info label="Colaborador" value={col?.name||'—'}/>
          {detail.notes&&<div style={{gridColumn:'1/-1'}}><Info label="O que foi feito / Observações" value={detail.notes}/></div>}
        </div>
      </Card>
    </div>;
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="💉 Manejos Sanitários" sub={items.length+' registros'} action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}/>
    <Card>
      {items.length===0?<EmptyState icon="💉" text="Sem manejos registrados"/>:items.map(m=>{

    DB.delete('animals',id);
    const hs=DB.where('animal_lot_history',h=>h.animal_id===id);
    hs.forEach(h=>DB.delete('animal_lot_history',h.id));
    setRev(r=>r+1);setDetail(null);
  }
  function doTransfer(data){
    DB.transferAnimal(selAnimal.id,data.to_lot_id,data.date,data.notes,user.id);
    setRev(r=>r+1);setShowTransfer(false);setSelAnimal(null);
  }

  const filtered=useMemo(()=>{
    return animals.filter(a=>{
      if(filterStatus==='ativo'&&(a.status||'ativo')!=='ativo')return false;
      if(filterStatus==='saiu'&&(a.status||'ativo')!=='saiu')return false;
      if(filterLot&&a.lot_id!==filterLot)return false;
      if(filterType&&a.type!==filterType)return false;
      if(query){const q=query.toLowerCase();if(!(a.identifier||'').toLowerCase().includes(q)&&!(a.farm_tag||'').toLowerCase().includes(q)&&!(a.official_tag||'').toLowerCase().includes(q))return false;}
      return true;
    }).sort((a,b)=>(a.identifier||'').localeCompare(b.identifier||''));
  },[animals,query,filterLot,filterType,filterStatus]);

  const byLot=useMemo(()=>{const m={};animals.forEach(a=>{const k=a.lot_id||'sem_lote';if(!m[k])m[k]=[];m[k].push(a);});return m;},[animals]);

  const stats={
    total:animals.length,
    ativos:animals.filter(a=>(a.status||'ativo')==='ativo').length,
    saidos:animals.filter(a=>a.status==='saiu').length,
    femea:animals.filter(a=>a.sex==='Fêmea'&&(a.status||'ativo')==='ativo').length,
    macho:animals.filter(a=>a.sex==='Macho'&&(a.status||'ativo')==='ativo').length,
    semLote:animals.filter(a=>!a.lot_id&&(a.status||'ativo')==='ativo').length
  };

  // ── TELA DE DETALHE DO ANIMAL ──
  if(detail){
    const lot=lots.find(l=>l.id===detail.lot_id);
    const ws=weighings.filter(w=>w.animal_id===detail.identifier).sort((a,b)=>a.date.localeCompare(b.date));
    const lastW=ws[ws.length-1];
    const preg=pregnancies.filter(p=>p.cow_id===detail.identifier);
    const animalBirths=births.filter(b=>b.calf_id===detail.identifier||b.mother_id===detail.identifier);
    const lotHist=history.filter(h=>h.animal_id===detail.id).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const idade=detail.birth_date?Math.floor(H.daysBetween(detail.birth_date,TODAY)/30):null;
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={detail.identifier} sub={(detail.type||'')+' · '+(detail.race||'')} onBack={()=>setDetail(null)}
        action={<div style={{display:'flex',gap:8}}>
          <Btn size="sm" variant="secondary" onClick={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}>Editar</Btn>
          <Btn size="sm" variant="danger" onClick={()=>delAnimal(detail.id)}>Excluir</Btn>
        </div>}/>
      {detail.status==='saiu'&&<Alert type="warning">📤 <strong>Animal saiu da propriedade</strong> em {H.fmtDate(detail.exit_date)} · Motivo: <strong>{{morte:'Morte',venda:'Venda',consumo:'Consumo próprio',doacao:'Doação',outro:'Outro'}[detail.exit_reason]||'—'}</strong></Alert>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        <StatCard label="Status" value={detail.status==='saiu'?'📤 Saiu':'🟢 Ativo'} color={detail.status==='saiu'?'gray':'green'}/>
        <StatCard label="Sexo" value={detail.sex} color={detail.sex==='Fêmea'?'red':'blue'}/>
        <StatCard label="Idade" value={idade!==null?idade+' meses':'—'} color="gray"/>
        <StatCard label="Peso Atual" value={lastW?lastW.weight+' kg':'—'} sub={lastW?H.fmtDate(lastW.date):''} color="amber"/>
      </div>
      {detail.status!=='saiu'&&<Btn onClick={()=>{setSelAnimal(detail);setShowTransfer(true);}} fullWidth style={{marginBottom:16}}>↔ Transferir para outro lote</Btn>}

      <Card style={{marginBottom:12}}>
        <CardHeader title="Dados do Animal" icon="🐂" action={<SyncBadge status={detail.sync_status}/>}/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="Identificador" value={detail.identifier}/>
          <Info label="Tipo" value={detail.type}/>
          <Info label="Raça" value={detail.race}/>
          <Info label="Sexo" value={detail.sex}/>
          <Info label="Data de Nascimento" value={H.fmtDate(detail.birth_date)}/>
          <Info label="Idade" value={idade!==null?idade+' meses':'—'}/>
          <Info label="Brinco Fazenda" value={detail.farm_tag||'—'}/>
          <Info label="Brinco CIDASC" value={detail.official_tag||'—'}/>
          <Info label="Lote" value={lot?.name||'Sem lote'}/>
          {detail.notes&&<div style={{gridColumn:'1/-1'}}><Info label="Observações" value={detail.notes}/></div>}
        </div>
      </Card>

      {lotHist.length>0&&<Card style={{marginBottom:12}}>
        <CardHeader title="Histórico de Lotes" icon="🔄" action={<Badge color="blue">{lotHist.length}</Badge>}/>
        {lotHist.map(h=>{
          const from=lots.find(l=>l.id===h.from_lot_id);
          const to=lots.find(l=>l.id===h.to_lot_id);
          return <ListItem key={h.id}>
            <p style={{fontSize:13}}>{from?.name||'Entrada inicial'} → <strong>{to?.name||'—'}</strong></p>
            <p style={{fontSize:11,color:'#6b7280'}}>{H.fmtDate(h.date)}{h.notes?' · '+h.notes:''}</p>
          </ListItem>;
        })}
      </Card>}

      {ws.length>0&&<Card style={{marginBottom:12}}>
        <CardHeader title="Pesagens" icon="⚖️" action={<Badge color="amber">{ws.length}</Badge>}/>
        {ws.map(w=><ListItem key={w.id}>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:13}}>{H.fmtDate(w.date)}</span>
            <strong style={{color:'#166534'}}>{w.weight} kg</strong>
          </div>
        </ListItem>)}
      </Card>}

      {preg.length>0&&<Card style={{marginBottom:12}}>
        <CardHeader title="Gestações" icon="🤰" action={<Badge color="purple">{preg.length}</Badge>}/>
        {preg.map(p=><ListItem key={p.id}>
          <p style={{fontSize:13}}><Badge color={p.result==='Positivo'?'green':'red'}>{p.result}</Badge> em {H.fmtDate(p.diagnosis_date)}</p>
          {p.expected_birth_date&&<p style={{fontSize:11,color:'#6b7280'}}>Parto previsto: {H.fmtDate(p.expected_birth_date)}</p>}
        </ListItem>)}
      </Card>}

      {animalBirths.length>0&&<Card>
        <CardHeader title="Nascimentos relacionados" icon="🐮" action={<Badge color="green">{animalBirths.length}</Badge>}/>
        {animalBirths.map(b=><ListItem key={b.id}>
          <p style={{fontSize:13}}>{b.calf_id===detail.identifier?'Este bezerro':'Filho: '+b.calf_id}</p>
          <p style={{fontSize:11,color:'#6b7280'}}>{H.fmtDate(b.birth_date)} · {b.calf_sex} · {b.birth_weight}kg</p>
        </ListItem>)}
      </Card>}

      <Modal open={showTransfer} onClose={()=>{setShowTransfer(false);setSelAnimal(null);}} title={'Transferir '+(selAnimal?.identifier||'')}>
        <TransferForm animal={selAnimal} onSave={doTransfer} onCancel={()=>{setShowTransfer(false);setSelAnimal(null);}} lots={lots}/>
      </Modal>
    </div>;
  }

  // ── TELA PRINCIPAL DO INVENTÁRIO ──
  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="📋 Inventário" sub={stats.ativos+' ativos · '+stats.saidos+' saídos · '+stats.total+' total'}
      action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Animal</Btn>}/>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
      <StatCard label="Ativos na propriedade" value={stats.ativos} color="green" icon="🐂"/>
      <StatCard label="Saíram" value={stats.saidos} color="gray" icon="📤"/>
      <StatCard label="Fêmeas ativas" value={stats.femea} color="red"/>
      <StatCard label="Machos ativos" value={stats.macho} color="blue"/>
    </div>

    {/* Abas */}
    <div style={{display:'flex',gap:4,marginBottom:14,background:'#f3f4f6',padding:4,borderRadius:10}}>
      {[['animals','🐂 Animais'],['lots','🐄 Por Lote'],['history','🔄 Histórico']].map(([id,lbl])=>
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:8,background:tab===id?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:tab===id?600:400,color:tab===id?'#166534':'#6b7280'}}>{lbl}</button>
      )}
    </div>

    {tab==='animals'&&<>
      {/* Filtros */}
      <Card style={{marginBottom:12,padding:12}}>
        <Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Buscar por ID, brinco..." style={{marginBottom:8}}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          <Select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="ativo">🟢 Ativos ({stats.ativos})</option>
            <option value="saiu">📤 Saíram ({stats.saidos})</option>
            <option value="all">Todos ({stats.total})</option>
          </Select>
          <Select value={filterLot} onChange={e=>setFilterLot(e.target.value)}>
            <option value="">Todos os lotes</option>
            {lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
          </Select>
          <Select value={filterType} onChange={e=>setFilterType(e.target.value)}>
            <option value="">Todos os tipos</option>
            {['Vaca','Bezerro','Touro','Novilha','Garrote'].map(t=><option key={t}>{t}</option>)}
          </Select>
        </div>
      </Card>

      <Card>
        {filtered.length===0?<EmptyState icon="🐂" text={query||filterLot||filterType?'Nenhum animal encontrado com os filtros':'Nenhum animal cadastrado'} action={!query&&!filterLot&&!filterType&&<Btn onClick={()=>setShowForm(true)}>Cadastrar primeiro animal</Btn>}/>:
          filtered.map(a=>{
            const lot=lots.find(l=>l.id===a.lot_id);
            const saiu=a.status==='saiu';
            const exitReasonLabel={morte:'Morte',venda:'Venda',consumo:'Consumo',doacao:'Doação',outro:'Saída'}[a.exit_reason]||'Saiu';
            return <ListItem key={a.id} onClick={()=>setDetail(a)} style={saiu?{opacity:.7,background:'#f9fafb'}:{}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <strong style={{fontSize:13,textDecoration:saiu?'line-through':'none'}}>{a.identifier}</strong>
                    {saiu&&<Badge color="red">📤 {exitReasonLabel}</Badge>}
                    {!saiu&&<Badge color={a.sex==='Macho'?'blue':'red'}>{a.sex}</Badge>}
                    {!saiu&&<Badge color="gray">{a.type}</Badge>}
                  </div>
                  <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>
                    {saiu?<span>Saiu em {H.fmtDate(a.exit_date)}</span>:<>
                      {a.race} · {lot?.name||<span style={{color:'#dc2626'}}>Sem lote</span>}
                      {a.farm_tag&&' · '+a.farm_tag}
                    </>}
                  </p>
                </div>
                {!saiu&&<Btn size="sm" variant="secondary" onClick={e=>{e.stopPropagation();setSelAnimal(a);setShowTransfer(true);}}>↔</Btn>}
              </div>
            </ListItem>;
          })
        }
      </Card>
    </>}

    {tab==='lots'&&<>
      {lots.length===0?<EmptyState text="Sem lotes cadastrados"/>:
        lots.map(l=>{
          const inLot=byLot[l.id]||[];
          return <Card key={l.id} style={{marginBottom:12}}>
            <CardHeader title={l.name} icon="🐂" action={<Badge color="blue">{inLot.length} animais</Badge>}/>
            {inLot.length===0?<EmptyState text="Nenhum animal individual neste lote"/>:
              inLot.map(a=><ListItem key={a.id} onClick={()=>setDetail(a)}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <strong style={{fontSize:13}}>{a.identifier}</strong> <Badge color={a.sex==='Macho'?'blue':'red'}>{a.sex}</Badge>
                    <p style={{fontSize:11,color:'#6b7280'}}>{a.type} · {a.race}</p>
                  </div>
                  <Btn size="sm" variant="secondary" onClick={e=>{e.stopPropagation();setSelAnimal(a);setShowTransfer(true);}}>Transferir</Btn>
                </div>
              </ListItem>)
            }
          </Card>;
        })
      }
    </>}

    {tab==='history'&&<Card>
      <CardHeader title="Histórico de Transferências" icon="🔄" action={<Badge color="gray">{history.length}</Badge>}/>
      {history.length===0?<EmptyState text="Sem transferências"/>:
        history.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50).map(h=>{
          const animal=animals.find(a=>a.id===h.animal_id);
          const from=lots.find(l=>l.id===h.from_lot_id);
          const to=lots.find(l=>l.id===h.to_lot_id);
          return <ListItem key={h.id} onClick={animal?()=>setDetail(animal):undefined}>
            <p style={{fontSize:13}}><strong>{animal?.identifier||h.animal_id}</strong>: {from?.name||'Entrada'} → <strong>{to?.name||'—'}</strong></p>
            <p style={{fontSize:11,color:'#6b7280'}}>{H.fmtDate(h.date)}{h.notes?' · '+h.notes:''}</p>
          </ListItem>;
        })
      }
    </Card>}

    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar Animal':'Cadastrar Animal'} size="lg">
      <AnimalForm initial={editing} onSave={saveAnimal} onCancel={()=>{setShowForm(false);setEditing(null);}} lots={lots}/>
    </Modal>
    <Modal open={showTransfer} onClose={()=>{setShowTransfer(false);setSelAnimal(null);}} title={'Transferir '+(selAnimal?.identifier||'')}>
      <TransferForm animal={selAnimal} onSave={doTransfer} onCancel={()=>{setShowTransfer(false);setSelAnimal(null);}} lots={lots}/>
    </Modal>
  </div>;
}

function AnimalForm({initial,onSave,onCancel,lots}){
  const[f,setF]=useState({identifier:'',type:'Vaca',race:'Nelore',sex:'Fêmea',birth_date:'',lot_id:lots[0]?.id||'',farm_tag:'',official_tag:'',notes:'',...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <>
    <FormRow>
      <Field label="Identificador" required hint="Ex: VAC-001, BEZ-010"><Input value={f.identifier} onChange={e=>s('identifier',e.target.value)} placeholder="VAC-001"/></Field>
      <Field label="Tipo"><Select value={f.type} onChange={e=>s('type',e.target.value)}><option>Vaca</option><option>Bezerro</option><option>Touro</option><option>Novilha</option><option>Garrote</option><option>Outro</option></Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Sexo"><Select value={f.sex} onChange={e=>s('sex',e.target.value)}><option>Fêmea</option><option>Macho</option></Select></Field>
      <Field label="Raça"><Select value={f.race} onChange={e=>s('race',e.target.value)}>{H.RACES.map(r=><option key={r}>{r}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Data de Nascimento"><Input type="date" value={f.birth_date} onChange={e=>s('birth_date',e.target.value)}/></Field>
      <Field label="Lote Atual"><Select value={f.lot_id} onChange={e=>s('lot_id',e.target.value)}><option value="">— Sem lote —</option>{lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Brinco Fazenda"><Input value={f.farm_tag} onChange={e=>s('farm_tag',e.target.value)}/></Field>
      <Field label="Brinco CIDASC/SIF"><Input value={f.official_tag} onChange={e=>s('official_tag',e.target.value)}/></Field>
    </FormRow>
    <Field label="Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)}/></Field>
    <FormActions onSave={()=>{
      if(!f.identifier)return alert('Identificador é obrigatório');
      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}

function TransferForm({animal,onSave,onCancel,lots}){
  const[f,setF]=useState({to_lot_id:'',date:TODAY,notes:''});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const fromLot=lots.find(l=>l.id===animal?.lot_id);
  return <>
    <div style={{padding:12,background:'#f9fafb',borderRadius:8,marginBottom:12,fontSize:13}}>
      <p style={{color:'#6b7280',fontSize:11}}>De:</p>
      <strong>{fromLot?.name||'Sem lote'}</strong>
    </div>
    <Field label="Novo Lote" required>
      <Select value={f.to_lot_id} onChange={e=>s('to_lot_id',e.target.value)}>
        <option value="">— Selecione —</option>
        {lots.filter(l=>l.id!==animal?.lot_id).map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
      </Select>
    </Field>
    <Field label="Data da Transferência"><Input type="date" value={f.date} onChange={e=>s('date',e.target.value)}/></Field>
    <Field label="Motivo / Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)} placeholder="Ex: Separação de categoria, rotação, manejo..."/></Field>
    <FormActions onSave={()=>{if(!f.to_lot_id)return alert('Selecione o novo lote');onSave(f);}} onCancel={onCancel} saveLabel="Transferir"/>
  </>;
}

/* ═══ REPRODUÇÃO — agrupada por lote ═══ */
function Reproductive({user}){
  const[view,setView]=useState('lots');
  const[selLot,setSelLot]=useState(null);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);
  const lots=DB.get('lots');
  const users=DB.get('users');
  const protocols=useMemo(()=>DB.get('reproductive_protocols').sort((a,b)=>(b.date||'').localeCompare(a.date||'')),[rev]);
  const diagnoses=useMemo(()=>DB.get('pregnancy_diagnoses'),[rev]);

  function save(data){
    if(editing)DB.update('reproductive_protocols',editing.id,data);
    else DB.insert('reproductive_protocols',{...data,collaborator_id:data.collaborator_id||user.id});
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }
  function del(id){if(!confirm('Excluir?'))return;DB.delete('reproductive_protocols',id);setRev(r=>r+1);setDetail(null);}

  const byLot=useMemo(()=>{const m={};protocols.forEach(p=>{const k=p.lot_id||'sem_lote';if(!m[k])m[k]=[];m[k].push(p);});return m;},[protocols]);

  // DETAIL
  if(detail){
    const lot=lots.find(l=>l.id===detail.lot_id);
    const col=users.find(u=>u.id===detail.collaborator_id);
    const diag=diagnoses.find(d=>d.cow_id===detail.cow_id);
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={'Protocolo '+detail.cow_id} onBack={()=>setDetail(null)}
        action={user.role==='admin'&&<div style={{display:'flex',gap:8}}>
          <Btn size="sm" variant="secondary" onClick={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}>Editar</Btn>
          <Btn size="sm" variant="danger" onClick={()=>del(detail.id)}>Excluir</Btn>
        </div>}/>
      <Card style={{marginBottom:12}}>
        <CardHeader title={detail.protocol_name||'IATF'} icon="🔬" action={<SyncBadge status={detail.sync_status}/>}/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="Vaca" value={detail.cow_id}/>
          <Info label="Lote" value={lot?.name||'—'}/>
          <Info label="Data" value={H.fmtDate(detail.date)}/>
          <Info label="Safra" value={H.getSeason(detail.date)}/>
          <Info label="Touro / Sêmen" value={detail.semen_bull||'—'}/>
          <Info label="Raça" value={detail.bull_race||'—'}/>
          <Info label="Data Repasse" value={H.fmtDate(detail.repasse_date)}/>
          <Info label="Touro Repasse" value={detail.repasse_bull||'—'}/>
          <Info label="Colaborador" value={col?.name||'—'}/>
          {detail.notes&&<div style={{gridColumn:'1/-1'}}><Info label="Observações" value={detail.notes}/></div>}
        </div>
      </Card>
      {diag&&<Card>
        <CardHeader title="Diagnóstico de Gestação vinculado" icon="🤰"/>
        <div style={{padding:'14px 16px',fontSize:13}}>
          <p><Badge color={diag.result==='Positivo'?'green':diag.result==='Negativo'?'red':'amber'}>{diag.result}</Badge> em {H.fmtDate(diag.diagnosis_date)}</p>
          {diag.expected_birth_date&&<p style={{marginTop:6,color:'#6b7280'}}>Parto previsto: <strong>{H.fmtDate(diag.expected_birth_date)}</strong></p>}
        </div>
      </Card>}
    </div>;
  }

  // LOT VIEW
  if(view==='lot'&&selLot){
    const lot=lots.find(l=>l.id===selLot);
    const lotProtocols=byLot[selLot]||[];
    const cowIds=new Set(lotProtocols.map(p=>p.cow_id));
    const lotDiagnoses=diagnoses.filter(d=>cowIds.has(d.cow_id));
    const preg=H.calcPregnancy(lotDiagnoses);
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={lot?.name||'Lote'} sub={lotProtocols.length+' protocolos · '+cowIds.size+' vacas'}
        onBack={()=>{setSelLot(null);setView('lots');}}
        action={<Btn size="sm" onClick={()=>{setEditing({lot_id:selLot});setShowForm(true);}}>+ Protocolo</Btn>}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <StatCard label="Taxa Prenhez" value={preg.rate.toFixed(0)+'%'} sub={preg.positive+'/'+preg.total} color="amber" icon="🤰"/>
        <StatCard label="Vacas" value={cowIds.size} color="blue"/>
      </div>
      <Card>
        <CardHeader title="Protocolos Reprodutivos" icon="🔬"/>
        {lotProtocols.length===0?<EmptyState text="Sem protocolos neste lote"/>:
          lotProtocols.map(p=>{
            const diag=diagnoses.find(d=>d.cow_id===p.cow_id);
            return <ListItem key={p.id} onClick={()=>setDetail(p)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div>
                  <strong style={{fontSize:13}}>{p.cow_id} — {p.protocol_name||'IATF'}</strong>
                  <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>{p.semen_bull||'—'} · {p.bull_race||'—'} · {H.fmtDate(p.date)}</p>
                  {diag&&<p style={{fontSize:11,marginTop:2,color:diag.result==='Positivo'?'#166534':'#dc2626'}}>Diagnóstico: <strong>{diag.result}</strong></p>}
                </div>
                <SyncBadge status={p.sync_status}/>
              </div>
            </ListItem>;
          })
        }
      </Card>
      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?.id?'Editar Protocolo':'Novo Protocolo'} size="lg">
        <ProtocolForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}} lots={lots} users={users} user={user}/>
      </Modal>
    </div>;
  }

  // LOTS LIST
  const preg=H.calcPregnancy(diagnoses);
  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="🔬 Reprodução" sub={protocols.length+' protocolos totais'}
      action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}/>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
      <StatCard label="Taxa Prenhez Geral" value={preg.rate.toFixed(0)+'%'} sub={preg.positive+'/'+preg.total} color="amber" icon="🤰"/>
      <StatCard label="Protocolos" value={protocols.length} color="blue"/>
    </div>
    <Card>
      <CardHeader title="Por Lote" icon="🐂"/>
      {lots.length===0?<EmptyState text="Sem lotes"/>:
        lots.map(l=>{
          const count=(byLot[l.id]||[]).length;
          const cows=new Set((byLot[l.id]||[]).map(p=>p.cow_id)).size;
          return <ListItem key={l.id} onClick={()=>{setSelLot(l.id);setView('lot');}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <strong style={{fontSize:13}}>{l.name}</strong>
                <p style={{fontSize:11,color:'#6b7280'}}><Badge color="blue">{l.category}</Badge> · {count} protocolos · {cows} vacas</p>
              </div>
              <span style={{fontSize:18,color:'#9ca3af'}}>›</span>
            </div>
          </ListItem>;
        })
      }
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar':'Novo Protocolo'} size="lg">
      <ProtocolForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}} lots={lots} users={users} user={user}/>
    </Modal>
  </div>;
}

function ProtocolForm({initial,onSave,onCancel,lots,users,user}){
  const[f,setF]=useState({cow_id:'',lot_id:lots[0]?.id||'',date:TODAY,protocol_name:'IATF',semen_bull:'',bull_race:'',repasse_date:'',repasse_bull:'',notes:'',collaborator_id:user.id,...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  function pickCow(identifier,animal){
    const upd={cow_id:identifier};
    if(animal&&animal.lot_id)upd.lot_id=animal.lot_id;
    setF(p=>({...p,...upd}));
  }
  return <>
    <Alert type="info" style={{marginBottom:12}}>🐄 A vaca deve estar cadastrada no Inventário como <strong>Fêmea</strong>.</Alert>
    <AnimalPicker label="Vaca (do Inventário)" required value={f.cow_id} onChange={pickCow}
      sex="Fêmea" types={['Vaca','Novilha']}
      hint="O lote será preenchido automaticamente."/>
    <Field label="Lote"><Select value={f.lot_id} onChange={e=>s('lot_id',e.target.value)}><option value="">—</option>{lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Select></Field>
    <FormRow>
      <Field label="Data do Protocolo"><Input type="date" value={f.date} onChange={e=>s('date',e.target.value)}/></Field>
      <Field label="Nome do Protocolo"><Input value={f.protocol_name} onChange={e=>s('protocol_name',e.target.value)} placeholder="IATF"/></Field>
    </FormRow>
    <FormRow>
      <Field label="Touro / Sêmen"><Input value={f.semen_bull} onChange={e=>s('semen_bull',e.target.value)}/></Field>
      <Field label="Raça do Touro"><Select value={f.bull_race} onChange={e=>s('bull_race',e.target.value)}><option value="">—</option>{H.RACES.map(r=><option key={r}>{r}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Data do Repasse"><Input type="date" value={f.repasse_date} onChange={e=>s('repasse_date',e.target.value)}/></Field>
      <Field label="Touro de Repasse"><Input value={f.repasse_bull} onChange={e=>s('repasse_bull',e.target.value)}/></Field>
    </FormRow>
    <Field label="Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)}/></Field>
    <Field label="Colaborador"><Select value={f.collaborator_id} onChange={e=>s('collaborator_id',e.target.value)}>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</Select></Field>
    <FormActions onSave={()=>{
      if(!f.cow_id)return alert('Selecione a vaca no Inventário');
      const a=DB.findAnimalByIdentifier(f.cow_id);
      if(!a)return alert('Vaca "'+f.cow_id+'" não está no Inventário.');
      if((a.status||'ativo')!=='ativo')return alert('Vaca "'+f.cow_id+'" já saiu da propriedade.');
      if(a.sex&&a.sex!=='Fêmea')return alert('O animal selecionado não é uma fêmea.');
      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}

/* ═══ GESTAÇÃO ═══ */
function Pregnancy({user}){
  const[items,setItems]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[rev,setRev]=useState(0);
  const lots=DB.get('lots');
  const users=DB.get('users');
  const protocols=useMemo(()=>DB.get('reproductive_protocols'),[rev]);
  const settings=DB.settings();
  const alertDays=parseInt(settings.birth_alert_days||'30');

  useEffect(()=>{setItems([...DB.get('pregnancy_diagnoses')].sort((a,b)=>(b.diagnosis_date||'').localeCompare(a.diagnosis_date||'')));},[rev]);

  function save(data){
    if(editing)DB.update('pregnancy_diagnoses',editing.id,data);
    else DB.insert('pregnancy_diagnoses',{...data,collaborator_id:data.collaborator_id||user.id});
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }
  function del(id){if(!confirm('Excluir?'))return;DB.delete('pregnancy_diagnoses',id);setRev(r=>r+1);setDetail(null);}

  const preg=H.calcPregnancy(items);
  const nearBirth=items.filter(p=>{if(p.result!=='Positivo'||!p.expected_birth_date)return false;const d=H.daysUntil(p.expected_birth_date);return d!==null&&d<=alertDays&&d>=-3;});

  if(detail){
    const protocol=protocols.find(p=>p.cow_id===detail.cow_id);
    const lot=lots.find(l=>l.id===detail.lot_id);
    const col=users.find(u=>u.id===detail.collaborator_id);
    const days=detail.expected_birth_date?H.daysUntil(detail.expected_birth_date):null;
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={'Diagnóstico '+detail.cow_id} onBack={()=>setDetail(null)}
        action={user.role==='admin'&&<div style={{display:'flex',gap:8}}>
          <Btn size="sm" variant="secondary" onClick={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}>Editar</Btn>
          <Btn size="sm" variant="danger" onClick={()=>del(detail.id)}>Excluir</Btn>
        </div>}/>
      {detail.result==='Positivo'&&days!==null&&days<=alertDays&&days>=0&&
        <Alert type="warning">🚨 Parto previsto em {days===0?'hoje':days+' dia'+(days>1?'s':'')}</Alert>}
      <Card style={{marginBottom:12}}>
        <CardHeader title="Diagnóstico" icon="🤰" action={<SyncBadge status={detail.sync_status}/>}/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="Vaca" value={detail.cow_id}/>
          <Info label="Resultado" value={<Badge color={detail.result==='Positivo'?'green':detail.result==='Negativo'?'red':'amber'}>{detail.result}</Badge>}/>
          <Info label="Data Diag." value={H.fmtDate(detail.diagnosis_date)}/>
          <Info label="Parto Previsto" value={detail.expected_birth_date?H.fmtDate(detail.expected_birth_date):'—'}/>
          <Info label="Lote" value={lot?.name||'—'}/>
          <Info label="Colaborador" value={col?.name||'—'}/>
          <Info label="Safra" value={H.getSeason(detail.diagnosis_date)}/>
          {detail.notes&&<div style={{gridColumn:'1/-1'}}><Info label="Observações" value={detail.notes}/></div>}
        </div>
      </Card>
      {protocol&&<Card>
        <CardHeader title="Protocolo Reprodutivo vinculado" icon="🔬"/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="Protocolo" value={protocol.protocol_name||'—'}/>
          <Info label="Data" value={H.fmtDate(protocol.date)}/>
          <Info label="Touro/Sêmen" value={protocol.semen_bull||'—'}/>
          <Info label="Raça" value={protocol.bull_race||'—'}/>
        </div>
      </Card>}
    </div>;
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="🤰 Gestação" sub={items.length+' diagnósticos'} action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}/>
    {nearBirth.length>0&&<Alert type="error" style={{marginBottom:12}}>🚨 <strong>{nearBirth.length}</strong> vaca{nearBirth.length>1?'s':''} com parto próximo (até {alertDays} dias)</Alert>}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}}>
      <StatCard label="Taxa Prenhez" value={preg.rate.toFixed(0)+'%'} sub={preg.positive+'/'+preg.total} color="amber" icon="🤰"/>
      <StatCard label="Positivos" value={items.filter(i=>i.result==='Positivo').length} color="green"/>
      <StatCard label="Partos Próx." value={nearBirth.length} color={nearBirth.length>0?'red':'gray'}/>
    </div>
    <Card>
      {items.length===0?<EmptyState icon="🤰" text="Sem diagnósticos" action={<Btn onClick={()=>setShowForm(true)}>Registrar primeiro</Btn>}/>:
        items.map(p=>{
          const days=p.expected_birth_date?H.daysUntil(p.expected_birth_date):null;
          const near=p.result==='Positivo'&&days!==null&&days<=alertDays&&days>=-3;
          return <ListItem key={p.id} onClick={()=>setDetail(p)} style={near?{background:'#fff7ed',borderLeft:'3px solid #f59e0b'}:{}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <strong style={{fontSize:13}}>{p.cow_id}</strong>
                  <Badge color={p.result==='Positivo'?'green':p.result==='Negativo'?'red':'amber'}>{p.result}</Badge>
                  {near&&<Badge color="amber">⚠️ {days} dia{days!==1?'s':''}</Badge>}
                </div>
                <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>Diag: {H.fmtDate(p.diagnosis_date)}</p>
                {p.expected_birth_date&&<p style={{fontSize:11,color:'#374151'}}>Previsto: {H.fmtDate(p.expected_birth_date)}</p>}
              </div>
              <SyncBadge status={p.sync_status}/>
            </div>
          </ListItem>;
        })
      }
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar':'Novo Diagnóstico'} size="lg">
      <PregForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}} lots={lots} users={users} user={user}/>
    </Modal>
  </div>;
}

  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  function pickCow(identifier,animal){
    const upd={cow_id:identifier};
    if(animal&&animal.lot_id)upd.lot_id=animal.lot_id;
    setF(p=>({...p,...upd}));
  }
  return <>
    <Alert type="info" style={{marginBottom:12}}>🐄 A vaca deve estar cadastrada no Inventário como <strong>Fêmea</strong>.</Alert>
    <AnimalPicker label="Vaca (do Inventário)" required value={f.cow_id} onChange={pickCow}
      sex="Fêmea" types={['Vaca','Novilha']}
      hint="Busque pelo brinco. O lote será preenchido automaticamente."/>
    <Field label="Lote"><Select value={f.lot_id} onChange={e=>s('lot_id',e.target.value)}><option value="">—</option>{lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</Select></Field>
    <FormRow>
      <Field label="Data do Diagnóstico"><Input type="date" value={f.diagnosis_date} onChange={e=>s('diagnosis_date',e.target.value)}/></Field>
      <Field label="Resultado"><Select value={f.result} onChange={e=>s('result',e.target.value)}>{H.PRESULTS.map(r=><option key={r}>{r}</option>)}</Select></Field>
    </FormRow>
    <Field label="Data Prevista de Parto" hint={f.result==='Positivo'?'Obrigatório se positivo':''}><Input type="date" value={f.expected_birth_date} onChange={e=>s('expected_birth_date',e.target.value)}/></Field>
    <Field label="Observações"><Textarea value={f.notes} onChange={e=>s('notes',e.target.value)}/></Field>
    <Field label="Colaborador"><Select value={f.collaborator_id} onChange={e=>s('collaborator_id',e.target.value)}>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</Select></Field>
    <FormActions onSave={()=>{
      if(!f.cow_id)return alert('Selecione a vaca no Inventário');
      const a=DB.findAnimalByIdentifier(f.cow_id);
      if(!a)return alert('Vaca "'+f.cow_id+'" não está no Inventário.');
      if((a.status||'ativo')!=='ativo')return alert('Vaca "'+f.cow_id+'" já saiu da propriedade.');
      if(a.sex&&a.sex!=='Fêmea')return alert('O animal selecionado não é uma fêmea.');
      if(f.result==='Positivo'&&!f.expected_birth_date)return alert('Para positivo, informe a data prevista de parto');
      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}

/* ═══ BUSCA CONSOLIDADA ═══ */
function Search({user,onNav}){
  const[query,setQuery]=useState('');
  const[results,setResults]=useState(null);
  const[detail,setDetail]=useState(null);

  function doSearch(){
    if(!query.trim()){setResults(null);return;}
    const q=query.toLowerCase().trim();
    setResults({
      animals:DB.where('animals',a=>(a.identifier||'').toLowerCase().includes(q)||(a.farm_tag||'').toLowerCase().includes(q)||(a.official_tag||'').toLowerCase().includes(q)),
      births:DB.where('births',b=>(b.calf_id||'').toLowerCase().includes(q)||(b.mother_id||'').toLowerCase().includes(q)||(b.farm_tag||'').toLowerCase().includes(q)||(b.bull_name||'').toLowerCase().includes(q)),
      pregnancies:DB.where('pregnancy_diagnoses',p=>(p.cow_id||'').toLowerCase().includes(q)),
      protocols:DB.where('reproductive_protocols',r=>(r.cow_id||'').toLowerCase().includes(q)),
      lots:DB.where('lots',l=>(l.name||'').toLowerCase().includes(q)),
      pastures:DB.where('pastures',p=>(p.name||'').toLowerCase().includes(q)),
    });
  }

  function openAnimal(identifier){
    const data=DB.getConsolidated(identifier);
    setDetail({identifier,...data});
  }

  if(detail){
    const{identifier,animal,births,weighings,pregnancies,protocols,deaths,lotHist}=detail;
    const lots=DB.get('lots');
    const sorted=[...weighings].sort((a,b)=>a.date.localeCompare(b.date));
    const first=sorted[0];const last=sorted[sorted.length-1];
    return <div style={{padding:16,paddingBottom:100}}>
      <PageHeader title={identifier} sub="Histórico consolidado" onBack={()=>setDetail(null)}/>
      {deaths.length>0&&<Alert type="error">⚠️ Animal registrado como óbito em {H.fmtDate(deaths[0].death_date)} — {deaths[0].cause}</Alert>}
      {animal&&<Card style={{marginBottom:12}}>
        <CardHeader title="Dados do Animal" icon="🐂"/>
        <div style={{padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
          <Info label="Tipo" value={animal.type}/>
          <Info label="Sexo" value={<Badge color={animal.sex==='Macho'?'blue':'red'}>{animal.sex}</Badge>}/>
          <Info label="Raça" value={animal.race}/>
          <Info label="Nascimento" value={H.fmtDate(animal.birth_date)}/>
          <Info label="Brinco Fazenda" value={animal.farm_tag||'—'}/>
          <Info label="CIDASC" value={animal.official_tag||'—'}/>
          <Info label="Lote Atual" value={lots.find(l=>l.id===animal.lot_id)?.name||'—'}/>
          <Info label="Idade" value={animal.birth_date?Math.floor(H.daysBetween(animal.birth_date,TODAY)/30)+' meses':'—'}/>
        </div>
      </Card>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
        <StatCard label="Pesagens" value={weighings.length} color="blue"/>
        <StatCard label="Prenhez" value={pregnancies.filter(p=>p.result==='Positivo').length} color="amber"/>
        <StatCard label="Partos" value={births.filter(b=>b.mother_id===identifier).length} color="green"/>
        <StatCard label="Trocas Lote" value={lotHist.length} color="gray"/>
      </div>
      {births.length>0&&<Card style={{marginBottom:12}}>
        <CardHeader title="Nascimento(s)" icon="🐮" action={<Badge color="green">{births.length}</Badge>}/>
        {births.map(b=><ListItem key={b.id}>
          <strong style={{fontSize:13}}>{b.calf_id===identifier?'Este bezerro':b.mother_id===identifier?'Filho: '+b.calf_id:b.calf_id}</strong>
          <p style={{fontSize:11,color:'#6b7280'}}>{H.fmtDate(b.birth_date)} · {b.calf_sex} · {b.birth_weight}kg · mãe: {b.mother_id}</p>
        </ListItem>)}
      </Card>}
      {weighings.length>0&&<Card style={{marginBottom:12}}>
        <CardHeader title="Evolução do Peso" icon="⚖️" action={<Badge color="blue">{weighings.length}</Badge>}/>
        {first&&last&&first!==last&&<div style={{padding:'10px 16px',background:'#f0fdf4',fontSize:12,color:'#166534'}}>
          De <strong>{first.weight}kg</strong> ({H.fmtDate(first.date)}) → <strong>{last.weight}kg</strong> ({H.fmtDate(last.date)})
          {' · GMD '}{((parseFloat(last.weight)-parseFloat(first.weight))/H.daysBetween(first.date,last.date)).toFixed(2)} kg/dia
        </div>}
        {sorted.map(w=><ListItem key={w.id}>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:13}}>{H.fmtDate(w.date)}</span>
            <strong style={{color:'#166534'}}>{w.weight} kg</strong>
          </div>
        </ListItem>)}
      </Card>}
      {pregnancies.length>0&&<Card style={{marginBottom:12}}>
        <CardHeader title="Gestações" icon="🤰" action={<Badge color="amber">{pregnancies.length}</Badge>}/>
        {pregnancies.map(p=><ListItem key={p.id}>
          <p style={{fontSize:13}}><Badge color={p.result==='Positivo'?'green':'red'}>{p.result}</Badge> em {H.fmtDate(p.diagnosis_date)}</p>
          {p.expected_birth_date&&<p style={{fontSize:11,color:'#6b7280'}}>Previsto: {H.fmtDate(p.expected_birth_date)}</p>}
        </ListItem>)}
      </Card>}
      {protocols.length>0&&<Card style={{marginBottom:12}}>
        <CardHeader title="Protocolos" icon="🔬" action={<Badge color="purple">{protocols.length}</Badge>}/>
        {protocols.map(r=><ListItem key={r.id}>
          <strong style={{fontSize:13}}>{r.protocol_name} — {H.fmtDate(r.date)}</strong>
          <p style={{fontSize:11,color:'#6b7280'}}>{r.semen_bull} · {r.bull_race}</p>
        </ListItem>)}
      </Card>}
      {lotHist.length>0&&<Card>
        <CardHeader title="Histórico de Lotes" icon="🔄" action={<Badge color="gray">{lotHist.length}</Badge>}/>
        {lotHist.map(h=>{
          const from=lots.find(l=>l.id===h.from_lot_id);
          const to=lots.find(l=>l.id===h.to_lot_id);
          return <ListItem key={h.id}>
            <p style={{fontSize:13}}>{from?.name||'Entrada'} → <strong>{to?.name||'—'}</strong></p>
            <p style={{fontSize:11,color:'#6b7280'}}>{H.fmtDate(h.date)}{h.notes?' · '+h.notes:''}</p>
          </ListItem>;
        })}
      </Card>}
    </div>;
  }

  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="🔎 Busca" sub="Procurar em todo o sistema"/>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      <Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="ID, brinco, lote, touro..." onKeyDown={e=>e.key==='Enter'&&doSearch()} style={{flex:1}}/>
      <Btn onClick={doSearch}>Buscar</Btn>
    </div>
    {results===null&&<div style={{textAlign:'center',padding:40,color:'#9ca3af'}}><div style={{fontSize:48,marginBottom:12}}>🔎</div><p>Digite um ID, brinco, nome de lote ou touro</p></div>}
    {results&&Object.values(results).every(a=>a.length===0)&&<EmptyState icon="📭" text={'Nenhum resultado para "'+query+'"'}/>}
    {results&&<>
      {results.animals.length>0&&<Card style={{marginBottom:12}}>
        <CardHeader title="Animais" icon="🐂" action={<Badge color="green">{results.animals.length}</Badge>}/>
        {results.animals.map(a=><ListItem key={a.id} onClick={()=>openAnimal(a.identifier)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <strong style={{fontSize:13}}>{a.identifier}</strong> <Badge color={a.sex==='Macho'?'blue':'red'}>{a.sex}</Badge> <Badge color="gray">{a.race}</Badge>
              <p style={{fontSize:11,color:'#6b7280'}}>{a.type} · {a.farm_tag}{a.official_tag?' / '+a.official_tag:''}</p>
            </div>
            <span style={{fontSize:18,color:'#9ca3af'}}>›</span>
          </div>
        </ListItem>)}
      </Card>}
      {results.births.length>0&&<Card style={{marginBottom:12}}>

/* ═══ USUÁRIOS ═══ */
function Collaborators({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;
  const[users,setUsers]=useState([]);
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[rev,setRev]=useState(0);
  useEffect(()=>{setUsers(DB.get('users'));},[rev]);
  function save(data){
    // Validar email único (exceto o próprio)
    const existing=users.find(u=>u.email===data.email&&u.id!==editing?.id);
    if(existing){alert('E-mail já em uso por outro usuário');return;}
    if(editing){
      // Se senha está vazia, manter a antiga
      if(!data.password)data.password=editing.password;
      DB.update('users',editing.id,data);
    }
    else DB.insert('users',data);
    setRev(r=>r+1);setShowForm(false);setEditing(null);
  }
  function del(u){
    if(u.id===user.id){alert('Você não pode excluir sua própria conta.');return;}
    if(!confirm('Excluir usuário '+u.name+'?'))return;
    DB.delete('users',u.id);setRev(r=>r+1);
  }
  return <div style={{padding:16,paddingBottom:100}}>
    <PageHeader title="👤 Usuários" sub={users.length+' cadastrados'} action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}/>
    <Card>
      {users.map(u=><ListItem key={u.id} onClick={()=>{setEditing(u);setShowForm(true);}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:40,height:40,borderRadius:999,background:u.role==='admin'?'#fef3c7':'#f0fdf4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{u.role==='admin'?'👑':'👤'}</div>
          <div style={{flex:1}}>
            <strong style={{fontSize:13}}>{u.name}</strong>
            <p style={{fontSize:12,color:'#6b7280'}}>{u.email} · <Badge color={u.role==='admin'?'amber':'green'}>{u.role==='admin'?'Admin':'Colaborador'}</Badge></p>
          </div>
          <Badge color={u.active?'green':'gray'}>{u.active?'Ativo':'Inativo'}</Badge>
          {u.id!==user.id&&<button onClick={e=>{e.stopPropagation();del(u);}} style={{fontSize:11,color:'#dc2626',background:'none',border:'none',cursor:'pointer',marginLeft:8}}>×</button>}
        </div>
      </ListItem>)}
    </Card>
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar Usuário':'Novo Usuário'}>
      <UserForm initial={editing} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>
  </div>;
}

function UserForm({initial,onSave,onCancel}){
  const[f,setF]=useState({name:'',email:'',password:'',role:'collaborator',active:1,...initial,password:''});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <>
    <Field label="Nome" required><Input value={f.name} onChange={e=>s('name',e.target.value)}/></Field>
    <Field label="E-mail" required><Input type="email" value={f.email} onChange={e=>s('email',e.target.value)}/></Field>
    <Field label="Senha" hint={initial?'Deixe em branco para manter a senha atual':'Obrigatória'}><Input type="password" value={f.password} onChange={e=>s('password',e.target.value)}/></Field>
    <FormRow>
      <Field label="Perfil"><Select value={f.role} onChange={e=>s('role',e.target.value)}><option value="collaborator">Colaborador</option><option value="admin">Administrador</option></Select></Field>
      <Field label="Status"><Select value={f.active} onChange={e=>s('active',parseInt(e.target.value))}><option value={1}>Ativo</option><option value={0}>Inativo</option></Select></Field>
    </FormRow>
    <FormActions onSave={()=>{
      if(!f.name||!f.email)return alert('Nome e e-mail obrigatórios');
      if(!initial&&!f.password)return alert('Informe a senha');
      if(f.password&&f.password.length<4)return alert('Senha precisa ter ao menos 4 caracteres');
      onSave(f);
    }} onCancel={onCancel}/>
  </>;
}
