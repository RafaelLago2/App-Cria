/* ─── EXPORTAÇÃO CSV ONLINE ─── */
function OnlineExport({user}){
  const[exporting,setExporting]=useState(false);
  const[lastExport,setLastExport]=useState(null);

  async function exportTable(table,label){
    setExporting(true);
    try{
      const data=await window.SupaDB.get(table);
      if(!data||data.length===0){alert('Nenhum dado em '+label);setExporting(false);return;}
      const headers=Object.keys(data[0]);
      const csv=[
        headers.join(','),
        ...data.map(row=>headers.map(h=>{
          const v=row[h];
          if(v===null||v===undefined)return '';
          const s=String(v).replace(/"/g,'""');
          return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s}"`:s;
        }).join(','))
      ].join('\n');
      const bom='\uFEFF'; // UTF-8 BOM pra Excel reconhecer acentos
      const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`${table}-${TODAY}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      setLastExport({table,label,count:data.length,when:new Date().toLocaleTimeString()});
    }catch(e){alert('Erro: '+e.message);}
    finally{setExporting(false);}
  }

  async function exportAll(){
    if(!confirm('Exportar TODAS as tabelas em arquivos CSV separados?\n\nVai baixar vários arquivos.'))return;
    const all=[
      ['animals','Animais'],['pastures','Pastos'],['lots','Lotes'],
      ['births','Nascimentos'],['deaths','Mortalidade'],['weighings','Pesagens'],
      ['reproductive_protocols','Reprodução'],['pregnancy_diagnoses','Gestação'],
      ['health_managements','Manejos'],['herbicide_applications','Herbicida'],
      ['mineral_supplementations','Sal mineral'],['feces_records','Fezes'],
      ['animal_exits','Saídas'],
      ...(user.role==='admin'?[['revenues','Receitas'],['costs','Custos']]:[]),
    ];
    for(const[t,l]of all){await exportTable(t,l);await new Promise(r=>setTimeout(r,400));}
    alert('✅ Exportação concluída!');
  }

  async function exportFullBackup(){
    if(!confirm('Baixar BACKUP COMPLETO em JSON?\n\nUm único arquivo com TODOS os dados do Supabase. Útil pra:\n• Cópia de segurança fora da nuvem\n• Restaurar em outro Supabase\n• Auditoria\n\nProsseguir?'))return;
    setExporting(true);
    try{
      const tables=['animals','pastures','lots','births','deaths','weighings',
        'reproductive_protocols','pregnancy_diagnoses','health_managements',
        'herbicide_applications','mineral_supplementations','feces_records',
        'animal_exits','animal_lot_history','pasture_movements'];
      if(user.role==='admin'){tables.push('revenues','costs','farm_settings');}

      const backup={
        _meta:{
          source:'PecuáriaManager Online',
          exported_at:new Date().toISOString(),
          exported_by:user.email,
          version:'1.0',
        },
        data:{},
      };
      for(const t of tables){
        try{
          backup.data[t]=await window.SupaDB.get(t);
        }catch(e){
          backup.data[t]=[];
          console.warn(`Erro em ${t}:`,e.message);
        }
      }

      const json=JSON.stringify(backup,null,2);
      const blob=new Blob([json],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`pecuaria-backup-online-${TODAY}.json`;
      a.click();
      URL.revokeObjectURL(url);

      const totalRecords=Object.values(backup.data).reduce((s,arr)=>s+(Array.isArray(arr)?arr.length:0),0);
      alert(`✅ Backup completo baixado!\n\n${tables.length} tabelas · ${totalRecords} registros total`);
      setLastExport({table:'__backup__',label:'Backup completo (JSON)',count:totalRecords,when:new Date().toLocaleTimeString()});
    }catch(e){alert('Erro: '+e.message);}
    finally{setExporting(false);}
  }

  const tables=[
    ['animals','📋 Animais','blue'],
    ['pastures','🌿 Pastos','green'],
    ['lots','🐂 Lotes','amber'],
    ['births','🐮 Nascimentos','blue'],
    ['deaths','✝ Mortalidade','red'],
    ['weighings','⚖️ Pesagens','amber'],
    ['reproductive_protocols','🔬 Reprodução','purple'],
    ['pregnancy_diagnoses','🤰 Gestação','pink'],
    ['health_managements','💉 Manejos sanitários','green'],
    ['herbicide_applications','🌿 Herbicida','green'],
    ['mineral_supplementations','🧂 Sal mineral','gray'],
    ['feces_records','🔍 Fezes','amber'],
    ['animal_exits','📤 Saídas','gray'],
  ];
  if(user.role==='admin'){
    tables.push(['revenues','💰 Receitas','green']);
    tables.push(['costs','💵 Custos','red']);
  }

  return <OnlinePage title="Exportar Dados" subtitle="Baixe planilhas CSV de cada tabela" icon="📥">
    <Alert type="info">📊 Os arquivos CSV abrem perfeitamente no Excel, Google Sheets, LibreOffice etc.</Alert>

    <Card style={{marginBottom:12}}>
      <CardHeader title="💾 Backup completo (JSON)" icon=""/>
      <div style={{padding:12}}>
        <p style={{fontSize:12,color:'#6b7280',marginBottom:10}}>
          Baixa <strong>todos os dados do Supabase em um único arquivo JSON</strong>. 
          Útil pra cópia de segurança fora da nuvem ou pra restaurar em outro projeto.
        </p>
        <Btn onClick={exportFullBackup} fullWidth disabled={exporting} variant="primary">
          {exporting?'⏳ Gerando backup...':'💾 Baixar backup completo (JSON)'}
        </Btn>
      </div>
    </Card>

    <Card style={{marginBottom:12}}>
      <CardHeader title="Exportar tudo de uma vez (CSV)" icon="📦"/>
      <div style={{padding:12}}>
        <Btn onClick={exportAll} fullWidth disabled={exporting} variant="secondary">
          {exporting?'⏳ Exportando...':'📦 Baixar TODAS as planilhas CSV'}
        </Btn>
      </div>
    </Card>

    {lastExport&&<Alert type="success">
      ✅ Última exportação: <strong>{lastExport.label}</strong> ({lastExport.count} registros) às {lastExport.when}
    </Alert>}

    <Card>
      <CardHeader title="Exportar tabela individual" icon="📄"/>
      {tables.map(([t,l,c])=>
        <ListItem key={t}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13}}>{l}</span>
            <Btn size="sm" variant="secondary" onClick={()=>exportTable(t,l)} disabled={exporting}>📥 Baixar</Btn>
          </div>
        </ListItem>
      )}
    </Card>
  </OnlinePage>;
}

/* ─── ANÁLISES ONLINE (admin only) ─── */
function OnlineAnalysis({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;
  const{data:revenues,loading:lR}=useSupaQuery('revenues');
  const{data:costs,loading:lC}=useSupaQuery('costs');
  const{data:births,loading:lB}=useSupaQuery('births');
  const{data:animals,loading:lA}=useSupaQuery('animals');
  const{data:pregnancies,loading:lP}=useSupaQuery('pregnancy_diagnoses');
  const loading=lR||lC||lB||lA||lP;

  const totalRevenue=revenues.reduce((s,r)=>s+(parseFloat(r.total_value)||0),0);
  const totalCost=costs.reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const profit=totalRevenue-totalCost;
  const calfBornCount=births.length;
  const costPerCalf=calfBornCount>0?totalCost/calfBornCount:0;
  const revenuePerCalf=calfBornCount>0?totalRevenue/calfBornCount:0;
  const activeFemales=animals.filter(a=>a.sex==='Fêmea'&&(a.status||'ativo')==='ativo'&&['Vaca','Novilha'].includes(a.type)).length;
  const positivePregnancies=pregnancies.filter(p=>p.result==='Positivo').length;
  const totalPregnancies=pregnancies.length;
  const pregnancyRate=totalPregnancies>0?(positivePregnancies/totalPregnancies)*100:0;

  // Custos por categoria
  const costsByCat={};
  costs.forEach(c=>{
    const cat=c.category||'Outros';
    costsByCat[cat]=(costsByCat[cat]||0)+(parseFloat(c.value)||0);
  });

  return <OnlinePage title="Análises" subtitle="Resumo financeiro e produtivo" icon="📊" loading={loading}>
    <Alert type="info">📈 Análises calculadas com base em todos os dados cadastrados.</Alert>

    <Card style={{marginBottom:12}}>
      <CardHeader title="💰 Resumo Financeiro" icon=""/>
      <div style={{padding:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <StatCard label="Receitas" value={H.fmtMoney(totalRevenue)} color="green"/>
        <StatCard label="Custos" value={H.fmtMoney(totalCost)} color="red"/>
        <StatCard label={profit>=0?'Lucro':'Prejuízo'} value={H.fmtMoney(profit)} color={profit>=0?'green':'red'}/>
        <StatCard label="Margem" value={totalRevenue>0?((profit/totalRevenue)*100).toFixed(1)+'%':'—'} color={profit>=0?'green':'red'}/>
      </div>
    </Card>

    <Card style={{marginBottom:12}}>
      <CardHeader title="🐮 Custo / Receita por Bezerro" icon=""/>
      <div style={{padding:12}}>
        <p style={{fontSize:11,color:'#6b7280',marginBottom:8}}>Baseado em {calfBornCount} nascimentos cadastrados</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <StatCard label="Custo / Bezerro" value={H.fmtMoney(costPerCalf)} color="red"/>
          <StatCard label="Receita / Bezerro" value={H.fmtMoney(revenuePerCalf)} color="green"/>
        </div>
      </div>
    </Card>

    <Card style={{marginBottom:12}}>
      <CardHeader title="🤰 Reprodução" icon=""/>
      <div style={{padding:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <StatCard label="Fêmeas reprodutivas" value={activeFemales} color="blue"/>
        <StatCard label="Taxa de Prenhez" value={pregnancyRate.toFixed(0)+'%'} sub={positivePregnancies+'/'+totalPregnancies} color="amber"/>
      </div>
    </Card>

    {Object.keys(costsByCat).length>0&&<Card style={{marginBottom:12}}>
      <CardHeader title="💵 Custos por Categoria" icon=""/>
      <div style={{padding:12}}>
        {Object.entries(costsByCat).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>{
          const pct=totalCost>0?(val/totalCost)*100:0;
          return <div key={cat} style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
              <strong>{cat}</strong>
              <span>{H.fmtMoney(val)} ({pct.toFixed(1)}%)</span>
            </div>
            <div style={{height:8,background:'#f3f4f6',borderRadius:4,overflow:'hidden'}}>
              <div style={{height:'100%',width:pct+'%',background:'#dc2626'}}/>
            </div>
          </div>;
        })}
      </div>
    </Card>}
  </OnlinePage>;
}

/* ─── RELATÓRIO DE SAFRA ONLINE ─── */
function OnlineSafraReport({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;
  const{data:animals,loading:lA}=useSupaQuery('animals');
  const{data:births,loading:lB}=useSupaQuery('births');
  const{data:deaths,loading:lD}=useSupaQuery('deaths');
  const{data:exits,loading:lE}=useSupaQuery('animal_exits');
  const{data:pregnancies,loading:lP}=useSupaQuery('pregnancy_diagnoses');
  const{data:revenues,loading:lR}=useSupaQuery('revenues');
  const{data:costs,loading:lC}=useSupaQuery('costs');
  const{data:lots}=useSupaQuery('lots');
  const{data:pastures}=useSupaQuery('pastures');
  const loading=lA||lB||lD||lE||lP||lR||lC;

  const[year,setYear]=useState(new Date().getFullYear());

  function inYear(dateStr){
    if(!dateStr)return false;
    return String(dateStr).startsWith(String(year));
  }

  const yearBirths=births.filter(b=>inYear(b.birth_date));
  const yearDeaths=deaths.filter(d=>inYear(d.death_date));
  const yearExits=exits.filter(x=>inYear(x.date));
  const yearPregs=pregnancies.filter(p=>inYear(p.diagnosis_date));
  const yearRevenues=revenues.filter(r=>inYear(r.date));
  const yearCosts=costs.filter(c=>inYear(c.date));

  const totalRev=yearRevenues.reduce((s,r)=>s+(parseFloat(r.total_value)||0),0);
  const totalCost=yearCosts.reduce((s,c)=>s+(parseFloat(c.value)||0),0);
  const totalArea=pastures.reduce((s,p)=>s+(parseFloat(p.area_ha)||0),0);
  const activeAnimals=animals.filter(a=>(a.status||'ativo')==='ativo').length;
  const positivePregs=yearPregs.filter(p=>p.result==='Positivo').length;
  const pregRate=yearPregs.length>0?(positivePregs/yearPregs.length)*100:0;
  const mortalityRate=activeAnimals>0?(yearDeaths.length/activeAnimals)*100:0;

  function doPrint(){window.print();}

  return <OnlinePage title="Relatório de Safra" subtitle="Imprimível / PDF" icon="📑"
    action={<Btn onClick={doPrint}>🖨 Imprimir</Btn>} loading={loading}>
    <Card style={{marginBottom:12,padding:12}} className="no-print">
      <Field label="Ano da Safra"><Select value={year} onChange={e=>setYear(parseInt(e.target.value))}>
        {[year+1,year,year-1,year-2,year-3,year-4].map(y=><option key={y} value={y}>{y}</option>)}
      </Select></Field>
    </Card>

    <div id="safra-print" style={{background:'#fff',padding:'24px',borderRadius:12,fontSize:12,lineHeight:1.5}}>
      <div style={{textAlign:'center',marginBottom:20,borderBottom:'2px solid #166534',paddingBottom:10}}>
        <h1 style={{fontSize:22,color:'#166534',marginBottom:4}}>📑 RELATÓRIO DE SAFRA {year}</h1>
        <p style={{fontSize:12,color:'#6b7280'}}>Gerado em {new Date().toLocaleDateString('pt-BR')}</p>
      </div>

      <h2 style={{fontSize:14,color:'#166534',marginTop:16,marginBottom:8}}>📋 PROPRIEDADE</h2>
      <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
        <tbody>
          <tr><td style={{padding:'4px 0'}}><strong>Animais ativos:</strong></td><td style={{textAlign:'right'}}>{activeAnimals}</td></tr>
          <tr><td style={{padding:'4px 0'}}><strong>Total de pastos:</strong></td><td style={{textAlign:'right'}}>{pastures.length}</td></tr>
          <tr><td style={{padding:'4px 0'}}><strong>Área total:</strong></td><td style={{textAlign:'right'}}>{totalArea.toFixed(2)} ha</td></tr>
          <tr><td style={{padding:'4px 0'}}><strong>Total de lotes:</strong></td><td style={{textAlign:'right'}}>{lots.length}</td></tr>
        </tbody>
      </table>

      <h2 style={{fontSize:14,color:'#166534',marginTop:16,marginBottom:8}}>🐮 PRODUÇÃO {year}</h2>
      <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
        <tbody>
          <tr><td style={{padding:'4px 0'}}><strong>Nascimentos:</strong></td><td style={{textAlign:'right'}}>{yearBirths.length}</td></tr>
          <tr><td style={{padding:'4px 0'}}><strong>Mortes:</strong></td><td style={{textAlign:'right'}}>{yearDeaths.length}</td></tr>
          <tr><td style={{padding:'4px 0'}}><strong>Saídas (vendas/etc):</strong></td><td style={{textAlign:'right'}}>{yearExits.length}</td></tr>
          <tr><td style={{padding:'4px 0'}}><strong>Taxa de mortalidade:</strong></td><td style={{textAlign:'right'}}>{mortalityRate.toFixed(2)}%</td></tr>
        </tbody>
      </table>

      <h2 style={{fontSize:14,color:'#166534',marginTop:16,marginBottom:8}}>🤰 REPRODUÇÃO {year}</h2>
      <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
        <tbody>
          <tr><td style={{padding:'4px 0'}}><strong>Diagnósticos no ano:</strong></td><td style={{textAlign:'right'}}>{yearPregs.length}</td></tr>
          <tr><td style={{padding:'4px 0'}}><strong>Positivos:</strong></td><td style={{textAlign:'right'}}>{positivePregs}</td></tr>
          <tr><td style={{padding:'4px 0'}}><strong>Taxa de prenhez:</strong></td><td style={{textAlign:'right'}}>{pregRate.toFixed(1)}%</td></tr>
        </tbody>
      </table>

      <h2 style={{fontSize:14,color:'#166534',marginTop:16,marginBottom:8}}>💰 FINANCEIRO {year}</h2>
      <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
        <tbody>
          <tr><td style={{padding:'4px 0'}}><strong>Receitas:</strong></td><td style={{textAlign:'right',color:'#166534'}}>{H.fmtMoney(totalRev)}</td></tr>
          <tr><td style={{padding:'4px 0'}}><strong>Custos:</strong></td><td style={{textAlign:'right',color:'#dc2626'}}>{H.fmtMoney(totalCost)}</td></tr>
          <tr style={{borderTop:'1px solid #e5e7eb'}}><td style={{padding:'8px 0 4px'}}><strong>{(totalRev-totalCost)>=0?'LUCRO':'PREJUÍZO'}:</strong></td><td style={{textAlign:'right',padding:'8px 0 4px',fontSize:14,fontWeight:700,color:(totalRev-totalCost)>=0?'#166534':'#dc2626'}}>{H.fmtMoney(totalRev-totalCost)}</td></tr>
        </tbody>
      </table>

      {yearBirths.length>0&&<>
        <h2 style={{fontSize:14,color:'#166534',marginTop:16,marginBottom:8}}>🐮 LISTA DE NASCIMENTOS {year}</h2>
        <table style={{width:'100%',fontSize:11,borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#f3f4f6'}}>
              <th style={{padding:6,textAlign:'left',border:'1px solid #e5e7eb'}}>Bezerro</th>
              <th style={{padding:6,textAlign:'left',border:'1px solid #e5e7eb'}}>Mãe</th>
              <th style={{padding:6,textAlign:'center',border:'1px solid #e5e7eb'}}>Sexo</th>
              <th style={{padding:6,textAlign:'right',border:'1px solid #e5e7eb'}}>Peso</th>
              <th style={{padding:6,textAlign:'center',border:'1px solid #e5e7eb'}}>Data</th>
            </tr>
          </thead>
          <tbody>
            {yearBirths.map(b=><tr key={b.id}>
              <td style={{padding:6,border:'1px solid #e5e7eb'}}>{b.calf_id}</td>
              <td style={{padding:6,border:'1px solid #e5e7eb'}}>{b.mother_id}</td>
              <td style={{padding:6,border:'1px solid #e5e7eb',textAlign:'center'}}>{b.calf_sex}</td>
              <td style={{padding:6,border:'1px solid #e5e7eb',textAlign:'right'}}>{b.birth_weight} kg</td>
              <td style={{padding:6,border:'1px solid #e5e7eb',textAlign:'center'}}>{H.fmtDate(b.birth_date)}</td>
            </tr>)}
          </tbody>
        </table>
      </>}
    </div>

    <style>{`
      @media print {
        .no-print, .pm-sidebar, .pm-topbar, .pm-bottomnav, button { display: none !important; }
        body, html { background: #fff !important; }
        #safra-print { box-shadow: none !important; padding: 0 !important; }
      }
    `}</style>
  </OnlinePage>;
}



/* ─── FICHAS IMPRIMÍVEIS PARA CAMPO ─── */
function OnlinePrintableSheets({user}){
  const{data:animals,loading:lA}=useSupaQuery('animals');
  const{data:lots,loading:lL}=useSupaQuery('lots');
  const{data:protocols}=useSupaQuery('reproductive_protocols');
  const[sheetType,setSheetType]=useState('weighing'); // weighing | reproduction | pregnancy
  const[selectedLot,setSelectedLot]=useState('');
  const[selectedSex,setSelectedSex]=useState('all'); // all | Macho | Fêmea
  const[selectedType,setSelectedType]=useState('all'); // all | Vaca | Bezerro | etc
  const[sheetTitle,setSheetTitle]=useState('');
  const[sheetDate,setSheetDate]=useState(TODAY);
  const[notes,setNotes]=useState('');

  const filtered=useMemo(()=>{
    return animals
      .filter(a=>(a.status||'ativo')==='ativo')
      .filter(a=>!selectedLot||selectedLot==='__no_lot__'?(selectedLot==='__no_lot__'?!a.lot_id:true):a.lot_id===selectedLot)
      .filter(a=>selectedSex==='all'||a.sex===selectedSex)
      .filter(a=>{
        if(selectedType==='all')return true;
        if(selectedType==='reprodutivas')return a.sex==='Fêmea'&&['Vaca','Novilha'].includes(a.type);
        return a.type===selectedType;
      })
      .sort((a,b)=>(a.identifier||'').localeCompare(b.identifier||'',undefined,{numeric:true,sensitivity:'base'}));
  },[animals,selectedLot,selectedSex,selectedType]);

  const lot=lots.find(l=>l.id===selectedLot);
  const titleAuto=sheetTitle||(sheetType==='weighing'?'PESAGEM':sheetType==='reproduction'?'REPRODUÇÃO':'GESTAÇÃO');

  function doPrint(){window.print();}

  // Para reprodução: encontrar último protocolo
  function lastProtocol(animalId){
    return protocols.find(p=>p.cow_id===animalId);
  }

  return <OnlinePage title="Fichas Imprimíveis" subtitle="Pra preencher no campo" icon="🖨" loading={lA||lL}>
    <Card style={{marginBottom:12}} className="no-print">
      <CardHeader title="⚙️ Configurar ficha" icon=""/>
      <div style={{padding:14}}>
        <Field label="Tipo de ficha">
          <Select value={sheetType} onChange={e=>setSheetType(e.target.value)}>
            <option value="weighing">⚖️ Pesagem (com peso)</option>
            <option value="reproduction">🔬 Reprodução (IATF, repasse)</option>
            <option value="pregnancy">🤰 Gestação (Prenha/Vazia)</option>
            <option value="generic">📋 Genérica (campos livres)</option>
          </Select>
        </Field>

        <FormRow>
          <Field label="Data">
            <Input type="date" value={sheetDate} onChange={e=>setSheetDate(e.target.value)}/>
          </Field>
          <Field label="Título customizado">
            <Input value={sheetTitle} onChange={e=>setSheetTitle(e.target.value)} placeholder="Ex: PESAGEM SETEMBRO/2026"/>
          </Field>
        </FormRow>

        <FormRow>
          <Field label="Lote">
            <Select value={selectedLot} onChange={e=>setSelectedLot(e.target.value)}>
              <option value="">Todos os lotes</option>
              <option value="__no_lot__">⚠ Sem lote</option>
              {lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
            </Select>
          </Field>
          <Field label="Sexo">
            <Select value={selectedSex} onChange={e=>setSelectedSex(e.target.value)}>
              <option value="all">Todos</option>
              <option value="Fêmea">Fêmeas</option>
              <option value="Macho">Machos</option>
            </Select>
          </Field>
        </FormRow>

        <Field label="Categoria">
          <Select value={selectedType} onChange={e=>setSelectedType(e.target.value)}>
            <option value="all">Todas categorias</option>
            <option value="reprodutivas">🐄 Apenas Vacas + Novilhas</option>
            <option value="Vaca">Vacas</option>
            <option value="Novilha">Novilhas</option>
            <option value="Bezerro">Bezerros</option>
            <option value="Garrote">Garrotes</option>
            <option value="Touro">Touros</option>
          </Select>
        </Field>

        <Field label="Observações da ficha (opcional)">
          <Textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Ex: Pesagem feita pela manhã..."/>
        </Field>

        <Alert type="info">
          <strong>{filtered.length} animais</strong> serão listados na ficha (em ordem crescente de número).
        </Alert>

        <Btn onClick={doPrint} fullWidth disabled={filtered.length===0}>🖨 Imprimir ficha</Btn>
      </div>
    </Card>

    {/* Ficha pra imprimir */}
    <div id="printable-sheet" style={{background:'#fff',padding:'24px',borderRadius:12,fontSize:12}}>
      <div style={{textAlign:'center',marginBottom:14,borderBottom:'2px solid #000',paddingBottom:10}}>
        <h1 style={{fontSize:20,fontWeight:700,letterSpacing:1}}>📋 FICHA DE {titleAuto}</h1>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:10,fontSize:12}}>
          <span><strong>Data:</strong> {H.fmtDate(sheetDate)}</span>
          <span><strong>Lote:</strong> {lot?lot.name:'Todos'}</span>
          <span><strong>Total:</strong> {filtered.length} animais</span>
        </div>
        {notes&&<p style={{marginTop:8,fontSize:11,fontStyle:'italic',textAlign:'left'}}>{notes}</p>}

      <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>

          <tr style={{background:'#000',color:'#fff'}}>
            <th style={{padding:6,border:'1px solid #000',width:30,textAlign:'center'}}>#</th>
            <th style={{padding:6,border:'1px solid #000',textAlign:'left'}}>Brinco</th>
            <th style={{padding:6,border:'1px solid #000',textAlign:'center'}}>Sexo</th>
            <th style={{padding:6,border:'1px solid #000',textAlign:'center'}}>Tipo</th>
            <th style={{padding:6,border:'1px solid #000',textAlign:'center'}}>Raça</th>

              <th style={{padding:6,border:'1px solid #000',textAlign:'center',width:80}}>Peso (kg)</th>
              <th style={{padding:6,border:'1px solid #000',textAlign:'left',width:120}}>Obs.</th>

                <td style={{padding:5,border:'1px solid #000'}}></td>
              </>}

              {sheetType==='reproduction'&&<>
                <td style={{padding:5,border:'1px solid #000',fontSize:10}}>{proto?H.fmtDate(proto.date):''}</td>

              {sheetType==='pregnancy'&&<>
                <td style={{padding:5,border:'1px solid #000',textAlign:'center'}}>P / V</td>

                <td style={{padding:5,border:'1px solid #000'}}></td>
                <td style={{padding:5,border:'1px solid #000'}}></td>
              </>}

              {sheetType==='generic'&&<>
                <td style={{padding:5,border:'1px solid #000'}}></td>
                <td style={{padding:5,border:'1px solid #000'}}></td>
                <td style={{padding:5,border:'1px solid #000'}}></td>
              </>}
            </tr>;
          })}
        </tbody>
      </table>

      <div style={{marginTop:24,paddingTop:14,borderTop:'1px dashed #999',fontSize:11}}>
        <p>Responsável: ____________________________________  Assinatura: ____________________________________</p>
        <p style={{marginTop:24}}>Observações gerais:</p>
        <div style={{height:50,border:'1px solid #999',marginTop:6}}/>
      </div>
    </div>

    <style>{`
      @media print {
        @page { margin: 12mm; size: A4 portrait; }
        .no-print, .pm-sidebar, .pm-topbar, .pm-bottomnav, button { display: none !important; }

        table { page-break-inside: auto; }
        tr { page-break-inside: avoid; page-break-after: auto; }
        thead { display: table-header-group; }
      }
    `}</style>
  </OnlinePage>;
}

/* ─── IMPORTAÇÃO ASSISTIDA POR FOTO ─── 
   Em vez de OCR (que erra com escrita manual), mostra a foto + form pré-populado
   pra o usuário transcrever os números rapidamente */
function OnlinePhotoImport({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;
  const{data:animals}=useSupaQuery('animals');
  const{data:lots}=useSupaQuery('lots');
  const[importType,setImportType]=useState('weighing');
  const[selectedLot,setSelectedLot]=useState('');
  const[selectedSex,setSelectedSex]=useState('all');
  const[selectedType,setSelectedType]=useState('all');
  const[photoUrl,setPhotoUrl]=useState(null);
  const[date,setDate]=useState(TODAY);
  const[stage,setStage]=useState('config'); // config | transcribing | done
  const[entries,setEntries]=useState({});
  const[saving,setSaving]=useState(false);
  const[result,setResult]=useState(null);
  const fileRef=useRef();

  const filtered=useMemo(()=>{
    return animals
      .filter(a=>(a.status||'ativo')==='ativo')
      .filter(a=>!selectedLot?true:(selectedLot==='__no_lot__'?!a.lot_id:a.lot_id===selectedLot))
      .filter(a=>selectedSex==='all'||a.sex===selectedSex)
      .filter(a=>{
        if(selectedType==='all')return true;
        if(selectedType==='reprodutivas')return a.sex==='Fêmea'&&['Vaca','Novilha'].includes(a.type);
        return a.type===selectedType;
      })
      .sort((a,b)=>(a.identifier||'').localeCompare(b.identifier||'',undefined,{numeric:true,sensitivity:'base'}));
  },[animals,selectedLot,selectedSex,selectedType]);

  async function handlePhoto(e){
    const file=e.target.files[0];
    if(!file)return;
    try{
      const compressed=await H.compressImg(file,1200,0.85);
      setPhotoUrl(compressed);
    }catch(err){alert('Erro ao processar foto: '+err.message);}
    e.target.value='';
  }

  function startTranscribing(){
    if(filtered.length===0){alert('Nenhum animal selecionado pelos filtros.');return;}
    if(!photoUrl){if(!confirm('Você não anexou foto. Quer continuar sem foto de referência?'))return;}
    setStage('transcribing');
    setEntries({});
  }

  function setEntry(animalId,field,value){
    setEntries(p=>({...p,[animalId]:{...p[animalId],[field]:value}}));
  }

  async function saveAll(){
    setSaving(true);
    const result={success:0,errors:[]};
    for(const a of filtered){
      const e=entries[a.id]||{};
      if(importType==='weighing'){
        const w=parseFloat(e.weight);
        if(!w||w<=0)continue;
        try{
          await window.SupaDB.insert('weighings',{
            target_type:'animal',
            animal_id:a.identifier,
            lot_id:a.lot_id,
            date,
            weight:w,
            category:({Vaca:'Vacas',Bezerro:'Bezerros',Touro:'Touros',Novilha:'Novilhas',Garrote:'Garrotes'})[a.type]||'Outro',
            notes:e.notes||'',
          });
          result.success++;
        }catch(err){result.errors.push({id:a.identifier,error:err.message});}
      } else if(importType==='pregnancy'){
        if(!e.result||e.result==='-')continue;
        try{
          await window.SupaDB.insert('pregnancy_diagnoses',{
            cow_id:a.identifier,
            lot_id:a.lot_id,
            diagnosis_date:date,
            result:e.result,
            expected_birth_date:e.result==='Positivo'?H.addDays(date,283):null,
            notes:e.notes||'',
          });
          result.success++;
        }catch(err){result.errors.push({id:a.identifier,error:err.message});}
      } else if(importType==='reproduction'){
        if(!e.semen_bull&&!e.protocol_name)continue;
        try{
          await window.SupaDB.insert('reproductive_protocols',{
            cow_id:a.identifier,
            lot_id:a.lot_id,
            date,
            protocol_name:e.protocol_name||'IATF',
            semen_bull:e.semen_bull||'',
            bull_race:e.bull_race||'',
            notes:e.notes||'',
          });
          result.success++;
        }catch(err){result.errors.push({id:a.identifier,error:err.message});}
      }
    }
    setResult(result);setStage('done');setSaving(false);
  }

  const filledCount=Object.values(entries).filter(e=>{
    if(importType==='weighing')return e.weight&&parseFloat(e.weight)>0;
    if(importType==='pregnancy')return e.result&&e.result!=='-';
    if(importType==='reproduction')return e.semen_bull||e.protocol_name;
    return false;
  }).length;

  return <OnlinePage title="Importação por Foto" subtitle="Transcrição assistida por imagem" icon="📸">
    {stage==='config'&&<>
      <Alert type="info">📸 <strong>Como funciona:</strong> 1) Tire foto da ficha preenchida, 2) Selecione o que importar, 3) O sistema lista os animais e você só digita os valores observando a foto. Mais rápido e confiável que OCR.</Alert>

      <Card style={{marginBottom:12}}>
        <CardHeader title="1. Tipo de importação" icon=""/>
        <div style={{padding:12}}>
          <Select value={importType} onChange={e=>setImportType(e.target.value)}>
            <option value="weighing">⚖️ Pesagens</option>
            <option value="pregnancy">🤰 Gestação (prenha/vazia)</option>
            <option value="reproduction">🔬 Reprodução / IATF</option>
          </Select>
        </div>
      </Card>

      <Card style={{marginBottom:12}}>
        <CardHeader title="2. Foto da ficha (opcional)" icon=""/>
        <div style={{padding:12}}>
          {photoUrl?<>
            <img src={photoUrl} alt="Ficha" style={{width:'100%',maxHeight:300,objectFit:'contain',borderRadius:8,border:'1px solid #e5e7eb'}}/>
            <Btn variant="secondary" onClick={()=>setPhotoUrl(null)} fullWidth style={{marginTop:8}}>🗑 Remover foto</Btn>
          </>:<>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePhoto}/>
            <Btn onClick={()=>fileRef.current.click()} fullWidth>📷 Tirar / Escolher foto</Btn>
            <p style={{fontSize:11,color:'#6b7280',marginTop:6}}>A foto fica visível ao lado pra você consultar enquanto transcreve.</p>
          </>}
        </div>
      </Card>

      <Card style={{marginBottom:12}}>
        <CardHeader title="3. Filtrar animais" icon=""/>
        <div style={{padding:12}}>
          <FormRow>
            <Field label="Lote"><Select value={selectedLot} onChange={e=>setSelectedLot(e.target.value)}>
              <option value="">Todos</option>
              <option value="__no_lot__">⚠ Sem lote</option>
              {lots.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
            </Select></Field>
            <Field label="Sexo"><Select value={selectedSex} onChange={e=>setSelectedSex(e.target.value)}>
              <option value="all">Todos</option>
              <option value="Fêmea">Fêmea</option>
              <option value="Macho">Macho</option>
            </Select></Field>
          </FormRow>
          <Field label="Tipo"><Select value={selectedType} onChange={e=>setSelectedType(e.target.value)}>
            <option value="all">Todos</option>
            <option value="reprodutivas">🐄 Reprodutivas (Vacas + Novilhas)</option>
            <option value="Vaca">Vacas</option>
            <option value="Novilha">Novilhas</option>
            <option value="Bezerro">Bezerros</option>
            <option value="Garrote">Garrotes</option>
            <option value="Touro">Touros</option>
          </Select></Field>
          <Field label="Data" required><Input type="date" value={date} onChange={e=>setDate(e.target.value)}/></Field>
          <Alert type="info" style={{marginTop:8}}>📋 <strong>{filtered.length}</strong> animais selecionados pra transcrição.</Alert>
        </div>
      </Card>

      <Btn onClick={startTranscribing} fullWidth disabled={filtered.length===0}>▶ Iniciar transcrição</Btn>
    </>}

    {stage==='transcribing'&&<>
      <div style={{position:'sticky',top:52,zIndex:50,background:'#fff',padding:12,borderBottom:'1px solid #e5e7eb',marginBottom:8}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <strong style={{fontSize:13}}>📋 {filtered.length} animais · {filledCount} preenchidos</strong>
          <Btn size="sm" variant="secondary" onClick={()=>setStage('config')}>← Voltar</Btn>
        </div>
        <div style={{height:6,background:'#f3f4f6',borderRadius:99,overflow:'hidden'}}>
          <div style={{height:'100%',width:(filledCount/filtered.length*100)+'%',background:'#16a34a',transition:'width 0.2s'}}/>
        </div>
      </div>

      {photoUrl&&<details style={{marginBottom:12}}>
        <summary style={{cursor:'pointer',padding:8,background:'#f0fdf4',borderRadius:8,fontSize:12,fontWeight:600,color:'#166534'}}>📷 Ver foto da ficha</summary>
        <img src={photoUrl} alt="Ficha" style={{width:'100%',maxHeight:'70vh',objectFit:'contain',marginTop:8,borderRadius:8,border:'1px solid #e5e7eb'}}/>
      </details>}

      <div>
        {filtered.map((a,idx)=>{
          const lot=lots.find(l=>l.id===a.lot_id);
          const e=entries[a.id]||{};
          const filled=importType==='weighing'?(e.weight&&parseFloat(e.weight)>0):
                       importType==='pregnancy'?(e.result&&e.result!=='-'):
                       (e.semen_bull||e.protocol_name);
          return <div key={a.id} style={{padding:10,marginBottom:6,background:filled?'#f0fdf4':'#fff',border:'1px solid '+(filled?'#86efac':'#e5e7eb'),borderRadius:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,marginBottom:6}}>
              <div>
                <span style={{fontSize:11,color:'#6b7280'}}>#{idx+1}</span> <strong style={{fontSize:13}}>{a.identifier}</strong>
                <span style={{marginLeft:6,fontSize:11,color:'#6b7280'}}>{a.type} · {a.race} · {lot?.name||'—'}</span>
              </div>
              {filled&&<span style={{fontSize:18}}>✅</span>}
            </div>
            {importType==='weighing'&&<div style={{display:'flex',gap:6,alignItems:'center'}}>
              <Input type="number" step="0.1" placeholder="Peso (kg)" value={e.weight||''} onChange={ev=>setEntry(a.id,'weight',ev.target.value)} style={{flex:1}}/>
              <span style={{fontSize:11,color:'#6b7280'}}>kg</span>
            </div>}
            {importType==='pregnancy'&&<div style={{display:'flex',gap:6}}>
              <button onClick={()=>setEntry(a.id,'result','Positivo')} style={{flex:1,padding:8,background:e.result==='Positivo'?'#16a34a':'#f3f4f6',color:e.result==='Positivo'?'#fff':'#374151',border:'none',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600}}>🟢 Prenha</button>
              <button onClick={()=>setEntry(a.id,'result','Negativo')} style={{flex:1,padding:8,background:e.result==='Negativo'?'#dc2626':'#f3f4f6',color:e.result==='Negativo'?'#fff':'#374151',border:'none',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:600}}>🔴 Vazia</button>
              <button onClick={()=>setEntry(a.id,'result','-')} style={{padding:8,background:e.result==='-'?'#9ca3af':'#f3f4f6',color:e.result==='-'?'#fff':'#374151',border:'none',borderRadius:6,cursor:'pointer',fontSize:12}}>—</button>
            </div>}
            {importType==='reproduction'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              <Input placeholder="Touro/Sêmen" value={e.semen_bull||''} onChange={ev=>setEntry(a.id,'semen_bull',ev.target.value)}/>
              <Select value={e.bull_race||''} onChange={ev=>setEntry(a.id,'bull_race',ev.target.value)}>
                <option value="">Raça touro</option>
                {H.RACES.map(r=><option key={r}>{r}</option>)}
              </Select>
            </div>}
          </div>;
        })}
      </div>

      <div style={{position:'sticky',bottom:0,background:'#fff',padding:12,borderTop:'1px solid #e5e7eb',marginTop:12}}>
        <Btn onClick={saveAll} fullWidth disabled={filledCount===0||saving}>
          {saving?'⏳ Salvando...':`💾 Salvar ${filledCount} ${filledCount===1?'registro':'registros'}`}
        </Btn>
      </div>
    </>}

    {stage==='done'&&result&&<>
      <Alert type="success">
        <strong>✅ Importação concluída!</strong>
        <p style={{marginTop:4,fontSize:12}}>{result.success} registros salvos com sucesso.</p>
        {result.errors.length>0&&<p style={{marginTop:4,fontSize:12,color:'#92400e'}}>⚠ {result.errors.length} erros (ver console).</p>}
      </Alert>
      {result.errors.length>0&&<Card style={{marginBottom:12}}>
        <CardHeader title="⚠ Erros" icon=""/>
        {result.errors.slice(0,10).map((er,i)=><ListItem key={i}><strong>{er.id}:</strong> {er.error}</ListItem>)}
      </Card>}
      <Btn onClick={()=>{setStage('config');setEntries({});setResult(null);setPhotoUrl(null);}} fullWidth>Nova importação</Btn>
    </>}
  </OnlinePage>;
}


/* ─── IMPORTAÇÃO POR EXCEL ─── */
function OnlineExcelImport({user}){
  if(user.role!=='admin')return <div style={{padding:32,textAlign:'center'}}><div style={{fontSize:48}}>🔒</div><p style={{color:'#6b7280',marginTop:12}}>Acesso restrito</p></div>;
  const{data:animals}=useSupaQuery('animals');
  const{data:lots}=useSupaQuery('lots');
  const[importType,setImportType]=useState('weighing');
  const[parsed,setParsed]=useState(null);
  const[stage,setStage]=useState('idle'); // idle | preview | importing | done
  const[result,setResult]=useState(null);
  const fileRef=useRef();

  // Templates de cada tipo
  const TEMPLATES={
    weighing:{
      title:'Pesagens',
      icon:'⚖️',
      table:'weighings',
      cols:[
        {key:'animal_id',label:'Animal (brinco)',required:true,hint:'Identificador do animal cadastrado'},
        {key:'date',label:'Data (AAAA-MM-DD)',required:true},
        {key:'weight',label:'Peso (kg)',required:true,type:'number'},
        {key:'category',label:'Categoria',hint:'Vacas, Bezerros, Touros, etc.'},
        {key:'notes',label:'Observações'},
      ],
    },
    pregnancy:{
      title:'Diagnósticos de Gestação',
      icon:'🤰',
      table:'pregnancy_diagnoses',
      cols:[
        {key:'cow_id',label:'Vaca (brinco)',required:true},
        {key:'diagnosis_date',label:'Data Diagnóstico (AAAA-MM-DD)',required:true},
        {key:'result',label:'Resultado',required:true,hint:'Positivo, Negativo, Duvidoso'},
        {key:'expected_birth_date',label:'Parto Previsto (AAAA-MM-DD)',hint:'Obrigatório se Positivo'},
        {key:'notes',label:'Observações'},
      ],
    },
    reproduction:{
      title:'Protocolos Reprodutivos',
      icon:'🔬',
      table:'reproductive_protocols',
      cols:[
        {key:'cow_id',label:'Vaca (brinco)',required:true},
        {key:'date',label:'Data Inseminação (AAAA-MM-DD)',required:true},
        {key:'protocol_name',label:'Protocolo',hint:'Ex: IATF'},
        {key:'semen_bull',label:'Touro IATF / Sêmen'},
        {key:'bull_race',label:'Raça do Touro'},
        {key:'repasse_date',label:'Data Repasse (AAAA-MM-DD)'},
        {key:'repasse_bull',label:'Touro Repasse'},
        {key:'notes',label:'Observações'},
      ],
    },
  };

  const tmpl=TEMPLATES[importType];

  function downloadTemplate(){
    if(typeof XLSX==='undefined'){alert('Biblioteca de Excel não carregou. Recarregue a página.');return;}
    const headers=tmpl.cols.map(c=>c.label);
    const example=tmpl.cols.map(c=>{
      if(c.key==='animal_id'||c.key==='cow_id')return'EX-001';
      if(c.key.includes('date'))return TODAY;
      if(c.key==='weight')return 350;
      if(c.key==='result')return 'Positivo';
      if(c.key==='protocol_name')return 'IATF';
      return '';
    });
    const ws=XLSX.utils.aoa_to_sheet([headers,example]);
    // Aplicar largura nas colunas
    ws['!cols']=tmpl.cols.map(()=>({wch:22}));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,tmpl.title);
    XLSX.writeFile(wb,`template-${importType}.xlsx`);
  }

  function handleFile(e){
    const file=e.target.files[0];
    if(!file)return;
    if(typeof XLSX==='undefined'){alert('Biblioteca não carregou. Recarregue a página.');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:''});
        if(rows.length<2){alert('A planilha precisa ter cabeçalho e ao menos 1 linha de dados.');return;}
        const headers=rows[0].map(h=>String(h||'').trim());
        // Mapear cabeçalhos da planilha para keys do template
        const colMap={};
        tmpl.cols.forEach(col=>{
          // Buscar a coluna que mais bate (insensitive)
          const idx=headers.findIndex(h=>h.toLowerCase()===col.label.toLowerCase());
          if(idx>=0)colMap[col.key]=idx;
        });
        if(Object.keys(colMap).length===0){
          alert('Não consegui mapear as colunas. Use o template de download como base.');return;
        }
        const records=rows.slice(1).map((row,rowIdx)=>{
          const obj={};
          tmpl.cols.forEach(col=>{
            const idx=colMap[col.key];
            if(idx===undefined)return;
            let v=row[idx];
            // Converter Date pra YYYY-MM-DD
            if(v instanceof Date){v=v.toISOString().slice(0,10);}
            else if(typeof v==='string'&&col.key.includes('date')){
              // Tenta normalizar dd/mm/yyyy → yyyy-mm-dd
              const m=v.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
              if(m)v=`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
            }
            if(col.type==='number'&&v!==''&&v!=null){
              const n=parseFloat(String(v).replace(',','.'));
              if(!isNaN(n))v=n;else v=null;
            }
            obj[col.key]=v===''?null:v;
          });
          obj._rowNum=rowIdx+2; // linha real na planilha
          return obj;
        }).filter(r=>{
          // Pular linhas totalmente vazias
          return Object.keys(r).filter(k=>k!=='_rowNum').some(k=>r[k]!=null&&r[k]!=='');
        });

        // Validar cada registro
        const animalKey=tmpl.cols.find(c=>c.key==='animal_id'||c.key==='cow_id')?.key;
        const validated=records.map(r=>{
          const errors=[];
          tmpl.cols.filter(c=>c.required).forEach(c=>{
            if(r[c.key]==null||r[c.key]==='')errors.push(`${c.label} obrigatório`);
          });
          // Validar animal existe
          if(animalKey&&r[animalKey]){
            const exists=animals.find(a=>(a.identifier||'').toLowerCase()===String(r[animalKey]).toLowerCase());
            if(!exists)errors.push(`Animal "${r[animalKey]}" não encontrado no Inventário`);
            else r[animalKey]=exists.identifier; // normalizar
          }
          return{...r,_errors:errors};
        });

        setParsed({records:validated,template:tmpl,filename:file.name});
        setStage('preview');
      }catch(err){
        alert('Erro ao ler planilha: '+err.message);
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
  }

  async function doImport(){
    if(!parsed)return;
    const valid=parsed.records.filter(r=>r._errors.length===0);
    if(valid.length===0){alert('Nenhum registro válido.');return;}
    if(!confirm(`Importar ${valid.length} registros para "${parsed.template.title}"?`))return;
    setStage('importing');
    let inserted=0;let errors=[];
    for(const r of valid){
      try{
        const{_errors,_rowNum,...data}=r;
        // Tentar mapear lot_id pelo animal
        if(data.cow_id||data.animal_id){
          const id=data.cow_id||data.animal_id;
          const a=animals.find(x=>x.identifier===id);
          if(a&&a.lot_id&&!data.lot_id)data.lot_id=a.lot_id;
        }
        await window.SupaDB.insert(parsed.template.table,data);
        inserted++;
      }catch(e){
        errors.push({row:r._rowNum,error:e.message||String(e)});
      }
    }
    setResult({inserted,errors,total:valid.length});
    setStage('done');
  }

  const allValid=parsed?parsed.records.filter(r=>r._errors.length===0):[];
  const allInvalid=parsed?parsed.records.filter(r=>r._errors.length>0):[];

  return <OnlinePage title="Importar Excel" subtitle="Suba planilhas .xlsx em massa" icon="📊">
    <Alert type="info">
      <strong>Como usar:</strong><br/>
      1. Escolha o tipo de dado<br/>
      2. Baixe o template (formato esperado)<br/>
      3. Preencha sua planilha (Excel/Google Sheets)<br/>
      4. Faça upload — o sistema valida e mostra problemas antes de salvar
    </Alert>

    {stage==='idle'&&<>
      <Card style={{marginBottom:12}}>
        <CardHeader title="Tipo de importação"/>
        <div style={{padding:14}}>
          {Object.entries(TEMPLATES).map(([k,t])=>
            <label key={k} style={{display:'flex',alignItems:'center',padding:10,borderRadius:8,border:'1px solid '+(importType===k?'#1d4ed8':'#e5e7eb'),background:importType===k?'#eff6ff':'#fff',marginBottom:6,cursor:'pointer'}}>
              <input type="radio" checked={importType===k} onChange={()=>setImportType(k)} style={{marginRight:10}}/>
              <span style={{fontSize:18,marginRight:8}}>{t.icon}</span>
              <strong style={{fontSize:13}}>{t.title}</strong>
            </label>
          )}
        </div>
      </Card>

      <Card>
        <CardHeader title="Etapas" icon=""/>
        <div style={{padding:14}}>
          <div style={{marginBottom:14}}>
            <p style={{fontSize:12,fontWeight:600,marginBottom:6}}>1. Baixar modelo</p>
            <Btn variant="secondary" onClick={downloadTemplate} fullWidth>📥 Baixar template Excel ({tmpl.title})</Btn>
          </div>
          <div>
            <p style={{fontSize:12,fontWeight:600,marginBottom:6}}>2. Carregar planilha preenchida</p>
            <Btn onClick={()=>fileRef.current.click()} fullWidth>📂 Selecionar arquivo .xlsx ou .csv</Btn>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={handleFile}/>
          </div>

          <div style={{marginTop:14,padding:10,background:'#f9fafb',borderRadius:8}}>
            <p style={{fontSize:11,fontWeight:600,marginBottom:4}}>📋 Colunas esperadas:</p>
            <ul style={{margin:'4px 0 0 16px',fontSize:11,color:'#6b7280'}}>
              {tmpl.cols.map(c=><li key={c.key}>
                <strong>{c.label}</strong>{c.required?' *':''}{c.hint?' — '+c.hint:''}
              </li>)}
            </ul>
          </div>
        </div>
      </Card>
    </>}

    {stage==='preview'&&parsed&&<Card>
      <CardHeader title={'Conferência: '+parsed.filename} icon="👁"/>
      <div style={{padding:14}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
          <StatCard label="Total" value={parsed.records.length} color="blue"/>
          <StatCard label="Válidos" value={allValid.length} color="green"/>
          <StatCard label="Com erro" value={allInvalid.length} color="red"/>
        </div>

        {allInvalid.length>0&&<Alert type="warning">
          <strong>⚠ {allInvalid.length} linhas com problemas — só os válidos serão importados.</strong>
        </Alert>}

        <div style={{maxHeight:400,overflowY:'auto',border:'1px solid #e5e7eb',borderRadius:8}}>
          <table style={{width:'100%',fontSize:11,borderCollapse:'collapse'}}>
            <thead style={{position:'sticky',top:0,background:'#f3f4f6'}}>
              <tr>
                <th style={{padding:4,border:'1px solid #e5e7eb'}}>L</th>
                <th style={{padding:4,border:'1px solid #e5e7eb'}}>Status</th>
                {parsed.template.cols.slice(0,5).map(c=><th key={c.key} style={{padding:4,border:'1px solid #e5e7eb',textAlign:'left'}}>{c.label}</th>)}
              </tr>
            </thead>
            <tbody>
              {parsed.records.slice(0,200).map((r,i)=>{
                const ok=r._errors.length===0;
                return <tr key={i} style={{background:ok?'#fff':'#fef2f2'}}>
                  <td style={{padding:4,border:'1px solid #e5e7eb',textAlign:'center'}}>{r._rowNum}</td>
                  <td style={{padding:4,border:'1px solid #e5e7eb'}}>
                    {ok?<Badge color="green">✓</Badge>:<span style={{fontSize:10,color:'#991b1b'}}>{r._errors.join('; ')}</span>}
                  </td>
                  {parsed.template.cols.slice(0,5).map(c=><td key={c.key} style={{padding:4,border:'1px solid #e5e7eb'}}>{r[c.key]==null?'':String(r[c.key])}</td>)}
                </tr>;
              })}
              {parsed.records.length>200&&<tr><td colSpan={7} style={{padding:8,textAlign:'center',fontStyle:'italic'}}>...e mais {parsed.records.length-200} linhas</td></tr>}
            </tbody>
          </table>
        </div>

        <div style={{display:'flex',gap:8,marginTop:14}}>
          <Btn onClick={doImport} disabled={allValid.length===0} style={{flex:1}}>✅ Importar {allValid.length} válidos</Btn>
          <Btn variant="secondary" onClick={()=>{setStage('idle');setParsed(null);}}>Cancelar</Btn>
        </div>
      </div>
    </Card>}

    {stage==='importing'&&<Alert type="warning">⏳ Importando... aguarde.</Alert>}

    {stage==='done'&&result&&<Card>
      <CardHeader title="Resultado" icon="📊"/>
      <div style={{padding:14}}>
        <Alert type="success">
          ✅ {result.inserted} de {result.total} registros importados com sucesso!
        </Alert>
        {result.errors.length>0&&<Alert type="error">
          <strong>⚠ {result.errors.length} erros:</strong>
          <ul style={{margin:'6px 0 0 18px',fontSize:11,maxHeight:200,overflowY:'auto'}}>
            {result.errors.map((e,i)=><li key={i}>Linha {e.row}: {e.error}</li>)}
          </ul>
        </Alert>}
        <Btn onClick={()=>{setStage('idle');setParsed(null);setResult(null);}} variant="secondary" fullWidth>Nova importação</Btn>
      </div>
    </Card>}
  </OnlinePage>;
}

/* ─── GALERIA DE FOTOS ONLINE ─── */
function OnlineGallery({user}){
  const{data:births,loading:lB}=useSupaQuery('births');
  const{data:deaths,loading:lD}=useSupaQuery('deaths');
  const{data:feces,loading:lF}=useSupaQuery('feces_records');
  const[filter,setFilter]=useState('all');
  const[lightbox,setLightbox]=useState(null);
  const loading=lB||lD||lF;

  const photos=useMemo(()=>{
    const out=[];
    (births||[]).forEach(b=>{
      if(b.cow_photo)out.push({img:b.cow_photo,type:'birth-cow',label:'Mãe '+b.mother_id,date:b.birth_date,ref:b.id,category:'births',extra:'Bezerro: '+b.calf_id});
      if(b.calf_photo)out.push({img:b.calf_photo,type:'birth-calf',label:'Bezerro '+b.calf_id,date:b.birth_date,ref:b.id,category:'births',extra:b.calf_sex+' · '+b.birth_weight+'kg'});
    });
    (deaths||[]).forEach(d=>{
      if(d.photo)out.push({img:d.photo,type:'death',label:d.animal_id,date:d.death_date,ref:d.id,category:'mortality',extra:d.cause});
    });
    (feces||[]).forEach(f=>{
      if(f.image)out.push({img:f.image,type:'feces',label:'Fezes '+H.fmtDate(f.date),date:f.date,ref:f.id,category:'feces',extra:f.category||''});
    });
    return out.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  },[births,deaths,feces]);

  const CATS={all:'Todas',births:'🐮 Nascimentos',mortality:'✝ Mortalidade',feces:'🔍 Fezes'};
  const filtered=filter==='all'?photos:photos.filter(p=>p.category===filter);
  const counts={};photos.forEach(p=>{counts[p.category]=(counts[p.category]||0)+1;});

  return <OnlinePage title="Galeria de Fotos" subtitle={photos.length+' foto'+(photos.length!==1?'s':'')+' no sistema'} icon="📸" loading={loading}>

    <div style={{display:'flex',gap:4,marginBottom:14,background:'#f3f4f6',padding:4,borderRadius:10,overflowX:'auto'}}>
      {Object.entries(CATS).map(([id,lbl])=>{
        const c=id==='all'?photos.length:counts[id]||0;
        return <button key={id} onClick={()=>setFilter(id)} style={{flex:'1 0 auto',padding:8,background:filter===id?'#fff':'transparent',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:filter===id?600:400,color:filter===id?'#1e40af':'#6b7280',whiteSpace:'nowrap'}}>
          {lbl} ({c})
        </button>;
      })}
    </div>

    {filtered.length===0
      ? <EmptyState icon="📷" text={filter==='all'?'Nenhuma foto cadastrada ainda':'Nenhuma foto nesta categoria'}/>
      : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8}}>
          {filtered.map((p,i)=>
            <div key={i} onClick={()=>setLightbox(p)} style={{position:'relative',aspectRatio:'1',borderRadius:8,overflow:'hidden',cursor:'pointer',border:'1px solid #e5e7eb',background:'#f3f4f6'}}>
              <img src={p.img} alt={p.label} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'20px 8px 8px',background:'linear-gradient(transparent,rgba(0,0,0,.75))',color:'#fff',fontSize:10}}>
                <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.label}</div>
                <div style={{fontSize:9,opacity:.85}}>{H.fmtDate(p.date)}</div>
              </div>
            </div>
          )}
        </div>
    }

    {lightbox&&<div onClick={()=>setLightbox(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16,flexDirection:'column'}}>
      <img src={lightbox.img} alt={lightbox.label} style={{maxWidth:'100%',maxHeight:'75vh',objectFit:'contain',borderRadius:8}}/>
      <div style={{marginTop:12,color:'#fff',textAlign:'center'}}>
        <strong style={{fontSize:14}}>{lightbox.label}</strong>
        <p style={{fontSize:12,opacity:.8,marginTop:2}}>{lightbox.extra} · {H.fmtDate(lightbox.date)}</p>
      </div>
      <button onClick={()=>setLightbox(null)} style={{position:'absolute',top:16,right:16,width:40,height:40,borderRadius:999,background:'rgba(255,255,255,.2)',border:'none',color:'#fff',fontSize:24,cursor:'pointer'}}>×</button>
    </div>}
  </OnlinePage>;
}

/* ─── SERVIÇOS / MANUTENÇÕES DA PROPRIEDADE ─── */
const SVC_CATEGORIES=['Cerca','Estrutura','Equipamento','Veículo','Limpeza','Roçada','Aguada','Galpão','Casa','Outro'];
const SVC_PRIORITIES=['Baixa','Média','Alta','Urgente'];

function OnlineServices({user}){
  const{data:items,loading,error,reload}=useSupaQuery('services',{order:{column:'reported_at',ascending:false}});
  const{data:pastures}=useSupaQuery('pastures');
  const{data:profiles}=useSupaQuery('profiles');
  const[showForm,setShowForm]=useState(false);
  const[editing,setEditing]=useState(null);
  const[detail,setDetail]=useState(null);
  const[filterStatus,setFilterStatus]=useState('open');
  const[filterPriority,setFilterPriority]=useState('all');
  const[query,setQuery]=useState('');

  async function save(data){
    try{
      if(editing)await window.SupaDB.update('services',editing.id,data);
      else await window.SupaDB.insert('services',{...data,reported_by:user.id});
      setShowForm(false);setEditing(null);reload();
    }catch(e){alert('Erro: '+e.message);}
  }

  async function markDone(svc){
    const notes=prompt('Observações sobre a conclusão (opcional):','');
    if(notes===null)return;
    try{
      await window.SupaDB.update('services',svc.id,{
        status:'concluido',
        completed_by:user.id,
        completed_at:new Date().toISOString(),
        completion_notes:notes||null,
      });
      setDetail(null);reload();
    }catch(e){alert('Erro: '+e.message);}
  }

  async function reopenService(svc){
    if(!confirm('Reabrir este serviço como pendente?'))return;
    try{
      await window.SupaDB.update('services',svc.id,{
        status:'pendente',completed_by:null,completed_at:null,completion_notes:null,
      });
      setDetail(null);reload();
    }catch(e){alert('Erro: '+e.message);}
  }

  async function del(id){
    if(user.role!=='admin'){alert('Apenas admin pode apagar.');return;}
    if(!confirm('Excluir este serviço?'))return;
    try{await window.SupaDB.remove('services',id);setDetail(null);reload();}
    catch(e){alert('Erro: '+e.message);}
  }

  const filtered=items.filter(s=>{
    if(filterStatus==='open'&&!['pendente','em_andamento'].includes(s.status))return false;
    if(filterStatus==='done'&&s.status!=='concluido')return false;
    if(filterStatus==='cancelled'&&s.status!=='cancelado')return false;
    if(filterPriority!=='all'&&s.priority!==filterPriority)return false;
    if(query){
      const q=query.toLowerCase();
      if(!(s.title||'').toLowerCase().includes(q)&&!(s.description||'').toLowerCase().includes(q)&&!(s.location||'').toLowerCase().includes(q))return false;
    }
    return true;
  });

  const stats={
    pending:items.filter(s=>s.status==='pendente').length,
    progress:items.filter(s=>s.status==='em_andamento').length,
    done:items.filter(s=>s.status==='concluido').length,
    urgent:items.filter(s=>s.priority==='Urgente'&&['pendente','em_andamento'].includes(s.status)).length,
  };

  function statusInfo(st){
    return{
      pendente:{icon:'⏳',color:'amber',label:'Pendente'},
      em_andamento:{icon:'🔧',color:'blue',label:'Em andamento'},
      concluido:{icon:'✅',color:'green',label:'Concluído'},
      cancelado:{icon:'❌',color:'gray',label:'Cancelado'},
    }[st]||{icon:'❓',color:'gray',label:st};
  }
  function priorityColor(p){
    return{Urgente:'red',Alta:'amber',Média:'blue',Baixa:'gray'}[p]||'gray';
  }

  return <OnlinePage title="Serviços e Manutenções" subtitle={items.length+' registros'} icon="🔧" loading={loading} error={error}
    action={<Btn onClick={()=>{setEditing(null);setShowForm(true);}}>+ Novo</Btn>}>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:12}}>
      <StatCard label="Pendentes" value={stats.pending} color="amber" icon="⏳"/>
      <StatCard label="Andamento" value={stats.progress} color="blue" icon="🔧"/>
      <StatCard label="Concluídos" value={stats.done} color="green" icon="✅"/>
      <StatCard label="Urgentes" value={stats.urgent} color="red" icon="🚨"/>
    </div>

    <Card style={{marginBottom:12,padding:12}}>
      <Input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔎 Buscar..." style={{marginBottom:8}}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <Select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="open">⏳ Em aberto ({stats.pending+stats.progress})</option>
          <option value="done">✅ Concluídos ({stats.done})</option>
          <option value="cancelled">❌ Cancelados</option>
          <option value="all">Todos</option>
        </Select>
        <Select value={filterPriority} onChange={e=>setFilterPriority(e.target.value)}>
          <option value="all">Todas prioridades</option>
          {SVC_PRIORITIES.map(p=><option key={p}>{p}</option>)}
        </Select>
      </div>
    </Card>

    <Card>
      {filtered.length===0?<EmptyState icon="🔧" text={query?'Nenhum serviço encontrado':'Nenhum serviço cadastrado'} action={!query&&<Btn onClick={()=>setShowForm(true)}>Cadastrar primeiro</Btn>}/>:
        filtered.map(s=>{
          const si=statusInfo(s.status);
          return <ListItem key={s.id} onClick={()=>setDetail(s)}>
            <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
              <span style={{fontSize:22}}>{si.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <strong style={{fontSize:13,textDecoration:s.status==='concluido'?'line-through':'none',color:s.status==='concluido'?'#6b7280':'#111827'}}>{s.title}</strong>
                  <Badge color={priorityColor(s.priority)}>{s.priority}</Badge>
                  {s.category&&<Badge color="gray">{s.category}</Badge>}
                </div>
                <p style={{fontSize:11,color:'#6b7280',marginTop:2}}>
                  {s.location?'📍 '+s.location+' · ':''}
                  Reportado em {H.fmtDate((s.reported_at||'').split('T')[0])}
                  {s.due_date?' · 📅 prazo: '+H.fmtDate(s.due_date):''}
                </p>
              </div>
            </div>
          </ListItem>;
        })
      }
    </Card>

    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditing(null);}} title={editing?'Editar Serviço':'Novo Serviço'} size="lg">
      <OnlineServiceForm initial={editing} pastures={pastures} profiles={profiles} user={user} onSave={save} onCancel={()=>{setShowForm(false);setEditing(null);}}/>
    </Modal>

    <Modal open={!!detail} onClose={()=>setDetail(null)} title={detail?detail.title:''} size="lg">
      {detail&&<OnlineServiceDetail svc={detail} pastures={pastures} profiles={profiles} user={user}
        onEdit={()=>{setEditing(detail);setShowForm(true);setDetail(null);}}
        onDelete={()=>del(detail.id)}
        onMarkDone={()=>markDone(detail)}
        onReopen={()=>reopenService(detail)}
        onClose={()=>setDetail(null)} statusInfo={statusInfo} priorityColor={priorityColor}/>}
    </Modal>
  </OnlinePage>;
}

function OnlineServiceForm({initial,pastures,profiles,user,onSave,onCancel}){
  const[f,setF]=useState({title:'',description:'',category:'Outro',priority:'Média',location:'',pasture_id:'',status:'pendente',assigned_to:'',due_date:'',cost:'',notes:'',...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <>
    <Field label="Título" required hint="Ex: Cerca caída no pasto sul"><Input value={f.title} onChange={e=>s('title',e.target.value)}/></Field>
    <Field label="Descrição"><Textarea value={f.description||''} onChange={e=>s('description',e.target.value)} rows={3} placeholder="Detalhes do que precisa ser feito..."/></Field>
    <FormRow>
      <Field label="Categoria"><Select value={f.category} onChange={e=>s('category',e.target.value)}>{SVC_CATEGORIES.map(c=><option key={c}>{c}</option>)}</Select></Field>
      <Field label="Prioridade"><Select value={f.priority} onChange={e=>s('priority',e.target.value)}>{SVC_PRIORITIES.map(p=><option key={p}>{p}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Local (texto livre)"><Input value={f.location||''} onChange={e=>s('location',e.target.value)} placeholder="Ex: Esquina sul do pasto"/></Field>
      <Field label="Pasto vinculado"><Select value={f.pasture_id||''} onChange={e=>s('pasture_id',e.target.value||null)}><option value="">— Nenhum —</option>{pastures.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</Select></Field>
    </FormRow>
    <FormRow>
      <Field label="Status"><Select value={f.status} onChange={e=>s('status',e.target.value)}>
        <option value="pendente">⏳ Pendente</option>
        <option value="em_andamento">🔧 Em andamento</option>
        <option value="concluido">✅ Concluído</option>
        <option value="cancelado">❌ Cancelado</option>
      </Select></Field>
      <Field label="Prazo"><Input type="date" value={f.due_date||''} onChange={e=>s('due_date',e.target.value||null)}/></Field>
    </FormRow>
    <FormRow>
      <Field label="Atribuído a"><Select value={f.assigned_to||''} onChange={e=>s('assigned_to',e.target.value||null)}><option value="">— Ninguém —</option>{(profiles||[]).filter(p=>p.active).map(p=><option key={p.id} value={p.id}>{p.name||p.email}</option>)}</Select></Field>
      <Field label="Custo estimado (R$)"><Input type="number" step="0.01" value={f.cost||''} onChange={e=>s('cost',e.target.value?parseFloat(e.target.value):null)}/></Field>
    </FormRow>
    <Field label="Observações"><Textarea value={f.notes||''} onChange={e=>s('notes',e.target.value)}/></Field>
    <FormActions onSave={()=>{if(!f.title)return alert('Título obrigatório');onSave(f);}} onCancel={onCancel}/>
  </>;
}

      <div style={{flex:1}}>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13,marginBottom:12}}>

      <Info label="Local" value={svc.location||past?.name||'—'}/>
      <Info label="Pasto" value={past?.name||'—'}/>
      <Info label="Prazo" value={svc.due_date?H.fmtDate(svc.due_date):'—'}/>
      <Info label="Reportado por" value={reportedBy?.name||reportedBy?.email||'—'}/>
      <Info label="Reportado em" value={svc.reported_at?H.fmtDate(svc.reported_at.split('T')[0]):'—'}/>
      <Info label="Atribuído a" value={assignedTo?.name||assignedTo?.email||'—'}/>
      <Info label="Custo estimado" value={svc.cost?H.fmtMoney(svc.cost):'—'}/>
    </div>

    {svc.status==='concluido'&&<div style={{marginBottom:12,padding:10,background:'#f0fdf4',borderLeft:'3px solid #16a34a',borderRadius:4,fontSize:13}}>
      <p style={{fontWeight:600,marginBottom:4}}>✅ Concluído</p>
      <p style={{fontSize:12}}>Por: {completedBy?.name||completedBy?.email||'—'}</p>
      <p style={{fontSize:12}}>Em: {svc.completed_at?H.fmtDate(svc.completed_at.split('T')[0]):'—'}</p>
      {svc.completion_notes&&<p style={{fontSize:12,marginTop:6,fontStyle:'italic'}}>"{svc.completion_notes}"</p>}
    </div>}

    {svc.notes&&<Info label="Observações" value={svc.notes}/>}

    <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
      {isOpen&&<Btn onClick={onMarkDone} style={{flex:1,minWidth:140}}>✅ Marcar concluído</Btn>}
      {svc.status==='concluido'&&<Btn variant="secondary" onClick={onReopen} style={{flex:1,minWidth:140}}>↩ Reabrir</Btn>}
      <Btn variant="secondary" onClick={onEdit}>Editar</Btn>
      {user.role==='admin'&&<Btn variant="danger" onClick={onDelete}>Excluir</Btn>}
      <Btn variant="ghost" onClick={onClose}>Fechar</Btn>
    </div>
  </>;
}

function App(){
  const[user,setUser]=useState(null);
  const[page,setPage]=useState('dashboard');
  const[installPrompt,setInstallPrompt]=useState(null);
  const[showInstall,setShowInstall]=useState(false);
  const[mode,setMode]=useState(null); // null, 'local', 'online'
  const[checkingSession,setCheckingSession]=useState(true);
  const[onlineUser,setOnlineUser]=useState(null);
  const[onlinePage,setOnlinePage]=useState('online-dashboard');

  useEffect(()=>{
    (async()=>{
      // 1) Restaurar modo escolhido anteriormente
      const savedMode=localStorage.getItem('pm_mode');
      if(savedMode==='local'){
        setMode('local');
        try{const saved=localStorage.getItem('pm_user');if(saved)setUser(JSON.parse(saved));}catch{}
        setCheckingSession(false);
      } else if(savedMode==='online'){
        setMode('online');
        // Tentar restaurar sessão Supabase
        try{
          const profile=await window.SupaDB.restoreSession();
          if(profile)setOnlineUser(profile);
        }catch(e){console.warn('Sessão não restaurada:',e);}
        setCheckingSession(false);
      } else {
        setCheckingSession(false);
      }
    })();

    // PWA install
    const handler=(e)=>{
      e.preventDefault();
      setInstallPrompt(e);
      if(!localStorage.getItem('pm_install_dismissed'))setShowInstall(true);
    };
    window.addEventListener('beforeinstallprompt',handler);
    return()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  function chooseMode(m){
    setMode(m);
    localStorage.setItem('pm_mode',m);
  }
  function backToModeSelector(){
    setMode(null);
    localStorage.removeItem('pm_mode');
  }

  const handleLogin=u=>{setUser(u);setPage('dashboard');};
  const handleLogout=()=>{localStorage.removeItem('pm_user');setUser(null);setPage('dashboard');};
  const handleNav=p=>{setPage(p);window.scrollTo(0,0);};

  const handleOnlineLogin=u=>{setOnlineUser(u);setOnlinePage('online-dashboard');};
  async function handleOnlineLogout(){
    try{await window.SupaDB.signOut();}catch{}
    setOnlineUser(null);setOnlinePage('online-dashboard');
  }
  const handleOnlineNav=p=>{setOnlinePage(p);window.scrollTo(0,0);};

  async function doInstall(){
    if(!installPrompt)return;
    installPrompt.prompt();
    try{await installPrompt.userChoice;}catch{}
    setInstallPrompt(null);setShowInstall(false);
  }
  function dismissInstall(){
    localStorage.setItem('pm_install_dismissed','1');
    setShowInstall(false);
  }

  // Estado inicial: ainda checando sessão
  if(checkingSession)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(160deg,#14532d,#166534)'}}>
    <div style={{textAlign:'center',color:'#fff'}}><div style={{fontSize:48,marginBottom:12}}>🐂</div><p>Carregando...</p></div>
  </div>;

  // Sem modo escolhido
  if(!mode)return <ModeSelector onChoose={chooseMode}/>;

  // ─── MODO ONLINE ───
  if(mode==='online'){
    if(!onlineUser)return <OnlineLogin onLogin={handleOnlineLogin} onBackToMode={backToModeSelector}/>;
    const onlineProps={user:onlineUser,onNav:handleOnlineNav};
    const ONLINE_PAGES={
      'online-dashboard':<OnlineDashboard {...onlineProps}/>,
      'online-search':<OnlineSearch {...onlineProps}/>,
      'online-inventory':<OnlineInventory {...onlineProps}/>,
      'online-pastures':<OnlinePastures {...onlineProps}/>,
      'online-lots':<OnlineLots {...onlineProps}/>,
      'online-births':<OnlineBirths {...onlineProps}/>,
      'online-mortality':<OnlineMortality {...onlineProps}/>,
      'online-weighings':<OnlineWeighings {...onlineProps}/>,
      'online-reproductive':<OnlineReproductive {...onlineProps}/>,
      'online-pregnancy':<OnlinePregnancy {...onlineProps}/>,
      'online-health':<OnlineHealthManagements {...onlineProps}/>,
      'online-herbicide':<OnlineHerbicide {...onlineProps}/>,
      'online-mineral':<OnlineMineral {...onlineProps}/>,
      'online-feces':<OnlineFeces {...onlineProps}/>,
      'online-services':<OnlineServices {...onlineProps}/>,
      'online-exits':<OnlineExits {...onlineProps}/>,
      'online-revenues':<OnlineRevenues {...onlineProps}/>,
      'online-costs':<OnlineCosts {...onlineProps}/>,
      'online-analysis':<OnlineAnalysis {...onlineProps}/>,
      'online-safra':<OnlineSafraReport {...onlineProps}/>,
      'online-export':<OnlineExport {...onlineProps}/>,
      'online-print':<OnlinePrintableSheets {...onlineProps}/>,
      'online-import':<OnlineExcelImport {...onlineProps}/>,
      'online-photo':<OnlinePhotoImport {...onlineProps}/>,
      'online-gallery':<OnlineGallery {...onlineProps}/>,
      'online-collaborators':<OnlineCollaborators {...onlineProps}/>,
      'online-settings':<OnlineSettings {...onlineProps} onLogout={handleOnlineLogout}/>,
    };
    return <OnlineLayout user={onlineUser} page={onlinePage} onNav={handleOnlineNav} onLogout={handleOnlineLogout}>
      {ONLINE_PAGES[onlinePage]||ONLINE_PAGES['online-dashboard']}
    </OnlineLayout>;
  }

  // ─── MODO LOCAL (versão original) ───
  if(!user)return <Login onLogin={handleLogin}/>;

  const props={user,onNav:handleNav};
  const PAGES={
    dashboard:<Dashboard {...props}/>,
    births:<Births {...props}/>,
    mortality:<Mortality {...props}/>,
    lots:<Lots {...props}/>,
    pastures:<Pastures {...props}/>,
    health:<Health {...props}/>,
    herbicide:<Herbicide {...props}/>,
    mineral:<Mineral {...props}/>,
    weighings:<Weighings {...props}/>,
    feces:<Feces {...props}/>,
    reproductive:<Reproductive {...props}/>,
    pregnancy:<Pregnancy {...props}/>,
    search:<Search {...props}/>,
    inventory:<Inventory {...props}/>,
    exits:<Exits {...props}/>,
    revenues:<Revenues {...props}/>,
    costs:<Costs {...props}/>,
    analytics:<Analytics {...props}/>,
    report:<Report {...props}/>,
    gallery:<Gallery {...props}/>,
    farms:<Farms {...props}/>,
    collaborators:<Collaborators {...props}/>,
    export:<ExportPage {...props}/>,
    settings:<SettingsLocal {...props} onSwitchMode={backToModeSelector}/>,
  };
  return <>
    <Layout user={user} page={page} onNav={handleNav} onLogout={handleLogout}>{PAGES[page]||PAGES.dashboard}</Layout>
    {showInstall&&installPrompt&&<div style={{position:'fixed',bottom:80,left:16,right:16,maxWidth:520,margin:'0 auto',background:'#166534',color:'#fff',padding:14,borderRadius:12,boxShadow:'0 8px 24px rgba(0,0,0,.3)',zIndex:300,display:'flex',alignItems:'center',gap:12}}>
      <span style={{fontSize:28}}>📱</span>
      <div style={{flex:1}}>
        <strong style={{fontSize:13,display:'block'}}>Instalar app</strong>
        <span style={{fontSize:11,opacity:.85}}>Adicione à tela inicial para acesso rápido</span>
      </div>
      <button onClick={doInstall} style={{padding:'8px 14px',background:'#fff',color:'#166534',border:'none',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer'}}>Instalar</button>
      <button onClick={dismissInstall} style={{background:'none',border:'none',color:'rgba(255,255,255,.7)',cursor:'pointer',fontSize:20,padding:4}} aria-label="Dispensar">×</button>
    </div>}
  </>;
}

/* ─── Render ─── */
const loadingEl=document.getElementById('loading');
ReactDOM.createRoot(document.getElementById('root')).render(<ErrBoundary><App/></ErrBoundary>);
setTimeout(()=>{if(loadingEl)loadingEl.style.display='none';},100);
</script>

</body>
</html>
